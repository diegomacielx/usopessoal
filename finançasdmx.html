<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finanças DMX – Versão Premium</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 500: '#8b5cf6', 600: '#7c3aed' }
          }
        },
      },
    }
  </script>

  <!-- React & ReactDOM (production) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- IndexedDB via idb-keyval -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .dark .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .donut-segment { transition: stroke-dashoffset 1s ease-in-out; }
    .spinner { border: 2px solid rgba(255,255,255,0.3); border-top-color: #14b8a6; border-radius: 50%; width: 24px; height: 24px; animation: spin 0.8s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .field-error { border-color: #f43f5e !important; background-color: rgba(244, 63, 94, 0.05) !important; }
    .error-message { color: #f43f5e; font-size: 0.7rem; margin-top: 4px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0B1120] dark:text-slate-100 min-h-screen">
  <div id="root"></div>

  <script>
    // ----------------------------------------------------------------------
    // UTILITÁRIOS GLOBAIS (fora do React)
    // ----------------------------------------------------------------------
    const { useState, useEffect, useMemo, useCallback, memo } = React;
    const { get, set } = idbKeyval;

    // Data local (corrigida para fuso horário)
    function getLocalDateString() {
      const d = new Date();
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    // Formatação monetária
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    // Gerador de ID único (UUID ou fallback)
    const generateId = () => (window.crypto?.randomUUID ? crypto.randomUUID() : (Date.now() + Math.random()).toString());

    // Web Crypto: AES-GCM
    const deriveKey = async (password, salt) => {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    };
    const encryptData = async (text, password) => {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(text));
      const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      combined.set(salt, 0); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
      return btoa(String.fromCharCode(...combined));
    };
    const decryptData = async (base64, password) => {
      const combined = new Uint8Array(atob(base64).split('').map(c => c.charCodeAt(0)));
      const salt = combined.slice(0, 16), iv = combined.slice(16, 28), data = combined.slice(28);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return new TextDecoder().decode(decrypted);
    };

    // ----------------------------------------------------------------------
    // COMPONENTES MEMOIZADOS (gráficos)
    // ----------------------------------------------------------------------
    const DonutChart = memo(({ categoriesTotal }) => {
      const colors = ['#0ea5e9', '#8b5cf6', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#64748b', '#ec4899', '#84cc16'];
      const total = Object.values(categoriesTotal).reduce((a, b) => a + b.val, 0);
      if (total === 0) return React.createElement('div', { className: "h-48 flex items-center justify-center text-slate-500 text-sm" }, "Sem despesas registradas.");
      let cum = 0;
      const slices = Object.entries(categoriesTotal).sort((a,b)=>b[1].val-a[1].val).map(([cat, data], i) => {
        const pct = (data.val / total) * 100; const offset = cum; cum += pct;
        return { cat, val: data.val, count: data.count, pct, offset, color: colors[i % colors.length] };
      });
      return React.createElement('div', { className: "flex flex-col md:flex-row items-center gap-6 h-full w-full" },
        React.createElement('div', { className: "relative w-32 h-32 flex-shrink-0 drop-shadow-xl" },
          React.createElement('svg', { viewBox: "0 0 100 100", className: "w-full h-full transform -rotate-90" },
            React.createElement('circle', { cx: "50", cy: "50", r: "40", fill: "transparent", strokeWidth: "12", className: "stroke-slate-200 dark:stroke-slate-800 opacity-30" }),
            slices.map(s => React.createElement('circle', { key: s.cat, cx: "50", cy: "50", r: "40", fill: "transparent", strokeWidth: "12", stroke: s.color, strokeDasharray: `${(s.pct / 100) * 251.2} 251.2`, strokeDashoffset: -(s.offset / 100) * 251.2, className: "donut-segment" }))
          )
        ),
        React.createElement('div', { className: "flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2" },
          slices.map(s => React.createElement('div', { key: s.cat, className: "flex justify-between items-center text-sm" },
            React.createElement('div', { className: "flex items-center gap-2 flex-1 min-w-0" },
              React.createElement('span', { className: "w-3 h-3 rounded-full flex-shrink-0", style: { backgroundColor: s.color } }),
              React.createElement('span', { className: "font-medium truncate" }, s.cat)
            ),
            React.createElement('div', { className: "text-right flex-shrink-0" },
              React.createElement('div', { className: "font-bold" }, formatMoney(s.val)),
              React.createElement('div', { className: "text-[10px] text-slate-500" }, s.pct.toFixed(1), "% • ", s.count, " ", s.count === 1 ? 'item' : 'itens')
            )
          ))
        )
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const monthlyData = {};
      transactions.forEach(t => {
        let month = t.date.slice(0, 7);
        if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
        if (t.type === 'income') monthlyData[month].inc += t.value;
        else monthlyData[month].exp += t.value;
      });
      const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
      if(sortedMonths.length === 0) return React.createElement('div', { className: "h-48 flex items-center justify-center text-slate-500" }, "Sem dados históricos.");
      let maxVal = 1;
      const items = sortedMonths.map(m => {
        const i = (monthlyData[m].inc || 0) + (parseFloat(settings.salaryA)||0) + (parseFloat(settings.salaryB)||0);
        const e = monthlyData[m].exp || 0;
        if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
        return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
      });
      return React.createElement('div', { className: "h-48 flex items-end justify-between gap-2 mt-4" },
        items.map(item => {
          const iPct = (item.inc / maxVal) * 100;
          const ePct = (item.exp / maxVal) * 100;
          return React.createElement('div', { key: item.month, className: "flex flex-col items-center flex-1 group" },
            React.createElement('div', { className: "flex items-end justify-center w-full h-40 gap-1 relative" },
              React.createElement('div', { className: "w-1/3 max-w-[20px] bg-brand-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-brand-500/20", style: { height: `${iPct}%` } }),
              React.createElement('div', { className: "w-1/3 max-w-[20px] bg-rose-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-rose-500/20", style: { height: `${ePct}%` } }),
              React.createElement('div', { className: "absolute bottom-full mb-2 bg-slate-800 text-white text-[10px] p-2 rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10 hidden md:block" },
                React.createElement('p', { className: "text-brand-400" }, "Rec: ", formatMoney(item.inc)),
                React.createElement('p', { className: "text-rose-400" }, "Des: ", formatMoney(item.exp))
              )
            ),
            React.createElement('span', { className: "text-[10px] text-slate-500 mt-2 font-bold tracking-wider" }, item.month)
          );
        })
      );
    });

    // ----------------------------------------------------------------------
    // COMPONENTE PRINCIPAL App (sem Babel, usando React.createElement)
    // ----------------------------------------------------------------------
    const App = () => {
      // Estados principais
      const [isLoaded, setIsLoaded] = useState(false);
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [deletedRecords, setDeletedRecords] = useState([]);
      const [settings, setSettings] = useState({ salaryA: 0, salaryB: 0, nameA: 'Pessoa A', nameB: 'Pessoa B', updatedAt: Date.now() });
      const [monthFilter, setMonthFilter] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; });
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [syncCodeInput, setSyncCodeInput] = useState('');
      const [syncPassword, setSyncPassword] = useState('');
      const [showAI, setShowAI] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false); // loading para import/sync

      // Formulários
      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A', errors: {} });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0', errors: {} });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '', errors: {} });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, errors: {} });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', errors: {} });

      const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

      // Toast helper
      const showToast = useCallback((msg, isError = false) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);

      // Limpeza periódica de deletedRecords (a cada 30 dias)
      useEffect(() => {
        const lastClean = localStorage.getItem('lastDeletedClean');
        if (!lastClean || Date.now() - parseInt(lastClean) > 30 * 24 * 60 * 60 * 1000) {
          // Remove IDs mais antigos que 6 meses (baseado em nenhuma transação ativa)
          const sixMonthsAgo = Date.now() - 180 * 24 * 60 * 60 * 1000;
          const activeIds = new Set(transactions.map(t => t.id));
          setDeletedRecords(prev => prev.filter(id => activeIds.has(id) || (id.timestamp || 0) > sixMonthsAgo));
          localStorage.setItem('lastDeletedClean', Date.now().toString());
        }
      }, [transactions]);

      // Persistência IndexedDB
      useEffect(() => {
        Promise.all([
          get('dmx_transactions'), get('dmx_goals'), get('dmx_budgets'),
          get('dmx_subscriptions'), get('dmx_installments'), get('dmx_settings'), get('dmx_deleted')
        ]).then(([txs, gls, bdg, subs, insts, sets, dels]) => {
          if (txs) setTransactions(txs);
          if (gls) setGoals(gls);
          if (bdg) setBudgets(bdg);
          if (subs) setSubscriptions(subs);
          if (insts) setInstallments(insts);
          if (sets) setSettings(prev => ({ ...prev, ...sets, updatedAt: sets.updatedAt || Date.now() }));
          if (dels) setDeletedRecords(dels);
          setIsLoaded(true);
        });
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        set('dmx_transactions', transactions);
        set('dmx_goals', goals);
        set('dmx_budgets', budgets);
        set('dmx_subscriptions', subscriptions);
        set('dmx_installments', installments);
        set('dmx_settings', settings);
        set('dmx_deleted', deletedRecords);
      }, [transactions, goals, budgets, subscriptions, installments, settings, deletedRecords, isLoaded]);

      // Tema
      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // Dados derivados
      const filteredTransactions = useMemo(() => {
        if (!monthFilter) return transactions;
        return transactions.filter(t => t.date.startsWith(monthFilter));
      }, [transactions, monthFilter]);

      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => {
          if (t.type === 'income') inc += t.value;
          else exp += t.value;
        });
        const salaryTotal = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + salaryTotal, exp, balance: (inc + salaryTotal) - exp, rawInc: inc };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value;
            expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);

      // Orçamentos: verificar estouro
      const budgetStatus = useMemo(() => {
        const status = {};
        for (let cat in budgets) {
          const spent = categoriesTotal[cat]?.val || 0;
          const limit = budgets[cat];
          status[cat] = { spent, limit, percent: Math.min(100, (spent / limit) * 100), isOver: spent > limit };
          if (spent > limit) showToast(`⚠️ Orçamento estourado: ${cat} (${formatMoney(spent)} / ${formatMoney(limit)})`, true);
        }
        return status;
      }, [budgets, categoriesTotal]);

      // Split lógica
      const splitLogic = useMemo(() => {
        const salA = parseFloat(settings.salaryA) || 0;
        const salB = parseFloat(settings.salaryB) || 0;
        const totalSal = salA + salB;
        const ratioA = totalSal > 0 ? salA / totalSal : 0.5;
        const ratioB = totalSal > 0 ? salB / totalSal : 0.5;
        const jointExpenses = filteredTransactions.filter(t => t.scope === 'joint' && t.type === 'expense');
        const totalJointExp = jointExpenses.reduce((acc, t) => acc + t.value, 0);
        const paidByA = jointExpenses.filter(t => t.paidBy === 'A').reduce((acc, t) => acc + t.value, 0);
        const paidByB = jointExpenses.filter(t => t.paidBy === 'B').reduce((acc, t) => acc + t.value, 0);
        const owedByA = totalJointExp * ratioA;
        const owedByB = totalJointExp * ratioB;
        const balanceA = paidByA - owedByA;
        const balanceB = paidByB - owedByB;
        return { totalJointExp, ratioA, ratioB, paidByA, paidByB, owedByA, owedByB, balanceA, balanceB };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      // Automação (assinaturas e parcelas)
      useEffect(() => {
        if (!isLoaded) return;
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentMonthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        const currentDay = today.getDate();
        const maxDaysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        let newTxs = [];
        let subsUpdated = false;
        let instsUpdated = false;

        const nextSubs = subscriptions.map(sub => {
          if (!sub.active) return sub;
          const targetDay = Math.min(sub.dayOfMonth, maxDaysInMonth);
          const autoTxId = `sub_${sub.id}_${currentMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && currentDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: sub.desc, value: parseFloat(sub.value), type: 'expense', category: sub.category || 'Assinaturas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'subscription', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            subsUpdated = true;
          }
          return sub;
        });

        const nextInsts = installments.map(inst => {
          const paid = inst.paidInstallments !== undefined ? parseInt(inst.paidInstallments) : 0;
          const total = parseInt(inst.totalInstallments);
          if (inst.active === false || paid >= total) return inst;
          const targetDay = Math.min(inst.dayOfMonth, maxDaysInMonth);
          const autoTxId = `inst_${inst.id}_${currentMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && currentDay >= targetDay) {
            const parcelValue = parseFloat(inst.installmentValue);
            newTxs.push({ id: autoTxId, desc: `${inst.desc} (${paid + 1}/${total})`, value: parcelValue, type: 'expense', category: inst.category || 'Dívidas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'installment', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            instsUpdated = true;
            return { ...inst, paidInstallments: paid + 1, active: (paid + 1) < total, updatedAt: Date.now() };
          }
          return inst;
        });

        if (newTxs.length > 0) {
          setTransactions(prev => [...newTxs, ...prev]);
          if (subsUpdated || instsUpdated) showToast(`${newTxs.length} lançamento(s) automático(s) processado(s).`);
        }
        if (instsUpdated) setInstallments(nextInsts);
      }, [subscriptions, installments, transactions, isLoaded]);

      // Relatório IA (heurística)
      const generateAIReport = () => {
        const report = [];
        const balance = totals.inc - totals.exp;
        const saveRate = totals.inc > 0 ? (balance / totals.inc) * 100 : 0;
        if (totals.inc === 0) report.push({ type: 'warning', icon: '⚠️', title: 'Sem Renda Registrada', text: 'Vá em "Sync & Config" e cadastre o seu salário ou adicione receitas extras nas Transações.' });
        else if (totals.exp > totals.inc) report.push({ type: 'danger', icon: '🚨', title: 'Alerta Crítico: Gastos Excedentes', text: `Você gastou ${formatMoney(Math.abs(balance))} a mais do que ganhou este mês.` });
        else if (saveRate >= 20) report.push({ type: 'success', icon: '🏆', title: 'Saúde Impecável', text: `Parabéns! Você está poupando ${saveRate.toFixed(1)}% da sua renda.` });
        else report.push({ type: 'warning', icon: '📉', title: 'Atenção à Poupança', text: `Você está retendo apenas ${saveRate.toFixed(1)}% do que ganha.` });
        const cats = Object.entries(categoriesTotal).sort((a,b)=>b[1].val - a[1].val);
        if (cats.length > 0) {
          const [topCat, data] = cats[0];
          const pctOfTotal = (data.val / totals.exp) * 100;
          report.push({ type: 'info', icon: '💡', title: `Maior Foco Financeiro: ${topCat}`, text: `Esta categoria representa ${pctOfTotal.toFixed(1)}% das despesas.` });
        }
        return report;
      };

      // Handlers genéricos de validação
      const validateTx = () => {
        const errors = {};
        if (!txForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(txForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor deve ser maior que zero';
        setTxForm(prev => ({ ...prev, errors }));
        return Object.keys(errors).length === 0;
      };

      const handleSaveTransaction = () => {
        if (!validateTx()) return;
        const value = parseFloat(txForm.value);
        const category = txForm.customCategory.trim() || txForm.category;
        const payload = { ...txForm, category, value, updatedAt: Date.now() };
        if (txForm.id) setTransactions(prev => prev.map(t => t.id === txForm.id ? payload : t));
        else setTransactions(prev => [{ ...payload, id: generateId() }, ...prev]);
        setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A', errors: {} });
        showToast("Transação salva.");
      };

      const handleDeleteTransaction = (id) => {
        if (window.confirm("Apagar transação?")) {
          setDeletedRecords(prev => [...prev, id]);
          setTransactions(prev => prev.filter(t => t.id !== id));
          showToast("Eliminado.");
        }
      };

      // Orçamentos
      const handleSetBudget = () => {
        const errors = {};
        const limit = parseFloat(budgetForm.limit);
        if (isNaN(limit) || limit <= 0) errors.limit = 'Limite deve ser maior que zero';
        setBudgetForm(prev => ({ ...prev, errors }));
        if (Object.keys(errors).length) return;
        setBudgets(prev => ({ ...prev, [budgetForm.category]: limit }));
        setBudgetForm({ category: 'Alimentação', limit: '', errors: {} });
        showToast(`Orçamento para ${budgetForm.category} definido como ${formatMoney(limit)}`);
      };

      const handleDeleteBudget = (category) => {
        const newBudgets = { ...budgets };
        delete newBudgets[category];
        setBudgets(newBudgets);
        showToast(`Orçamento de ${category} removido.`);
      };

      // Importação CSV robusta
      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsProcessing(true);
        const reader = new FileReader();
        reader.onload = (evt) => {
          const text = evt.target.result;
          const lines = text.split(/\r?\n/);
          let added = 0;
          const newTxs = [];
          let startLine = 0;
          // Detecta cabeçalho
          const firstLine = lines[0].toLowerCase();
