<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finanças DMX – Enterprise</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 500: '#8b5cf6', 600: '#7c3aed' }
          }
        },
      },
    }
  </script>

  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- IndexedDB -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .dark .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .donut-segment { transition: stroke-dashoffset 1s ease-in-out; }
    
    /* Validação visual */
    .field-error { border-color: #f43f5e !important; background-color: rgba(244, 63, 94, 0.05) !important; }
    .error-message { color: #f43f5e; font-size: 0.7rem; margin-top: 4px; font-weight: 600; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0B1120] dark:text-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, memo } = React;
    const { get, set } = idbKeyval;

    // --- Utils & Crypto ---
    const getLocalDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const generateId = () => (window.crypto?.randomUUID ? crypto.randomUUID() : (Date.now() + Math.random()).toString());

    const deriveKey = async (password, salt) => {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
        keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
      );
    };
    const encryptData = async (text, password) => {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(text));
      const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      combined.set(salt, 0); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
      return btoa(String.fromCharCode(...combined));
    };
    const decryptData = async (base64, password) => {
      const combined = new Uint8Array(atob(base64).split('').map(c => c.charCodeAt(0)));
      const salt = combined.slice(0, 16), iv = combined.slice(16, 28), data = combined.slice(28);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return new TextDecoder().decode(decrypted);
    };

    const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

    // --- Componentes Memoizados (Do Código 1) ---
    const DonutChart = memo(({ categoriesTotal }) => {
      if (Object.keys(categoriesTotal).length === 0) return <p className="text-slate-500">Sem gastos.</p>;
      
      const sorted = Object.entries(categoriesTotal).sort((a,b) => b[1].val - a[1].val);
      const total = sorted.reduce((acc, curr) => acc + curr[1].val, 0);
      const colors = ['#0ea5e9', '#8b5cf6', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#64748b'];
      
      return (
        <div className="flex flex-col md:flex-row items-center gap-6">
          <div className="relative w-32 h-32 flex-shrink-0 drop-shadow-xl">
            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
              <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" className="stroke-slate-200 dark:stroke-slate-800 opacity-30" />
              {sorted.map(([cat, data], i) => {
                const pct = (data.val / total) * 100;
                const offset = sorted.slice(0, i).reduce((acc, curr) => acc + (curr[1].val / total) * 100, 0);
                return <circle key={cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" stroke={colors[i % colors.length]} strokeDasharray={`${(pct / 100) * 251.2} 251.2`} strokeDashoffset={-(offset / 100) * 251.2} className="donut-segment" />;
              })}
            </svg>
          </div>
          <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
            {sorted.map(([cat, data], i) => (
              <div key={cat} className="flex justify-between items-center text-sm gap-2">
                <div className="flex items-center gap-2 flex-1 min-w-0">
                  <span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: colors[i % colors.length]}}></span>
                  <span className="font-medium truncate">{cat}</span>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="font-bold">{formatMoney(data.val)}</div>
                  <div className="text-[10px] text-slate-500">{((data.val / total) * 100).toFixed(1)}% &bull; {data.count} un</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const monthlyData = {};
      transactions.forEach(t => {
        let month = t.date.slice(0, 7);
        if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
        t.type === 'income' ? monthlyData[month].inc += t.value : monthlyData[month].exp += t.value;
      });
      
      const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
      if(sortedMonths.length === 0) return <p className="text-slate-500 text-center py-10">Sem histórico.</p>;
      
      let maxVal = 1;
      const items = sortedMonths.map(m => {
        const i = (monthlyData[m].inc || 0) + (parseFloat(settings.salaryA)||0) + (parseFloat(settings.salaryB)||0);
        const e = monthlyData[m].exp || 0;
        if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
        return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
      });
      
      return (
        <div className="h-48 flex items-end justify-between gap-2 mt-4">
          {items.map(item => (
            <div key={item.month} className="flex flex-col items-center flex-1 group">
              <div className="flex items-end justify-center w-full h-40 gap-1 relative">
                <div className="w-1/3 max-w-[20px] bg-brand-500 rounded-t-md opacity-90 transition-all duration-700 group-hover:opacity-100" style={{ height: `${(item.inc / maxVal) * 100}%` }}></div>
                <div className="w-1/3 max-w-[20px] bg-rose-500 rounded-t-md opacity-90 transition-all duration-700 group-hover:opacity-100" style={{ height: `${(item.exp / maxVal) * 100}%` }}></div>
              </div>
              <span className="text-[10px] text-slate-500 mt-2 font-bold tracking-wider">{item.month}</span>
            </div>
          ))}
        </div>
      );
    });

    // --- App Component ---
    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [deletedRecords, setDeletedRecords] = useState([]);
      const [settings, setSettings] = useState({ salaryA: 0, salaryB: 0, nameA: 'Pessoa A', nameB: 'Pessoa B', updatedAt: Date.now() });
      
      const [monthFilter, setMonthFilter] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; });
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [syncCodeInput, setSyncCodeInput] = useState('');
      const [syncPassword, setSyncPassword] = useState('');
      const [showAI, setShowAI] = useState(false);

      // Forms com estados de erro (Do Código 1)
      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A', errors: {} });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0', errors: {} });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '', errors: {} });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, errors: {} });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', errors: {} });

      const showToast = useCallback((msg, isError = false) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);

      // DB Load/Save
      useEffect(() => {
        Promise.all([ get('dmx_transactions'), get('dmx_goals'), get('dmx_budgets'), get('dmx_subscriptions'), get('dmx_installments'), get('dmx_settings'), get('dmx_deleted') ])
        .then(([txs, gls, bdg, subs, insts, sets, dels]) => {
          if (txs) setTransactions(txs); if (gls) setGoals(gls); if (bdg) setBudgets(bdg); if (subs) setSubscriptions(subs);
          if (insts) setInstallments(insts); if (sets) setSettings(prev => ({ ...prev, ...sets })); if (dels) setDeletedRecords(dels);
          setIsLoaded(true);
        });
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        set('dmx_transactions', transactions); set('dmx_goals', goals); set('dmx_budgets', budgets);
        set('dmx_subscriptions', subscriptions); set('dmx_installments', installments); set('dmx_settings', settings); set('dmx_deleted', deletedRecords);
      }, [transactions, goals, budgets, subscriptions, installments, settings, deletedRecords, isLoaded]);

      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // Derived Data
      const filteredTransactions = useMemo(() => transactions.filter(t => t.date.startsWith(monthFilter)), [transactions, monthFilter]);

      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => t.type === 'income' ? inc += t.value : exp += t.value);
        const salaryTotal = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + salaryTotal, exp, balance: (inc + salaryTotal) - exp };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value; expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);

      const totalSubscriptions = useMemo(() => subscriptions.filter(s => s.active).reduce((acc, curr) => acc + parseFloat(curr.value), 0), [subscriptions]);

      const splitLogic = useMemo(() => {
        const salA = parseFloat(settings.salaryA) || 0; const salB = parseFloat(settings.salaryB) || 0; const totalSal = salA + salB;
        const ratioA = totalSal > 0 ? salA / totalSal : 0.5; const ratioB = totalSal > 0 ? salB / totalSal : 0.5;
        const jointExpenses = filteredTransactions.filter(t => t.scope === 'joint' && t.type === 'expense');
        const totalJointExp = jointExpenses.reduce((acc, t) => acc + t.value, 0);
        const paidByA = jointExpenses.filter(t => t.paidBy === 'A').reduce((acc, t) => acc + t.value, 0);
        const paidByB = jointExpenses.filter(t => t.paidBy === 'B').reduce((acc, t) => acc + t.value, 0);
        return { totalJointExp, ratioA, ratioB, balanceA: paidByA - (totalJointExp * ratioA), balanceB: paidByB - (totalJointExp * ratioB) };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      // Automações (Assinaturas e Parcelas)
      useEffect(() => {
        if (!isLoaded) return;
        const d = new Date(); const curYear = d.getFullYear(); const curMonth = d.getMonth(); const curDay = d.getDate();
        const curMonthStr = `${curYear}-${String(curMonth + 1).padStart(2, '0')}`;
        const maxDays = new Date(curYear, curMonth + 1, 0).getDate();
        let newTxs = []; let subsUpdated = false; let instsUpdated = false;

        const nextSubs = subscriptions.map(sub => {
          if (!sub.active) return sub;
          const targetDay = Math.min(sub.dayOfMonth, maxDays);
          const autoTxId = `sub_${sub.id}_${curMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && curDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: sub.desc, value: parseFloat(sub.value), type: 'expense', category: sub.category || 'Assinaturas', date: `${curMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'subscription', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            subsUpdated = true;
          }
          return sub;
        });

        const nextInsts = installments.map(inst => {
          const paid = parseInt(inst.paidInstallments) || 0; const total = parseInt(inst.totalInstallments);
          if (inst.active === false || paid >= total) return inst;
          const targetDay = Math.min(inst.dayOfMonth, maxDays);
          const autoTxId = `inst_${inst.id}_${curMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && curDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: `${inst.desc} (${paid + 1}/${total})`, value: parseFloat(inst.installmentValue), type: 'expense', category: inst.category || 'Dívidas', date: `${curMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'installment', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            instsUpdated = true;
            return { ...inst, paidInstallments: paid + 1, active: (paid + 1) < total, updatedAt: Date.now() };
          }
          return inst;
        });

        if (newTxs.length > 0) { setTransactions(prev => [...newTxs, ...prev]); showToast(`${newTxs.length} lançamento(s) automático(s) gerado(s).`); }
        if (instsUpdated) setInstallments(nextInsts);
      }, [subscriptions, installments, transactions, isLoaded]);

      // Handlers com Validação Robusta (Do Código 1)
      const handleSaveTx = () => {
        const errors = {};
        if (!txForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(txForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor deve ser maior que zero';
        if (Object.keys(errors).length) { setTxForm({ ...txForm, errors }); return; }
        
        const payload = { ...txForm, category: txForm.customCategory.trim() || txForm.category, value: val, updatedAt: Date.now() };
        if (txForm.id) setTransactions(prev => prev.map(t => t.id === txForm.id ? payload : t));
        else setTransactions(prev => [{ ...payload, id: generateId() }, ...prev]);
        setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A', errors: {} });
        showToast("Transação salva.");
      };

      const handleSaveSub = () => {
        const errors = {};
        if (!subForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(subForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        const day = parseInt(subForm.dayOfMonth);
        if (isNaN(day) || day < 1 || day > 31) errors.dayOfMonth = 'Dia inválido (1-31)';
        if (Object.keys(errors).length) { setSubForm({ ...subForm, errors }); return; }
        
        const payload = { ...subForm, value: val, dayOfMonth: day, active: subForm.id ? subForm.active : true, updatedAt: Date.now() };
        if (subForm.id) setSubscriptions(prev => prev.map(s => s.id === subForm.id ? payload : s));
        else setSubscriptions(prev => [...prev, { ...payload, id: generateId() }]);
        setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, errors: {} });
        showToast("Assinatura salva.");
      };

      const handleSaveInst = () => {
        const errors = {};
        if (!instForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(instForm.installmentValue);
        if (isNaN(val) || val <= 0) errors.installmentValue = 'Valor da parcela inválido';
        const tot = parseInt(instForm.totalInstallments);
        if (isNaN(tot) || tot < 2) errors.totalInstallments = 'Total de parcelas >= 2';
        const paid = parseInt(instForm.paidInstallments) || 0;
        const day = parseInt(instForm.dayOfMonth);
        if (isNaN(day) || day < 1 || day > 31) errors.dayOfMonth = 'Dia inválido (1-31)';
        if (Object.keys(errors).length) { setInstForm({ ...instForm, errors }); return; }
        
        const payload = { ...instForm, installmentValue: val, totalInstallments: tot, paidInstallments: paid, dayOfMonth: day, active: paid < tot, updatedAt: Date.now() };
        if (instForm.id) setInstallments(prev => prev.map(i => i.id === instForm.id ? payload : i));
        else setInstallments(prev => [...prev, { ...payload, id: generateId() }]);
        setInstForm({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', errors: {} });
        showToast("Parcelamento salvo.");
      };

      const handleSaveGoal = () => {
        const errors = {};
        if (!goalForm.name.trim()) errors.name = 'Nome obrigatório';
        const target = parseFloat(goalForm.target);
        if (isNaN(target) || target <= 0) errors.target = 'Valor alvo inválido';
        if (Object.keys(errors).length) { setGoalForm({ ...goalForm, errors }); return; }
        
        const current = parseFloat(goalForm.current) || 0;
        const payload = { ...goalForm, target, current, updatedAt: Date.now() };
        if (goalForm.id) setGoals(prev => prev.map(g => g.id === goalForm.id ? payload : g));
        else setGoals(prev => [...prev, { ...payload, id: generateId() }]);
        setGoalForm({ id: null, name: '', target: '', current: '0', errors: {} });
        showToast("Meta salva.");
      };

      const handleDelete = (type, id) => {
        if (!window.confirm("Apagar registo?")) return;
        setDeletedRecords(prev => [...prev, id]);
        if (type === 'tx') setTransactions(prev => prev.filter(t => t.id !== id));
        if (type === 'sub') setSubscriptions(prev => prev.filter(s => s.id !== id));
        if (type === 'inst') setInstallments(prev => prev.filter(i => i.id !== id));
        if (type === 'goal') setGoals(prev => prev.filter(g => g.id !== id));
        showToast("Eliminado com sucesso.");
      };

      // Sync & CSV
      const handleGenerateSyncCode = async () => {
        if (!syncPassword) return showToast("Digite uma senha segura primeiro.", true);
        try {
          const payload = { transactions, goals, budgets, subscriptions, installments, settings, deletedRecords };
          const encrypted = await encryptData(JSON.stringify(payload), syncPassword);
          navigator.clipboard?.writeText(encrypted);
          setSyncCodeInput(encrypted); showToast("Código gerado e copiado!");
        } catch (e) { showToast("Erro de criptografia.", true); }
      };

      const handleImportSyncCode = async () => {
        if (!syncCodeInput || !syncPassword) return showToast("Cole o código e digite a senha.", true);
        try {
          const decrypted = await decryptData(syncCodeInput, syncPassword);
          const data = JSON.parse(decrypted);
          const newDeleted = Array.from(new Set([...deletedRecords, ...(data.deletedRecords || [])]));
          
          const mergeCRDT = (local = [], remote = []) => {
            const map = new Map();
            local.forEach(i => map.set(i.id, i));
            remote.forEach(i => {
              if (newDeleted.includes(i.id)) return;
              const existing = map.get(i.id);
              if (!existing || (i.updatedAt || 0) > (existing.updatedAt || 0)) map.set(i.id, i);
            });
            return Array.from(map.values()).filter(i => !newDeleted.includes(i.id));
          };

          setTransactions(mergeCRDT(transactions, data.transactions)); setGoals(mergeCRDT(goals, data.goals));
          setSubscriptions(mergeCRDT(subscriptions, data.subscriptions)); setInstallments(mergeCRDT(installments, data.installments));
          setDeletedRecords(newDeleted);
          if (data.settings && (data.settings.updatedAt || 0) > (settings.updatedAt || 0)) setSettings(data.settings);
          setSyncCodeInput(''); setSyncPassword(''); showToast("Sync CRDT Concluído! 🚀");
        } catch (e) { showToast("Senha incorreta ou código inválido.", true); }
      };

      const handleExportCSV = () => {
        let csv = "Data,Tipo,Categoria,Descricao,Valor,Scope,PagoPor\n";
        transactions.forEach(t => csv += `${t.date},${t.type},${t.category},"${t.desc.replace(/"/g, '""')}",${t.value},${t.scope || 'joint'},${t.paidBy || 'A'}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = "financas_dmx.csv"; link.click(); showToast("CSV exportado.");
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const lines = evt.target.result.split(/\r?\n/); let added = 0; const newTxs = [];
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (columns.length >= 5) {
              const [date, type, category, desc, value] = columns.map(c => c.trim().replace(/^"|"$/g, ''));

                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Total de Parcelas</label>
                        <input type="number" min="2" value={instForm.totalInstallments} onChange={e=>setInstForm({...instForm, totalInstallments: e.target.value, errors: {...instForm.errors, totalInstallments: null}})} className={`w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none text-center ${instForm.errors.totalInstallments ? 'field-error' : ''}`} />
                        {instForm.errors.totalInstallments && <div className="error-message">{instForm.errors.totalInstallments}</div>}
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já pagas (0 para nenhuma)</label>
                        <input type="number" min="0" value={instForm.paidInstallments} onChange={e=>setInstForm({...instForm, paidInstallments: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none text-center" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Vencimento (Dia)</label>
                        <input type="number" min="1" max="31" value={instForm.dayOfMonth} onChange={e=>setInstForm({...instForm, dayOfMonth: e.target.value, errors: {...instForm.errors, dayOfMonth: null}})} className={`w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none text-center ${instForm.errors.dayOfMonth ? 'field-error' : ''}`} />
                        {instForm.errors.dayOfMonth && <div className="error-message">{instForm.errors.dayOfMonth}</div>}
                      </div>
                      <div className="lg:col-span-6 flex justify-end gap-3 mt-4">
                        {instForm.id && <button onClick={()=>setInstForm({id:null,desc:'',installmentValue:'',paidInstallments:0,totalInstallments:2,dayOfMonth:1,category:'Dívidas',errors:{}})} className="px-8 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button onClick={handleSaveInst} className="bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-10 rounded-xl transition-all shadow-lg shadow-brand-500/30">Salvar Parcelamento</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {installments.length === 0 ? <div className="col-span-full text-center py-10 text-slate-500">Sem parcelamentos ativos.</div> : installments.map(i => {
                      const cur = Math.min(i.paidInstallments || 0, i.totalInstallments);
                      const pct = i.totalInstallments > 0 ? (cur / i.totalInstallments) * 100 : 0;
                      return (
                        <div key={i.id} className={`glass-card p-6 rounded-3xl transition-all ${i.active ? 'shadow-md border-transparent' : 'opacity-70 border-brand-500/50'}`}>
                          <div className="flex justify-between items-start mb-4">
                            <h4 className="font-extrabold text-lg">{i.desc}</h4>
                            <div className="flex gap-2"><button onClick={()=>setInstForm(i)} className="text-slate-400 hover:text-brand-500">✏️</button><button onClick={()=>handleDelete('inst', i.id)} className="text-slate-400 hover:text-rose-500">🗑️</button></div>
                          </div>
                          <div className="mb-4">
                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-2"><span>Progresso: {cur}/{i.totalInstallments}</span><span>{pct.toFixed(0)}%</span></div>
                            <div className="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden"><div className={`h-full transition-all duration-1000 ${i.active ? 'bg-brand-500' : 'bg-emerald-500'}`} style={{width: `${pct}%`}}></div></div>
                          </div>
                          <div className="flex justify-between items-end">
                            <div><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Valor Parcela</p><p className="font-black text-xl text-slate-800 dark:text-white">{formatMoney(i.installmentValue)}</p><p className="text-[10px] text-slate-500 font-medium">Total: {formatMoney(i.installmentValue * i.totalInstallments)}</p></div>
                            <div className="text-right"><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Dia Venc.</p><p className="font-black text-lg text-brand-500">{i.dayOfMonth}</p></div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}

              {/* TAB: GOALS */}
              {activeTab === 'goals' && (
                <div className="space-y-6 animate-in fade-in">
                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-brand-500">
                    <h3 className="font-extrabold text-xl mb-6">{goalForm.id ? 'Atualizar Meta' : 'Nova Meta Financeira'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-5 items-end">
                      <div className="md:col-span-2">
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Objetivo (Ex: Viagem)</label>
                        <input type="text" value={goalForm.name} onChange={e=>setGoalForm({...goalForm, name: e.target.value, errors: {...goalForm.errors, name: null}})} className={`w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 ${goalForm.errors.name ? 'field-error' : ''}`} />
                        {goalForm.errors.name && <div className="error-message">{goalForm.errors.name}</div>}
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Alvo (R$)</label>
                        <input type="number" step="0.01" value={goalForm.target} onChange={e=>setGoalForm({...goalForm, target: e.target.value, errors: {...goalForm.errors, target: null}})} className={`w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 ${goalForm.errors.target ? 'field-error' : ''}`} />
                        {goalForm.errors.target && <div className="error-message">{goalForm.errors.target}</div>}
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já Guardado (R$)</label>
                        <input type="number" step="0.01" value={goalForm.current} onChange={e=>setGoalForm({...goalForm, current: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500" />
                      </div>
                      <div className="md:col-span-4 flex gap-2 justify-end mt-4">
                        {goalForm.id && <button onClick={()=>setGoalForm({id:null,name:'',target:'',current:'0',errors:{}})} className="px-6 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button onClick={handleSaveGoal} className="bg-brand-500 text-white font-bold py-3 px-10 rounded-xl shadow-lg shadow-brand-500/30">Salvar Meta</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {goals.length === 0 ? <div className="col-span-full text-center py-10 text-slate-500">Sem metas registadas.</div> : goals.map(g => {
                      const pct = Math.min(100, (g.current / g.target) * 100);
                      return (
                        <div key={g.id} className="glass-card p-6 rounded-3xl flex flex-col justify-between shadow-sm">
                          <div>
                            <div className="flex justify-between items-start mb-2"><h3 className="font-extrabold text-lg text-slate-800 dark:text-white">{g.name}</h3><div className="flex gap-1"><button onClick={()=>setGoalForm(g)} className="p-2 text-slate-400 hover:text-brand-500">✏️</button><button onClick={()=>handleDelete('goal', g.id)} className="p-2 text-slate-400 hover:text-rose-500">🗑️</button></div></div>
                            <p className="text-xs text-slate-500 font-medium mb-6"><span className="font-bold text-slate-700 dark:text-slate-300">{formatMoney(g.current)}</span> de {formatMoney(g.target)}</p>
                          </div>
                          <div>
                            <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2"><div className="h-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-1000" style={{ width: `${pct}%` }}></div></div>
                            <div className="text-right text-[10px] font-black text-brand-500">{pct.toFixed(1)}% CONCLUÍDO</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* TAB: BUDGETS */}
              {activeTab === 'budgets' && (
                <div className="space-y-6 animate-in fade-in">
                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-brand-500">
                    <h3 className="font-extrabold text-xl mb-6">Orçamentos Mensais</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Categoria</label>
                        <select value={budgetForm.category} onChange={e=>setBudgetForm({...budgetForm, category: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none">
                          {predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Limite Máximo (R$)</label>
                        <input type="number" step="0.01" value={budgetForm.limit} onChange={e=>setBudgetForm({...budgetForm, limit: e.target.value, errors: {...budgetForm.errors, limit: null}})} className={`w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none ${budgetForm.errors.limit ? 'field-error' : ''}`} />
                        {budgetForm.errors.limit && <div className="error-message">{budgetForm.errors.limit}</div>}
                      </div>
                      <button onClick={()=>{
                        const lim = parseFloat(budgetForm.limit); 
                        if(isNaN(lim)||lim<=0) { setBudgetForm({...budgetForm, errors: {limit: 'Valor inválido'}}); return; }
                        setBudgets(prev => ({ ...prev, [budgetForm.category]: lim, updatedAt: Date.now() })); 
                        setBudgetForm({ category: 'Alimentação', limit: '', errors: {} }); 
                        showToast("Orçamento salvo.");
                      }} className="bg-brand-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-brand-600 transition-colors">Definir Orçamento</button>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {Object.keys(budgets).filter(k => k !== 'updatedAt').length === 0 ? <div className="col-span-full text-center py-10 text-slate-500">Sem orçamentos.</div> : Object.entries(budgets).map(([cat, limit]) => {
                      if (cat === 'updatedAt') return null;
                      const spent = categoriesTotal[cat]?.val || 0; const pct = Math.min(100, (spent / limit) * 100); const isOver = spent > limit;
                      return (
                        <div key={cat} className="glass-card p-6 rounded-3xl flex flex-col justify-between shadow-sm">
                          <div>
                            <div className="flex justify-between items-start mb-2"><h3 className="font-extrabold text-lg">{cat}</h3><button onClick={()=>{const b={...budgets}; delete b[cat]; setBudgets(b);}} className="p-2 text-slate-400 hover:text-rose-500">🗑️</button></div>
                            <p className="text-sm font-medium mb-4">Gasto: {formatMoney(spent)} / {formatMoney(limit)}</p>
                          </div>
                          <div>
                            <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2"><div className={`h-full transition-all duration-1000 ${isOver ? 'bg-rose-500' : 'bg-brand-500'}`} style={{ width: `${pct}%` }}></div></div>
                            <div className={`text-right text-[10px] font-black ${isOver ? 'text-rose-500' : 'text-brand-500'}`}>{pct.toFixed(1)}% UTILIZADO</div>
                            {isOver && <div className="mt-2 text-rose-500 text-xs font-bold">⚠️ Limite ultrapassado!</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* TAB: SYNC */}
              {activeTab === 'sync' && (
                <div className="space-y-6 animate-in fade-in">
                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-emerald-500">
                    <h2 className="font-black text-2xl mb-6">Configurações Base (Trilateral)</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                        <h3 className="font-bold mb-4 text-brand-600">Perfil Pessoa A</h3>
                        <input type="text" value={settings.nameA} onChange={e=>setSettings({...settings, nameA: e.target.value, updatedAt: Date.now()})} className="w-full mb-3 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none font-bold" placeholder="Nome A" />
                        <input type="number" step="0.01" value={settings.salaryA} onChange={e=>setSettings({...settings, salaryA: e.target.value, updatedAt: Date.now()})} className="w-full px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none" placeholder="Salário Base A" />
                      </div>
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                        <h3 className="font-bold mb-4 text-partner-600">Perfil Pessoa B</h3>
                        <input type="text" value={settings.nameB} onChange={e=>setSettings({...settings, nameB: e.target.value, updatedAt: Date.now()})} className="w-full mb-3 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none font-bold" placeholder="Nome B" />
                        <input type="number" step="0.01" value={settings.salaryB} onChange={e=>setSettings({...settings, salaryB: e.target.value, updatedAt: Date.now()})} className="w-full px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none" placeholder="Salário Base B" />
                      </div>
                    </div>
                  </div>

                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-brand-500">
                    <h2 className="font-black text-2xl mb-2">Sync Seguro (AES-GCM & CRDTs)</h2>
                    <p className="text-sm text-slate-500 mb-6">Os dados são encriptados ponta-a-ponta (military-grade). Definam a MESMA senha nos dois telemóveis para conseguir fundir os dados.</p>
                    <input type="password" value={syncPassword} onChange={e=>setSyncPassword(e.target.value)} className="w-full max-w-sm mb-6 px-5 py-3 bg-white dark:bg-slate-800 rounded-xl outline-none font-bold border border-slate-200 dark:border-slate-700" placeholder="Senha Secreta do Casal" />
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <button onClick={handleGenerateSyncCode} className="bg-brand-500 text-white font-bold py-4 rounded-xl hover:bg-brand-600 transition-colors shadow-lg shadow-brand-500/30">1. Gerar Código Seguro e Copiar</button>
                      <div className="flex flex-col gap-2">
                        <textarea value={syncCodeInput} onChange={e=>setSyncCodeInput(e.target.value)} className="h-16 px-4 py-3 text-xs rounded-xl outline-none bg-white dark:bg-slate-800 resize-none font-mono border border-slate-200 dark:border-slate-700" placeholder="Cole o código do seu parceiro aqui..."></textarea>
                        <button onClick={handleImportSyncCode} className="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors shadow-lg shadow-blue-500/30">2. Descriptografar & Fundir</button>
                      </div>
                    </div>
                  </div>

                  <div className="glass-card p-8 rounded-3xl flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div><h3 className="font-bold mb-1 text-lg">Dados Tradicionais (CSV)</h3><p className="text-xs text-slate-500">Exporte para Excel ou importe o seu histórico.</p></div>
                    <div className="flex gap-4">
                      <button onClick={handleExportCSV} className="bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-emerald-600 shadow-md">Exportar</button>
                      <label className="bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600 font-bold py-3 px-6 rounded-xl cursor-pointer shadow-md transition-colors">Importar <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" /></label>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
          
          {/* Toasts */}
          <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
            {toasts.map(t => (
              <div key={t.id} className={`px-4 py-3 rounded-xl shadow-xl font-bold text-sm bg-white dark:bg-slate-800 border-l-4 ${t.isError ? 'border-rose-500 text-rose-600 dark:text-rose-400' : 'border-brand-500 text-brand-600 dark:text-brand-400'}`}>
                {t.msg}
              </div>
            ))}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
