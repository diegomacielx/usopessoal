<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finanças DMX</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 500: '#8b5cf6', 600: '#7c3aed' }
          }
        },
      },
    }
  </script>

  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- IndexedDB via idb-keyval -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; transition: background-color 0.3s ease, color 0.3s ease; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; }
    .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
    .dark .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .donut-segment { transition: stroke-dashoffset 1s ease-in-out; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0B1120] dark:text-slate-100 min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const { get, set } = idbKeyval;

    // --- Web Crypto API (AES-GCM) para Sincronização Segura ---
    const deriveKey = async (password, salt) => {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return await crypto.subtle.deriveKey(
            { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
            keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
        );
    };

    const encryptData = async (text, password) => {
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await deriveKey(password, salt);
        const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(text));
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...combined));
    };

    const decryptData = async (base64, password) => {
        const combined = new Uint8Array(atob(base64).split('').map(c => c.charCodeAt(0)));
        const salt = combined.slice(0, 16), iv = combined.slice(16, 28), data = combined.slice(28);
        const key = await deriveKey(password, salt);
        const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
        return new TextDecoder().decode(decrypted);
    };

    function App() {
      const [isLoaded, setIsLoaded] = useState(false);

      // --- Core States ---
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [deletedRecords, setDeletedRecords] = useState([]);
      const [settings, setSettings] = useState({ 
        salaryA: 0, salaryB: 0, nameA: 'Pessoa A', nameB: 'Pessoa B' 
      });
      
      const [monthFilter, setMonthFilter] = useState(() => {
        const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });
      
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [syncCodeInput, setSyncCodeInput] = useState('');
      const [syncPassword, setSyncPassword] = useState('');
      const [showAI, setShowAI] = useState(false);

      // --- Formulários ---
      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: new Date().toISOString().slice(0, 10), scope: 'joint', paidBy: 'A' });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0' });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '' });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' });

      // --- Persistência Assíncrona (IndexedDB) ---
      useEffect(() => {
        Promise.all([
          get('dmx_transactions'), get('dmx_goals'), get('dmx_budgets'), 
          get('dmx_subscriptions'), get('dmx_installments'), get('dmx_settings'), get('dmx_deleted')
        ]).then(([txs, gls, bdg, subs, insts, sets, dels]) => {
          if (txs) setTransactions(txs);
          if (gls) setGoals(gls);
          if (bdg) setBudgets(bdg);
          if (subs) setSubscriptions(subs);
          if (insts) setInstallments(insts);
          if (sets) setSettings({...settings, ...sets});
          if (dels) setDeletedRecords(dels);
          setIsLoaded(true);
        });
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        set('dmx_transactions', transactions);
        set('dmx_goals', goals);
        set('dmx_budgets', budgets);
        set('dmx_subscriptions', subscriptions);
        set('dmx_installments', installments);
        set('dmx_settings', settings);
        set('dmx_deleted', deletedRecords);
      }, [transactions, goals, budgets, subscriptions, installments, settings, deletedRecords, isLoaded]);

      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // --- Utilitários ---
      const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      const generateId = () => (window.crypto?.randomUUID ? crypto.randomUUID() : (Date.now() + Math.random()).toString());

      const showToast = (msg, isError = false) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };

      const markAsDeleted = (id) => setDeletedRecords(prev => [...prev, id]);

      const filteredTransactions = useMemo(() => {
        if (!monthFilter) return transactions;
        return transactions.filter(t => t.date.startsWith(monthFilter));
      }, [transactions, monthFilter]);

      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => {
          if (t.type === 'income') inc += t.value;
          else exp += t.value;
        });
        const salaryTotal = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + salaryTotal, exp, balance: (inc + salaryTotal) - exp, rawInc: inc };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value;
            expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);

      const totalSubscriptions = useMemo(() => subscriptions.filter(s => s.active).reduce((acc, curr) => acc + parseFloat(curr.value), 0), [subscriptions]);

      // --- Lógica de Acerto de Contas (Trilateral) ---
      const splitLogic = useMemo(() => {
        const salA = parseFloat(settings.salaryA) || 0;
        const salB = parseFloat(settings.salaryB) || 0;
        const totalSal = salA + salB;
        const ratioA = totalSal > 0 ? salA / totalSal : 0.5;
        const ratioB = totalSal > 0 ? salB / totalSal : 0.5;

        const jointExpenses = filteredTransactions.filter(t => t.scope === 'joint' && t.type === 'expense');
        const totalJointExp = jointExpenses.reduce((acc, t) => acc + t.value, 0);
        const paidByA = jointExpenses.filter(t => t.paidBy === 'A').reduce((acc, t) => acc + t.value, 0);
        const paidByB = jointExpenses.filter(t => t.paidBy === 'B').reduce((acc, t) => acc + t.value, 0);

        const owedByA = totalJointExp * ratioA;
        const owedByB = totalJointExp * ratioB;

        const balanceA = paidByA - owedByA;
        const balanceB = paidByB - owedByB;
        
        return { totalJointExp, ratioA, ratioB, paidByA, paidByB, owedByA, owedByB, balanceA, balanceB };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      // --- Automações (LWW Time-based) ---
      useEffect(() => {
        if (!isLoaded) return;
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentMonthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        const currentDay = today.getDate();
        const maxDaysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        let newTxs = [];
        let subsUpdated = false;
        let instsUpdated = false;

        const nextSubs = subscriptions.map(sub => {
          if (!sub.active) return sub;
          const targetDay = Math.min(sub.dayOfMonth, maxDaysInMonth);
          const autoTxId = `sub_${sub.id}_${currentMonthStr}`;
          
          if (!transactions.some(t => t.id === autoTxId) && currentDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: sub.desc, value: parseFloat(sub.value), type: 'expense', category: sub.category || 'Assinaturas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'subscription', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            subsUpdated = true;
          }
          return sub;
        });

        const nextInsts = installments.map(inst => {
          const paid = inst.paidInstallments !== undefined ? parseInt(inst.paidInstallments) : 0;
          const total = parseInt(inst.totalInstallments);
          if (inst.active === false || paid >= total) return inst;
          
          const targetDay = Math.min(inst.dayOfMonth, maxDaysInMonth);
          const autoTxId = `inst_${inst.id}_${currentMonthStr}`;

          if (!transactions.some(t => t.id === autoTxId) && currentDay >= targetDay) {
            const parcelValue = parseFloat(inst.installmentValue);
            newTxs.push({ id: autoTxId, desc: `${inst.desc} (${paid + 1}/${total})`, value: parcelValue, type: 'expense', category: inst.category || 'Dívidas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'installment', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            instsUpdated = true;
            return { ...inst, paidInstallments: paid + 1, active: (paid + 1) < total, updatedAt: Date.now() };
          }
          return inst;
        });

        if (newTxs.length > 0) {
          setTransactions(prev => [...newTxs, ...prev]);
          if(subsUpdated || instsUpdated) showToast(`${newTxs.length} lançamento(s) automático(s) processado(s).`);
        }
        if (instsUpdated) setInstallments(nextInsts);

      }, [subscriptions, installments, transactions, isLoaded]);

      // Lógica do Analista IA (Heurística Local)
      const generateAIReport = () => {
        const report = [];
        const balance = totals.inc - totals.exp;
        const saveRate = totals.inc > 0 ? (balance / totals.inc) * 100 : 0;

        if (totals.inc === 0) {
            report.push({ type: 'warning', icon: '⚠️', title: 'Sem Renda Registrada', text: 'Vá em "Sync & Config" e cadastre o seu salário ou adicione receitas extras nas Transações.' });
        } else if (totals.exp > totals.inc) {
            report.push({ type: 'danger', icon: '🚨', title: 'Alerta Crítico: Gastos Excedentes', text: `Você gastou ${formatMoney(Math.abs(balance))} a mais do que ganhou este mês. Você está consumindo reservas ou criando dívidas.` });
        } else if (saveRate >= 20) {
            report.push({ type: 'success', icon: '🏆', title: 'Saúde Impecável', text: `Parabéns! Você está poupando ${saveRate.toFixed(1)}% da sua renda. A regra de ouro é poupar pelo menos 20%. Mantenha o foco.` });
        } else {
            report.push({ type: 'warning', icon: '📉', title: 'Atenção à Poupança', text: `Você está retendo apenas ${saveRate.toFixed(1)}% do que ganha. Tente otimizar gastos não essenciais para chegar à meta de 20%.` });
        }

        const cats = Object.entries(categoriesTotal).sort((a,b)=>b[1].val - a[1].val);
        if (cats.length > 0) {
            const [topCat, data] = cats[0];
            const pctOfTotal = (data.val / totals.exp) * 100;
            
            let advice = `Esta categoria representa ${pctOfTotal.toFixed(1)}% de todas as suas despesas mensais.`;
            if (data.count >= 10) {
                advice += ` Cuidado: você registrou ${data.count} compras diferentes só aqui. O alto volume de pequenas compras costuma ser o maior destruidor de orçamentos.`;
            } else if (pctOfTotal > 40 && topCat !== 'Habitação' && topCat !== 'Dívidas') {
                advice += ` Estar concentrando mais de 40% da renda em uma única área pode desequilibrar suas metas de longo prazo.`;
            }
            report.push({ type: 'info', icon: '💡', title: `Maior Foco Financeiro: ${topCat}`, text: advice });
        }

        const activeSubs = subscriptions.filter(s => s.active);
        if (activeSubs.length >= 4) {
            const subVal = activeSubs.reduce((acc, s) => acc + parseFloat(s.value), 0);
            report.push({ type: 'warning', icon: '👀', title: 'Alerta de Custo Fixo Elevado', text: `Você possui ${activeSubs.length} assinaturas ativas totalizando ${formatMoney(subVal)}. É comum esquecermos serviços que não usamos. Faça uma revisão.` });
        }

        return report;
      };

      // --- Sync e Exportação ---
      const handleGenerateSyncCode = async () => {
        if (!syncPassword) return showToast("Digite uma senha segura primeiro.", true);
        try {
          const payload = { transactions, goals, budgets, subscriptions, installments, settings, deletedRecords };
          const encrypted = await encryptData(JSON.stringify(payload), syncPassword);
          navigator.clipboard?.writeText(encrypted).then(() => showToast("Código Criptografado Copiado!")).catch(() => showToast("Copie manualmente."));
          setSyncCodeInput(encrypted);
        } catch (e) { showToast("Erro ao gerar criptografia.", true); }
      };

      const handleImportSyncCode = async () => {
        if (!syncCodeInput || !syncPassword) return showToast("Cole o código e forneça a senha correta.", true);
        try {
          const decrypted = await decryptData(syncCodeInput, syncPassword);
          const data = JSON.parse(decrypted);
          const newDeleted = Array.from(new Set([...deletedRecords, ...(data.deletedRecords || [])]));

          const mergeCRDT = (local = [], remote = []) => {
            const map = new Map();
            local.forEach(i => map.set(i.id, i));
            remote.forEach(i => {
              if (newDeleted.includes(i.id)) return;
              const existing = map.get(i.id);
              if (!existing || (i.updatedAt || 0) > (existing.updatedAt || 0)) map.set(i.id, i);
            });
            return Array.from(map.values()).filter(i => !newDeleted.includes(i.id));
          };

          setTransactions(mergeCRDT(transactions, data.transactions));
          setGoals(mergeCRDT(goals, data.goals));
          setSubscriptions(mergeCRDT(subscriptions, data.subscriptions));
          setInstallments(mergeCRDT(installments, data.installments));
          setDeletedRecords(newDeleted);
          
          if(data.settings && (data.settings.updatedAt || 0) > (settings.updatedAt || 0)) setSettings(data.settings);

          showToast("Sync Concluído! 🚀");
          setSyncCodeInput(''); setSyncPassword('');
        } catch (e) { showToast("Senha incorreta ou código corrompido.", true); }
      };

      const handleExportCSV = () => {
        let csv = "Data,Tipo,Categoria,Descricao,Valor,Scope,PagoPor\n";
        transactions.forEach(t => {
          csv += `${t.date},${t.type},${t.category},"${t.desc.replace(/"/g, '""')}",${t.value},${t.scope || 'joint'},${t.paidBy || 'A'}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "financas_dmx_export.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Arquivo CSV exportado com sucesso.");
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const lines = evt.target.result.split(/\r?\n/);
          let added = 0; const newTxs = [];
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            if (columns.length >= 5) {
              const [date, type, category, desc, value] = columns.map(c => c.trim().replace(/^"|"$/g, ''));
              if (date && value && !isNaN(parseFloat(value))) {
                newTxs.push({ id: generateId(), date, type, category, desc, value: parseFloat(value), scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
                added++;
              }
            }
          }
          if(added > 0) { setTransactions(prev => [...newTxs, ...prev]); showToast(`${added} registros importados!`); }
        };
        reader.readAsText(file); e.target.value = '';
      };

      // --- Salvar e Deletar ---
      const handleSaveTransaction = () => {
        const value = parseFloat(txForm.value);
        if (!txForm.desc.trim() || isNaN(value) || value <= 0) return showToast("Dados inválidos.", true);
        const category = txForm.customCategory.trim() || txForm.category;
        const payload = { ...txForm, category, value, updatedAt: Date.now() };
        if (txForm.id) setTransactions(prev => prev.map(t => t.id === txForm.id ? payload : t));
        else setTransactions(prev => [{ ...payload, id: generateId() }, ...prev]);
        setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: new Date().toISOString().slice(0, 10), scope: 'joint', paidBy: 'A' });
        showToast("Transação salva.");
      };

      const handleDeleteTransaction = (id) => {
        if (window.confirm("Apagar transação?")) {
          markAsDeleted(id);
          setTransactions(prev => prev.filter(t => t.id !== id));
          showToast("Eliminado.");
        }
      };

      const handleSaveSub = () => {
        const val = parseFloat(subForm.value); const day = parseInt(subForm.dayOfMonth);
        if (!subForm.desc.trim() || isNaN(val) || val <= 0 || isNaN(day)) return showToast("Inválido.", true);
        const payload = { ...subForm, value: val, dayOfMonth: day, active: subForm.id ? subForm.active : true, updatedAt: Date.now() };
        if (subForm.id) setSubscriptions(prev => prev.map(s => s.id === subForm.id ? payload : s));
        else setSubscriptions(prev => [...prev, { ...payload, id: generateId() }]);
        setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 }); showToast("Assinatura salva.");
      };

      const handleSaveInst = () => {
        const instVal = parseFloat(instForm.installmentValue); 
        const totalInst = parseInt(instForm.totalInstallments); 
        const paid = parseInt(instForm.paidInstallments); 
        const day = parseInt(instForm.dayOfMonth);
        
        if (!instForm.desc.trim() || isNaN(instVal) || instVal <= 0 || isNaN(totalInst) || isNaN(paid)) return showToast("Dados inválidos.", true);
        
        const payload = { ...instForm, installmentValue: instVal, totalInstallments: totalInst, paidInstallments: paid, dayOfMonth: day, active: paid < totalInst, updatedAt: Date.now() };
        if (instForm.id) setInstallments(prev => prev.map(i => i.id === instForm.id ? payload : i));
        else setInstallments(prev => [...prev, { ...payload, id: generateId() }]);
        setInstForm({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' }); showToast("Parcelamento salvo.");
      };

      const handleAddGoal = () => {
        const target = parseFloat(goalForm.target); const current = parseFloat(goalForm.current) || 0;
        if (!goalForm.name.trim() || isNaN(target) || target <= 0) return showToast("Dados inválidos.", true);
        const payload = { ...goalForm, target, current, updatedAt: Date.now() };
        if (goalForm.id) setGoals(prev => prev.map(g => g.id === goalForm.id ? payload : g));
        else setGoals(prev => [...prev, { ...payload, id: generateId() }]);
        setGoalForm({ id: null, name: '', target: '', current: '0' }); showToast("Meta salva.");
      };

      const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

      const DonutChart = () => {
        const colors = ['#0ea5e9', '#8b5cf6', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#64748b', '#ec4899', '#84cc16'];
        const total = Object.values(categoriesTotal).reduce((a, b) => a + b.val, 0);
        if (total === 0) return <div className="h-48 flex items-center justify-center text-slate-500 text-sm">Sem despesas registradas.</div>;
        let cum = 0;
        const slices = Object.entries(categoriesTotal).sort((a,b)=>b[1].val-a[1].val).map(([cat, data], i) => {
          const pct = (data.val / total) * 100; const offset = cum; cum += pct;
          return { cat, val: data.val, count: data.count, pct, offset, color: colors[i % colors.length] };
        });
        return (
          <div className="flex flex-col md:flex-row items-center gap-6 h-full w-full">
            <div className="relative w-32 h-32 flex-shrink-0 drop-shadow-xl"><svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90"><circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" className="stroke-slate-200 dark:stroke-slate-800 opacity-30" />{slices.map(s => <circle key={s.cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" stroke={s.color} strokeDasharray={`${(s.pct / 100) * 251.2} 251.2`} strokeDashoffset={-(s.offset / 100) * 251.2} className="donut-segment" />)}</svg></div>
            <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">{slices.map(s => <div key={s.cat} className="flex justify-between items-center text-sm"><div className="flex items-center gap-2 flex-1 min-w-0"><span className="w-3 h-3 rounded-full flex-shrink-0" style={{backgroundColor: s.color}}></span><span className="font-medium truncate">{s.cat}</span></div><div className="text-right flex-shrink-0"><div className="font-bold">{formatMoney(s.val)}</div><div className="text-[10px] text-slate-500">{s.pct.toFixed(1)}% &bull; {s.count} {s.count === 1 ? 'item' : 'itens'}</div></div></div>)}</div>
          </div>
        );
      };

      const EvolutionChart = () => {
        const monthlyData = {};
        transactions.forEach(t => {
          let month = t.date.slice(0, 7);
          if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
          if (t.type === 'income') monthlyData[month].inc += t.value;
          else monthlyData[month].exp += t.value;
        });
        const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
        if(sortedMonths.length === 0) return <div className="h-48 flex items-center justify-center text-slate-500">Sem dados históricos.</div>;

        let maxVal = 1;
        const items = sortedMonths.map(m => {
          const i = (monthlyData[m].inc || 0) + (parseFloat(settings.salaryA)||0) + (parseFloat(settings.salaryB)||0);
          const e = monthlyData[m].exp || 0;
          if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
          return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
        });

        return (
          <div className="h-48 flex items-end justify-between gap-2 mt-4">
            {items.map(item => {
              const iPct = (item.inc / maxVal) * 100;
              const ePct = (item.exp / maxVal) * 100;
              return (
                <div key={item.month} className="flex flex-col items-center flex-1 group">
                  <div className="flex items-end justify-center w-full h-40 gap-1 relative">
                    <div className="w-1/3 max-w-[20px] bg-brand-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-brand-500/20" style={{ height: `${iPct}%` }}></div>
                    <div className="w-1/3 max-w-[20px] bg-rose-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-rose-500/20" style={{ height: `${ePct}%` }}></div>
                    <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-[10px] p-2 rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10 hidden md:block">
                      <p className="text-brand-400">Rec: {formatMoney(item.inc)}</p>
                      <p className="text-rose-400">Des: {formatMoney(item.exp)}</p>
                    </div>
                  </div>
                  <span className="text-[10px] text-slate-500 mt-2 font-bold tracking-wider">{item.month}</span>
                </div>
              );
            })}
          </div>
        );
      };

                  { id: 'subscriptions', icon: '🔁', label: 'Assinaturas' }, 
                  { id: 'installments', icon: '💳', label: 'Parcelas' },

            </div>

              </div>

              {}

                      <input type="number" step="0.01" value={txForm.value} onChange={e=>setTxForm({...txForm, value: e.target.value})} className="px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500" placeholder="Valor" />
                      <select value={txForm.type} onChange={e=>setTxForm({...txForm, type: e.target.value})} className="px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="expense">Despesa</option><option value="income">Receita Extra</option>
                      </select>
                      <select value={txForm.category} onChange={e=>setTxForm({...txForm, category: e.target.value})} className="px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500">
                        {predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                      <select value={txForm.scope} onChange={e=>setTxForm({...txForm, scope: e.target.value})} className="px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500">
                        <option value="joint">Despesa Conjunta</option><option value="A">Individual: {settings.nameA}</option><option value="B">Individual: {settings.nameB}</option>
                      </select>
                      {txForm.scope === 'joint' && (
                        <select value={txForm.paidBy} onChange={e=>setTxForm({...txForm, paidBy: e.target.value})} className="px-5 py-3 bg-slate-100 dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500">
                          <option value="A">Pago por: {settings.nameA}</option><option value="B">Pago por: {settings.nameB}</option>
                        </select>
                      )}
                      <div className="col-span-full flex gap-2 justify-end">
                        {txForm.id && <button onClick={()=>setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: new Date().toISOString().slice(0, 10), scope: 'joint', paidBy: 'A' })} className="px-6 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button onClick={handleSaveTransaction} className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg">Salvar</button>

                  </div>
                  
                  <div className="glass-card p-8 rounded-3xl">

                      {filteredTransactions.map(t => (

                          <div>
                            <p className="font-bold">{t.desc} <span className="text-[10px] text-slate-500 bg-slate-200 dark:bg-slate-700 px-2 py-0.5 rounded ml-1">{t.scope==='joint'?'Conjunto':t.scope}</span>{t.autoType && <span className="text-[10px] text-brand-600 bg-brand-100 px-2 py-0.5 rounded ml-1">AUTO</span>}</p>

                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                      <h3 className="font-extrabold text-xl">{subForm.id ? 'Atualizar Assinatura' : 'Nova Assinatura'}</h3>

                        <p className="text-[10px] text-rose-500 font-bold uppercase tracking-widest mb-1">Custo Fixo Mensal</p>

                        <input type="text" value={subForm.desc} onChange={e=>setSubForm({...subForm, desc: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500" />

                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Valor da Parcela</label>
                        <input type="number" step="0.01" value={instForm.installmentValue} onChange={e=>setInstForm({...instForm, installmentValue: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500" placeholder="Ex: 189.01" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Qtd. Parcelas (Ex: 4)</label>
                        <input type="number" min="2" value={instForm.totalInstallments} onChange={e=>setInstForm({...instForm, totalInstallments: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-center" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já pagas (Ex: 0)</label>
                        <input type="number" min="0" value={instForm.paidInstallments} onChange={e=>setInstForm({...instForm, paidInstallments: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-center" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Vencimento</label>
                        <input type="number" min="1" max="31" value={instForm.dayOfMonth} onChange={e=>setInstForm({...instForm, dayOfMonth: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 text-center" />
                      </div>
                      <div className="lg:col-span-6 flex justify-end gap-3 mt-4">
                        {instForm.id && <button onClick={()=>setInstForm({id:null,desc:'',installmentValue:'',paidInstallments:0,totalInstallments:2,dayOfMonth:1,category:'Dívidas'})} className="px-8 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button onClick={handleSaveInst} className="bg-brand-500 text-white font-bold py-3 px-10 rounded-xl shadow-lg">Salvar Parcelamento</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {installments.length === 0 ? (
                      <div className="col-span-full text-center py-10 text-slate-500 font-medium bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl">Sem parcelamentos ativos.</div>
                    ) : (
                      installments.map(i => {
                        const cur = Math.min(i.paidInstallments, i.totalInstallments);
                        const pct = (cur / i.totalInstallments) * 100;
                        const parcelValue = parseFloat(i.installmentValue);
                        return (
                          <div key={i.id} className={`glass-card p-6 rounded-3xl border-2 transition-all ${i.active ? 'border-transparent shadow-md' : 'border-brand-500/50 opacity-80'}`}>
                            <div className="flex justify-between items-start mb-4">
                              <h4 className="font-extrabold text-lg">{i.desc}</h4>
                              <div className="flex gap-2">
                                <button onClick={()=>setInstForm(i)} className="text-slate-400 hover:text-brand-500">✏️</button>
                                <button onClick={()=>setInstallments(prev=>prev.filter(x=>x.id!==i.id))} className="text-slate-400 hover:text-rose-500">🗑️</button>
                              </div>
                            </div>
                            <div className="mb-4">
                              <div className="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                <span>Progresso: {cur}/{i.totalInstallments}</span>
                                <span>{pct.toFixed(0)}%</span>
                              </div>
                              <div className="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div className={`h-full transition-all duration-1000 ${i.active ? 'bg-brand-500' : 'bg-emerald-500'}`} style={{width: `${pct}%`}}></div>
                              </div>
                            </div>
                            <div className="flex justify-between items-end">
                              <div>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Valor Parcela</p>
                                <p className="font-black text-xl text-slate-800 dark:text-white">{formatMoney(parcelValue)}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Dia Venc.</p>
                                <p className="font-black text-lg text-brand-500">{i.dayOfMonth}</p>
                              </div>
                            </div>
                          </div>
                        )
                      })
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'goals' && (
                <div className="space-y-6 animate-in fade-in">
                  <div className="glass-card p-8 rounded-3xl shadow-lg border-t-4 border-t-brand-500">
                    <h3 className="font-extrabold text-xl mb-6">{goalForm.id ? 'Atualizar Meta' : 'Nova Meta Financeira'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-5 gap-5 items-end">
                      <div className="md:col-span-2">
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Nome da Meta (Ex: Carro Novo)</label>
                        <input type="text" value={goalForm.name} onChange={e=>setGoalForm({...goalForm, name: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Valor Alvo (R$)</label>
                        <input type="number" step="0.01" value={goalForm.target} onChange={e=>setGoalForm({...goalForm, target: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já Guardado (R$)</label>
                        <input type="number" step="0.01" value={goalForm.current} onChange={e=>setGoalForm({...goalForm, current: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div className="flex gap-2">
                        {goalForm.id && <button onClick={()=>setGoalForm({id:null,name:'',target:'',current:'0'})} className="px-4 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">✕</button>}
                        <button onClick={handleAddGoal} className="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg">Salvar</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {goals.length === 0 ? (
                      <div className="col-span-full text-center py-10 text-slate-500 font-medium bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl">Nenhuma meta criada.</div>
                    ) : (
                      goals.map(g => {
                        const pct = Math.min(100, (g.current / g.target) * 100);
                        return (
                          <div key={g.id} className="glass-card p-6 rounded-3xl flex flex-col justify-between shadow-sm">
                            <div>
                              <div className="flex justify-between items-start mb-2">
                                <h3 className="font-extrabold text-lg">{g.name}</h3>
                                <div className="flex gap-1">
                                  <button onClick={()=>setGoalForm(g)} className="p-2 text-slate-400 hover:text-brand-500">✏️</button>
                                  <button onClick={()=>setGoals(prev=>prev.filter(x=>x.id!==g.id))} className="p-2 text-slate-400 hover:text-rose-500">🗑️</button>
                                </div>
                              </div>
                              <p className="text-xs text-slate-500 font-medium mb-6">
                                <span className="font-bold text-slate-700 dark:text-slate-300">{formatMoney(g.current)}</span> de {formatMoney(g.target)}
                              </p>
                            </div>
                            <div>
                              <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2">
                                <div className="h-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                              </div>
                              <div className="text-right text-[10px] font-black text-brand-500">{pct.toFixed(1)}% CONCLUÍDO</div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              )}

              {activeTab === 'sync' && (
                <div className="space-y-6 animate-in fade-in">
                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-emerald-500">
                    <h2 className="font-black text-2xl mb-6">Configurações de Casal</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl">
                        <h3 className="font-bold mb-4 text-brand-600">Perfil A</h3>
                        <input type="text" value={settings.nameA} onChange={e=>setSettings({...settings, nameA: e.target.value, updatedAt: Date.now()})} className="w-full mb-3 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none focus:ring-2 focus:ring-brand-500" placeholder="Nome" />
                        <label className="text-[10px] font-bold text-slate-500 uppercase">Salário Mensal (R$)</label>
                        <input type="number" step="0.01" value={settings.salaryA} onChange={e=>setSettings({...settings, salaryA: e.target.value, updatedAt: Date.now()})} className="w-full mt-1 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none focus:ring-2 focus:ring-brand-500" placeholder="Salário A" />
                      </div>
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl">
                        <h3 className="font-bold mb-4 text-partner-600">Perfil B</h3>
                        <input type="text" value={settings.nameB} onChange={e=>setSettings({...settings, nameB: e.target.value, updatedAt: Date.now()})} className="w-full mb-3 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none focus:ring-2 focus:ring-partner-500" placeholder="Nome" />
                        <label className="text-[10px] font-bold text-slate-500 uppercase">Salário Mensal (R$)</label>
                        <input type="number" step="0.01" value={settings.salaryB} onChange={e=>setSettings({...settings, salaryB: e.target.value, updatedAt: Date.now()})} className="w-full mt-1 px-4 py-2 bg-white dark:bg-slate-900 rounded-lg outline-none focus:ring-2 focus:ring-partner-500" placeholder="Salário B" />
                      </div>
                    </div>
                  </div>

                  <div className="glass-card p-8 rounded-3xl border-t-4 border-t-brand-500">
                    <h2 className="font-black text-2xl mb-2">Sync Seguro (AES-GCM CRDT)</h2>
                    <p className="text-sm text-slate-500 mb-6">A Criptografia avançada está ativa. Definam a mesma senha nos dois celulares para o Sync funcionar.</p>
                    <input type="password" value={syncPassword} onChange={e=>setSyncPassword(e.target.value)} className="w-full max-w-sm mb-6 px-5 py-3 bg-white dark:bg-slate-800 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-bold" placeholder="Senha Forte do Casal" />
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <button onClick={handleGenerateSyncCode} className="bg-brand-500 text-white font-bold py-4 rounded-xl shadow-lg">1. Gerar Código Seguro</button>
                      <div className="flex flex-col gap-2">
                        <textarea value={syncCodeInput} onChange={e=>setSyncCodeInput(e.target.value)} className="h-16 px-4 py-2 text-[10px] rounded-xl outline-none bg-white dark:bg-slate-800 resize-none focus:ring-2 focus:ring-blue-500" placeholder="Cole o código recebido aqui..."></textarea>
                        <button onClick={handleImportSyncCode} className="bg-blue-600 text-white font-bold py-3 rounded-xl shadow-lg">2. Importar & Fundir Dados</button>
                      </div>
                    </div>
                  </div>
                  
                  <div className="glass-card p-8 rounded-3xl">
                    <h3 className="font-bold mb-4">Exportação CSV</h3>
                    <div className="flex flex-wrap gap-4">
                      <button onClick={handleExportCSV} className="bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl shadow-lg">Exportar Excel (CSV)</button>
                      <label className="bg-slate-200 dark:bg-slate-800 font-bold py-3 px-6 rounded-xl cursor-pointer hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
                        Importar CSV Antigo <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" />
                      </label>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
