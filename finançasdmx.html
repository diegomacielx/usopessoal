<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Finanças DMX</title>
  
  <!-- Fontes Premium -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              900: '#134e4a',
              950: '#042f2e',
            }
          }
        },
      },
    }
  </script>

  <!-- React e ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para transpilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    
    .dark .glass-card {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .donut-segment {
      transition: stroke-dashoffset 1s ease-in-out;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#0B1120] dark:text-slate-100 min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const safeParse = (key, fallback) => {
      try {
        const item = localStorage.getItem(key);
        return item ? JSON.parse(item) : fallback;
      } catch (e) {
        console.error(`Erro ao carregar os dados de ${key}:`, e);
        return fallback;
      }
    };

    function App() {
      // --- Core States ---
      const [transactions, setTransactions] = useState(() => safeParse('dmx_transactions', []));
      const [goals, setGoals] = useState(() => safeParse('dmx_goals', []));
      const [budgets, setBudgets] = useState(() => safeParse('dmx_budgets', {}));
      const [subscriptions, setSubscriptions] = useState(() => safeParse('dmx_subscriptions', []));
      const [installments, setInstallments] = useState(() => safeParse('dmx_installments', []));
      const [settings, setSettings] = useState(() => safeParse('dmx_settings', { salary: 0 }));
      
      const [monthFilter, setMonthFilter] = useState(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      });
      
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [syncCodeInput, setSyncCodeInput] = useState('');
      const [showAI, setShowAI] = useState(false);

      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: new Date().toISOString().slice(0, 10) });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0' });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '' });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 });
      const [instForm, setInstForm] = useState({ id: null, desc: '', totalValue: '', currentInstallment: 1, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' });

      // --- Persistência ---
      useEffect(() => {
        localStorage.setItem('dmx_transactions', JSON.stringify(transactions));
        localStorage.setItem('dmx_goals', JSON.stringify(goals));
        localStorage.setItem('dmx_budgets', JSON.stringify(budgets));
        localStorage.setItem('dmx_subscriptions', JSON.stringify(subscriptions));
        localStorage.setItem('dmx_installments', JSON.stringify(installments));
        localStorage.setItem('dmx_settings', JSON.stringify(settings));
      }, [transactions, goals, budgets, subscriptions, installments, settings]);

      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      // --- Utilitários ---
      const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      const generateId = () => window.crypto?.randomUUID ? crypto.randomUUID() : (Date.now() + Math.random()).toString();

      const showToast = (msg, isError = false) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };

      const filteredTransactions = useMemo(() => {
        if (!monthFilter) return transactions;
        return transactions.filter(t => t.date.startsWith(monthFilter));
      }, [transactions, monthFilter]);

      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => {
          if (t.type === 'income') inc += t.value;
          else exp += t.value;
        });
        const salary = parseFloat(settings.salary) || 0;
        return { inc: inc + salary, exp, balance: (inc + salary) - exp, rawInc: inc };
      }, [filteredTransactions, settings.salary]);

      // Modificado para guardar o Valor e a Contagem exata de itens
      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value;
            expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);

      const totalSubscriptions = useMemo(() => {
        return subscriptions.filter(s => s.active).reduce((acc, curr) => acc + parseFloat(curr.value), 0);
      }, [subscriptions]);

      useEffect(() => {
        const today = new Date();
        const currentYear = today.getFullYear();
        const currentMonth = today.getMonth();
        const currentMonthStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
        const currentDay = today.getDate();
        const maxDaysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        let newTxs = [];
        let subsUpdated = false;
        let instsUpdated = false;

        // Processa Assinaturas
        const nextSubs = subscriptions.map(sub => {
          if (!sub.active) return sub;
          const targetDay = Math.min(sub.dayOfMonth, maxDaysInMonth);
          const autoTxId = `sub_${sub.id}_${currentMonthStr}`;
          const alreadyBilled = transactions.some(t => t.id === autoTxId);
          
          if (!alreadyBilled && currentDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: sub.desc, value: parseFloat(sub.value), type: 'expense', category: sub.category || 'Assinaturas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'subscription' });
            subsUpdated = true;
          }
          return sub;
        });

        // Processa Parcelamentos
        const nextInsts = installments.map(inst => {
          if (!inst.active || inst.currentInstallment > inst.totalInstallments) return inst;
          
          const targetDay = Math.min(inst.dayOfMonth, maxDaysInMonth);
          const autoTxId = `inst_${inst.id}_${currentMonthStr}`;
          const alreadyBilled = transactions.some(t => t.id === autoTxId);

          if (!alreadyBilled && currentDay >= targetDay) {
            const parcelValue = parseFloat(inst.totalValue) / parseInt(inst.totalInstallments);
            newTxs.push({ id: autoTxId, desc: `${inst.desc} (${inst.currentInstallment}/${inst.totalInstallments})`, value: parcelValue, type: 'expense', category: inst.category || 'Dívidas', date: `${currentMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'installment' });
            
            instsUpdated = true;
            return { ...inst, currentInstallment: inst.currentInstallment + 1, active: inst.currentInstallment < inst.totalInstallments };
          }
          return inst;
        });

        if (newTxs.length > 0) {
          setTransactions(prev => [...newTxs, ...prev]);
          if(subsUpdated) showToast(`${newTxs.length} lançamento(s) automático(s) processado(s).`);
        }
        if (instsUpdated) setInstallments(nextInsts);

      }, [subscriptions, installments, transactions]);


      const generateSyncCode = () => {
        const payload = { transactions, goals, budgets, subscriptions, installments, settings };
        const code = btoa(encodeURIComponent(JSON.stringify(payload)));
        navigator.clipboard?.writeText(code).then(() => showToast("Código copiado! Envie para sua parceira(o).")).catch(() => showToast("Copie o código manualmente do campo abaixo."));
        return code;
      };

      const handleImportSyncCode = () => {
        if(!syncCodeInput) return showToast("Cole um código primeiro.", true);
        try {
          const data = JSON.parse(decodeURIComponent(atob(syncCodeInput)));
          
          const mergeArrays = (arr1, arr2) => {
            const map = new Map();
            (arr1 || []).forEach(i => map.set(i.id, i));
            (arr2 || []).forEach(i => map.set(i.id, i));
            return Array.from(map.values());
          };

          setTransactions(prev => mergeArrays(prev, data.transactions));
          setGoals(prev => mergeArrays(prev, data.goals));
          setSubscriptions(prev => mergeArrays(prev, data.subscriptions));
          setInstallments(prev => mergeArrays(prev, data.installments));
          if(data.budgets) setBudgets(prev => ({...prev, ...data.budgets}));
          if(data.settings?.salary && data.settings.salary > (settings.salary || 0)) setSettings(data.settings); 

          showToast("Dados sincronizados com sucesso! 🚀");
          setSyncCodeInput('');
        } catch (e) {
          showToast("Código inválido ou corrompido.", true);
        }
      };

      // --- Funções de CSV ---
      const handleExportCSV = () => {
        let csv = "Data,Tipo,Categoria,Descrição,Valor\n";
        transactions.forEach(t => {
          csv += `${t.date},${t.type},${t.category},"${t.desc}",${t.value}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "financas_dmx.csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("Arquivo CSV exportado com sucesso.");
      };

      const handleImportCSV = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          const lines = evt.target.result.split(/\r?\n/);
          let added = 0;
          const newTxs = [];
          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const [date, type, category, desc, value] = lines[i].split(',');
            if (date && value && !isNaN(parseFloat(value))) {
              newTxs.push({
                id: generateId(),
                date: date.trim(),
                type: type.trim(),
                category: category.trim(),
                desc: desc.replace(/"/g, '').trim(),
                value: parseFloat(value)
              });
              added++;
            }
          }
          if(added > 0) {
            setTransactions(prev => [...newTxs, ...prev]);
            showToast(`${added} transações importadas!`);
          } else {
            showToast("Nenhuma transação válida encontrada.", true);
          }
        };
        reader.readAsText(file);
        e.target.value = '';
      };


      const handleSaveTransaction = () => {
        const value = parseFloat(txForm.value);
        if (!txForm.desc.trim() || isNaN(value) || value <= 0) return showToast("Preencha descrição e valor válido.", true);
        const category = txForm.customCategory.trim() || txForm.category;
        
        if (txForm.id) {
          setTransactions(prev => prev.map(t => t.id === txForm.id ? { ...txForm, category, value } : t));
          showToast("Transação atualizada.");
        } else {
          setTransactions(prev => [{ ...txForm, id: generateId(), category, value }, ...prev]);
          showToast("Transação adicionada.");
        }
        setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: new Date().toISOString().slice(0, 10) });
      };

      const handleSaveSub = () => {
        const val = parseFloat(subForm.value);
        const day = parseInt(subForm.dayOfMonth);
        if (!subForm.desc.trim() || isNaN(val) || val <= 0 || isNaN(day) || day < 1 || day > 31) return showToast("Preencha todos os campos corretamente.", true);
        if (subForm.id) {
          setSubscriptions(prev => prev.map(s => s.id === subForm.id ? { ...subForm, value: val, dayOfMonth: day, active: s.active } : s));
        } else {
          setSubscriptions(prev => [...prev, { ...subForm, id: generateId(), value: val, dayOfMonth: day, active: true }]);
        }
        setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 });
        showToast("Assinatura salva.");
      };

      const handleSaveInst = () => {
        const totalVal = parseFloat(instForm.totalValue);
        const totalInst = parseInt(instForm.totalInstallments);
        const curInst = parseInt(instForm.currentInstallment);
        const day = parseInt(instForm.dayOfMonth);
        
        if (!instForm.desc.trim() || isNaN(totalVal) || totalVal <= 0 || isNaN(totalInst) || totalInst < 2 || isNaN(curInst) || curInst < 1 || curInst > totalInst) {
          return showToast("Preencha os dados do parcelamento corretamente.", true);
        }

        if (instForm.id) {
          setInstallments(prev => prev.map(i => i.id === instForm.id ? { ...instForm, totalValue: totalVal, totalInstallments: totalInst, currentInstallment: curInst, dayOfMonth: day, active: curInst <= totalInst } : i));
        } else {
          setInstallments(prev => [...prev, { ...instForm, id: generateId(), totalValue: totalVal, totalInstallments: totalInst, currentInstallment: curInst, dayOfMonth: day, active: curInst <= totalInst }]);
        }
        setInstForm({ id: null, desc: '', totalValue: '', currentInstallment: 1, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' });
        showToast("Parcelamento salvo.");
      };

      const handleAddGoal = () => {
        const target = parseFloat(goalForm.target);
        const current = parseFloat(goalForm.current) || 0;
        if (!goalForm.name.trim() || isNaN(target) || target <= 0) return showToast("Nome e valor alvo válidos são obrigatórios.", true);

        if (goalForm.id) {
          setGoals(prev => prev.map(g => g.id === goalForm.id ? { ...goalForm, target, current } : g));
          showToast("Meta atualizada.");
        } else {
          setGoals(prev => [...prev, { ...goalForm, id: generateId(), target, current }]);
          showToast("Meta criada.");
        }
        setGoalForm({ id: null, name: '', target: '', current: '0' });
      };

      const handleSaveSalary = (e) => {
        const val = parseFloat(e.target.value) || 0;
        setSettings({ ...settings, salary: val });
      };

      const predefinedCategories = [
        'Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação',
        'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 
        'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'
      ];

      // Lógica do Analista IA (Heurística Local)
      const generateAIReport = () => {
        const report = [];
        const balance = totals.inc - totals.exp;
        const saveRate = totals.inc > 0 ? (balance / totals.inc) * 100 : 0;

        // 1. Análise de Saúde Geral
        if (totals.inc === 0) {
            report.push({ type: 'warning', icon: '⚠️', title: 'Sem Renda Registrada', text: 'Cadastre seu salário ou receitas extras para uma análise precisa de proporção.' });
        } else if (totals.exp > totals.inc) {
            report.push({ type: 'danger', icon: '🚨', title: 'Alerta Crítico: Gastos Excedentes', text: `Você gastou ${formatMoney(Math.abs(balance))} a mais do que ganhou este mês. Você está consumindo reservas ou criando dívidas.` });
        } else if (saveRate >= 20) {
            report.push({ type: 'success', icon: '🏆', title: 'Saúde Impecável', text: `Parabéns! Você está poupando ${saveRate.toFixed(1)}% da sua renda. A regra de ouro é poupar pelo menos 20%. Mantenha o foco.` });
        } else {
            report.push({ type: 'warning', icon: '📉', title: 'Atenção à Poupança', text: `Você está retendo apenas ${saveRate.toFixed(1)}% do que ganha. Tente otimizar gastos não essenciais para chegar à meta de 20%.` });
        }

        // 2. Análise de Categorias e Volumes
        const cats = Object.entries(categoriesTotal).sort((a,b)=>b[1].val - a[1].val);
        if (cats.length > 0) {
            const [topCat, data] = cats[0];
            const pctOfTotal = (data.val / totals.exp) * 100;
            
            let advice = `Esta categoria representa ${pctOfTotal.toFixed(1)}% de todas as suas despesas mensais.`;
            if (data.count >= 10) {
                advice += ` Cuidado: você registrou ${data.count} compras diferentes só aqui. O alto volume de pequenas compras ("gastos invisíveis") costuma ser o maior destruidor de orçamentos.`;
            } else if (pctOfTotal > 40 && topCat !== 'Habitação') {
                advice += ` Estar concentrando mais de 40% da renda em uma única área pode desequilibrar suas metas de longo prazo.`;
            }
            
            report.push({ type: 'info', icon: '💡', title: `Maior Ralo Financeiro: ${topCat}`, text: advice });
        }

        // 3. Análise de Assinaturas (Custo Fixo)
        const activeSubs = subscriptions.filter(s => s.active);
        if (activeSubs.length >= 4) {
            const subVal = activeSubs.reduce((acc, s) => acc + parseFloat(s.value), 0);
            report.push({ type: 'warning', icon: '👀', title: 'Alerta de Custo Fixo Elevado', text: `Você possui ${activeSubs.length} assinaturas ativas totalizando ${formatMoney(subVal)}. É comum esquecermos serviços que não usamos. Faça uma revisão para evitar desperdício contínuo.` });
        }

        return report;
      };

      // Gráfico Donut Dinâmico
      const DonutChart = () => {
        const colors = ['#0ea5e9', '#8b5cf6', '#10b981', '#f43f5e', '#f59e0b', '#06b6d4', '#64748b', '#ec4899', '#84cc16', '#eab308'];
        const total = Object.values(categoriesTotal).reduce((a, b) => a + b.val, 0);
        if (total === 0) return <div className="h-48 flex items-center justify-center text-slate-500 text-sm font-medium">Sem despesas registradas neste mês.</div>;
        
        let cum = 0;
        const slices = Object.entries(categoriesTotal).sort((a,b)=>b[1].val-a[1].val).map(([cat, data], i) => {
          const pct = (data.val / total) * 100;
          const offset = cum; cum += pct;
          return { cat, val: data.val, count: data.count, pct, offset, color: colors[i % colors.length] };
        });

        return (
          <div className="flex flex-col md:flex-row items-center gap-6 h-full w-full">
            <div className="relative w-32 h-32 md:w-40 md:h-40 flex-shrink-0 drop-shadow-xl mx-auto md:mx-0">
              <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" className="stroke-slate-200 dark:stroke-slate-800 opacity-30" />
                {slices.map(s => {
                  const dash = (s.pct / 100) * 251.2;
                  return (
                    <circle key={s.cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="12" stroke={s.color}
                      strokeDasharray={`${dash} 251.2`} strokeDashoffset={-(s.offset / 100) * 251.2} className="donut-segment drop-shadow-md"
                    />
                  );
                })}
              </svg>
            </div>
            <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
              {slices.map(s => (
                <div key={s.cat} className="flex flex-wrap justify-between items-center text-sm gap-2">
                  <div className="flex items-center gap-2 flex-1 min-w-0">
                    <span className="w-3 h-3 rounded-full shadow-sm flex-shrink-0" style={{backgroundColor: s.color}}></span>
                    <span className="font-medium truncate" title={s.cat}>{s.cat}</span>
                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="font-bold">{formatMoney(s.val)}</div>
                    <div className="text-[10px] text-slate-500 font-medium">{s.pct.toFixed(1)}% &bull; {s.count} {s.count === 1 ? 'registro' : 'registros'}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // Gráfico de Evolução (Barras)
      const EvolutionChart = () => {
        const monthlyData = {};
        transactions.forEach(t => {
          let month = t.date.slice(0, 7);
          if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
          if (t.type === 'income') monthlyData[month].inc += t.value;
          else monthlyData[month].exp += t.value;
        });
        const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
        if(sortedMonths.length === 0) return <div className="h-48 flex items-center justify-center text-slate-500">Sem dados históricos.</div>;

        let maxVal = 1;
        const items = sortedMonths.map(m => {
          const i = (monthlyData[m].inc || 0) + (parseFloat(settings.salary)||0);
          const e = monthlyData[m].exp || 0;
          if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
          return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
        });

        return (
          <div className="h-48 flex items-end justify-between gap-2 mt-4">
            {items.map(item => {
              const iPct = (item.inc / maxVal) * 100;
              const ePct = (item.exp / maxVal) * 100;
              return (
                <div key={item.month} className="flex flex-col items-center flex-1 group">
                  <div className="flex items-end justify-center w-full h-40 gap-1 relative">
                    <div className="w-1/3 max-w-[20px] bg-brand-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-brand-500/20" style={{ height: `${iPct}%` }}></div>
                    <div className="w-1/3 max-w-[20px] bg-rose-500 rounded-t-md transition-all duration-700 opacity-90 group-hover:opacity-100 shadow-lg shadow-rose-500/20" style={{ height: `${ePct}%` }}></div>
                    <div className="absolute bottom-full mb-2 bg-slate-800 text-white text-[10px] p-2 rounded-lg shadow-xl opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none whitespace-nowrap z-10 hidden md:block">
                      <p className="text-brand-400">Rec: {formatMoney(item.inc)}</p>

                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Valor Total (R$)</label>
                        <input type="number" step="0.01" value={instForm.totalValue} onChange={e=>setInstForm({...instForm, totalValue: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" placeholder="Ex: 3000.00" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Qtd. Parcelas (Ex: 12)</label>
                        <input type="number" min="2" value={instForm.totalInstallments} onChange={e=>setInstForm({...instForm, totalInstallments: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium text-center" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já pagas (Ex: 2)</label>
                        <input type="number" min="0" value={instForm.currentInstallment - 1} onChange={e=>setInstForm({...instForm, currentInstallment: parseInt(e.target.value) + 1})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium text-center" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Vencimento</label>
                        <input type="number" min="1" max="31" value={instForm.dayOfMonth} onChange={e=>setInstForm({...instForm, dayOfMonth: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium text-center" />
                      </div>
                      <div className="lg:col-span-6 flex justify-end gap-3 mt-4">
                        {instForm.id && <button onClick={()=>setInstForm({id:null,desc:'',totalValue:'',currentInstallment:1,totalInstallments:2,dayOfMonth:1,category:'Dívidas'})} className="px-8 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors">Cancelar</button>}
                        <button onClick={handleSaveInst} className="bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-10 rounded-xl transition-all shadow-lg shadow-brand-500/30 active:scale-95">Salvar Parcelamento</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {installments.length === 0 ? (
                      <div className="col-span-full text-center py-10 text-slate-500 font-medium bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl">Sem parcelamentos ativos.</div>
                    ) : (
                      installments.map(i => {
                        const cur = Math.min(i.currentInstallment, i.totalInstallments);
                        const pct = (cur / i.totalInstallments) * 100;
                        const parcelValue = parseFloat(i.totalValue) / parseInt(i.totalInstallments);
                        return (
                          <div key={i.id} className={`glass-card p-6 rounded-3xl border-2 transition-all ${i.active ? 'border-transparent shadow-md' : 'border-brand-500/50 opacity-80'}`}>
                            <div className="flex justify-between items-start mb-4">
                              <h4 className="font-extrabold text-lg">{i.desc}</h4>
                              <div className="flex gap-2">
                                <button onClick={()=>setInstForm(i)} className="text-slate-400 hover:text-brand-500">✏️</button>
                                <button onClick={()=>setInstallments(prev=>prev.filter(x=>x.id!==i.id))} className="text-slate-400 hover:text-rose-500">🗑️</button>
                              </div>
                            </div>
                            <div className="mb-4">
                              <div className="flex justify-between text-xs font-bold text-slate-500 mb-2">
                                <span>Progresso: {cur}/{i.totalInstallments}</span>
                                <span>{pct.toFixed(0)}%</span>
                              </div>
                              <div className="w-full h-2 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div className={`h-full transition-all duration-1000 ${i.active ? 'bg-brand-500' : 'bg-emerald-500'}`} style={{width: `${pct}%`}}></div>
                              </div>
                            </div>
                            <div className="flex justify-between items-end">
                              <div>
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Valor Parcela</p>
                                <p className="font-black text-xl text-slate-800 dark:text-white">{formatMoney(parcelValue)}</p>
                              </div>
                              <div className="text-right">
                                <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Dia Venc.</p>
                                <p className="font-black text-lg text-brand-500">{i.dayOfMonth}</p>
                              </div>
                            </div>
                          </div>
                        )
                      })
                    )}
                  </div>
                </div>
              )}

              {/* TAB: GOALS */}
              {activeTab === 'goals' && (
                <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  <div className="glass-card p-8 rounded-3xl shadow-lg border-t-4 border-t-brand-500">
                    <h3 className="font-extrabold text-xl mb-6">{goalForm.id ? 'Atualizar Meta' : 'Nova Meta Financeira'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-5 gap-5 items-end">
                      <div className="md:col-span-2">
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Nome da Meta (Ex: Carro Novo)</label>
                        <input type="text" value={goalForm.name} onChange={e=>setGoalForm({...goalForm, name: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Valor Alvo (R$)</label>
                        <input type="number" step="0.01" value={goalForm.target} onChange={e=>setGoalForm({...goalForm, target: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div>
                        <label className="block text-[10px] font-bold text-slate-500 mb-2 uppercase tracking-widest">Já Guardado (R$)</label>
                        <input type="number" step="0.01" value={goalForm.current} onChange={e=>setGoalForm({...goalForm, current: e.target.value})} className="w-full px-5 py-3 bg-slate-100 dark:bg-slate-800/50 rounded-xl outline-none focus:ring-2 focus:ring-brand-500 font-medium" />
                      </div>
                      <div className="flex gap-2">
                        {goalForm.id && <button onClick={()=>setGoalForm({id:null,name:'',target:'',current:'0'})} className="px-4 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold hover:bg-slate-300 transition-colors">✕</button>}
                        <button onClick={handleAddGoal} className="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-brand-500/30 active:scale-95">Salvar</button>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {goals.length === 0 ? (
                      <div className="col-span-full text-center py-10 text-slate-500 font-medium bg-slate-100/50 dark:bg-slate-800/30 rounded-2xl">Nenhuma meta criada. Defina os seus objetivos!</div>
                    ) : (
                      goals.map(g => {
                        const pct = Math.min(100, (g.current / g.target) * 100);
                        return (
                          <div key={g.id} className="glass-card p-6 rounded-3xl flex flex-col justify-between shadow-sm">
                            <div>
                              <div className="flex justify-between items-start mb-2">
                                <h3 className="font-extrabold text-lg text-slate-800 dark:text-white">{g.name}</h3>
                                <div className="flex gap-1">
                                  <button onClick={()=>setGoalForm(g)} className="p-2 text-slate-400 hover:text-brand-500">✏️</button>
                                  <button onClick={()=>setGoals(prev=>prev.filter(x=>x.id!==g.id))} className="p-2 text-slate-400 hover:text-rose-500">🗑️</button>
                                </div>
                              </div>
                              <p className="text-xs text-slate-500 font-medium mb-6">
                                <span className="font-bold text-slate-700 dark:text-slate-300">{formatMoney(g.current)}</span> de {formatMoney(g.target)}
                              </p>
                            </div>
                            <div>
                              <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2">
                                <div className="h-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                              </div>
                              <div className="text-right text-[10px] font-black text-brand-500">{pct.toFixed(1)}% CONCLUÍDO</div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              )}

              {/* TAB: SYNC & DATA */}
              {activeTab === 'sync' && (
                <div className="max-w-4xl mx-auto space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                  
                  {/* Bloco de Dados em CSV */}
                  <div className="glass-card p-8 md:p-10 rounded-3xl shadow-lg border-t-4 border-t-emerald-500">
                    <div className="flex flex-col md:flex-row items-center gap-6 mb-8">
                      <div className="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 rounded-2xl flex items-center justify-center text-3xl shadow-inner">📊</div>
                      <div>
                        <h2 className="text-2xl font-black mb-1">Os Seus Dados (CSV)</h2>
                        <p className="text-slate-500 text-sm font-medium">Faça o download das suas transações para o Excel ou importe uma lista de lançamentos.</p>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 text-center">
                        <h3 className="font-bold mb-2 uppercase tracking-widest text-xs text-emerald-600 dark:text-emerald-400">Exportar para Excel</h3>
                        <p className="text-xs text-slate-500 mb-6">Gera um arquivo .csv com todo o seu histórico financeiro.</p>
                        <button onClick={handleExportCSV} className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all active:scale-95">
                          Descarregar Finanças.csv
                        </button>
                      </div>

                      <div className="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 text-center relative">
                        <h3 className="font-bold mb-2 uppercase tracking-widest text-xs text-blue-600 dark:text-blue-400">Importar Transações</h3>
                        <p className="text-xs text-slate-500 mb-6">Formato: Data(YYYY-MM-DD), Tipo, Categoria, Descrição, Valor</p>
                        <label className="w-full block bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95 cursor-pointer">
                          Escolher Arquivo .csv
                          <input type="file" accept=".csv" onChange={handleImportCSV} className="hidden" />
                        </label>
                      </div>
                    </div>
                  </div>

                  {/* Bloco de Sync Casal */}
                  <div className="glass-card p-8 md:p-10 rounded-3xl shadow-lg border-t-4 border-t-brand-500 text-center mt-8">
                    <div className="w-16 h-16 bg-brand-100 dark:bg-brand-900/30 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 shadow-inner">👩‍❤️‍👨</div>
                    <h2 className="text-2xl font-black mb-2">Sincronização de Casal Offline</h2>
                    <p className="text-slate-500 text-sm font-medium mb-10 leading-relaxed max-w-xl mx-auto">
                      Partilhe os dados financeiros de forma segura via código. 
                      Gere o código no celular 1, envie pelo WhatsApp, e importe no celular 2.
                      Os dados não são apagados, são fundidos inteligentemente.
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                      <div className="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800">
                        <h3 className="font-bold mb-4 uppercase tracking-widest text-xs text-brand-500">Passo 1: Exportar</h3>
                        <button onClick={generateSyncCode} className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all active:scale-95">
                          Gerar e Copiar Código
                        </button>
                      </div>

                      <div className="p-6 bg-slate-50 dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800">
                        <h3 className="font-bold mb-4 uppercase tracking-widest text-xs text-blue-500">Passo 2: Importar</h3>
                        <textarea 
                          value={syncCodeInput} onChange={e=>setSyncCodeInput(e.target.value)}
                          placeholder="Cole o código gigantesco aqui..."
                          className="w-full h-24 px-4 py-3 bg-white dark:bg-slate-950 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 font-mono text-[10px] text-slate-500 mb-4 resize-none border border-slate-200 dark:border-slate-800 custom-scrollbar"
                        ></textarea>
                        <button onClick={handleImportSyncCode} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 transition-all active:scale-95">
                          Fundir Dados 📥
                        </button>
                      </div>
                    </div>
                  </div>
                  
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
