<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Finanças DMX – Ultimate</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 50: '#f5f3ff', 100: '#ede9fe', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' }
          },
          animation: {
            'blob': 'blob 7s infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        },
      },
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.5); }
    
    .glass-card { 
      background: rgba(255, 255, 255, 0.65); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.6); 
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
    }
    .dark .glass-card { 
      background: rgba(15, 23, 42, 0.6); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .field-error { border-color: #f43f5e !important; background-color: rgba(244, 63, 94, 0.05) !important; }
    .error-message { color: #f43f5e; font-size: 0.75rem; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    
    /* Gráfico Donut Suave */
    .donut-segment { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke-width 0.3s; }
    .donut-segment:hover { stroke-width: 14; filter: drop-shadow(0 0 4px currentColor); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#050914] dark:text-slate-100 min-h-screen transition-colors duration-500">
  
  <!-- Ambient Background Glows -->
  <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-400/20 dark:bg-brand-500/10 rounded-full blur-[120px] animate-blob"></div>
    <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-partner-400/20 dark:bg-partner-500/10 rounded-full blur-[120px] animate-blob" style={{animationDelay: '2s'}}></div>
    <div className="absolute top-[40%] left-[40%] w-[30%] h-[30%] bg-blue-400/10 dark:bg-blue-500/5 rounded-full blur-[100px] animate-blob" style={{animationDelay: '4s'}}></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, memo } = React;
    const { get, set } = idbKeyval;

    // --- Utils & Crypto ---
    const getLocalDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    const generateId = () => {
      if (window.crypto?.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };

    const deriveKey = async (password, salt) => {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
      return await crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    };
    const encryptData = async (text, password) => {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(text));
      const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      combined.set(salt, 0); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
      return btoa(String.fromCharCode(...combined));
    };
    const decryptData = async (base64, password) => {
      const combined = new Uint8Array(atob(base64).split('').map(c => c.charCodeAt(0)));
      const salt = combined.slice(0, 16), iv = combined.slice(16, 28), data = combined.slice(28);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return new TextDecoder().decode(decrypted);
    };

    const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

    // --- Componentes Visuais Premium ---
    const BentoCard = ({ children, className = "", title, icon, action }) => (
      <div className={`glass-card p-6 rounded-3xl transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 ${className}`}>
        {(title || action) && (
          <div className="flex justify-between items-start mb-5">
            {title && <h3 className="font-bold text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">{icon} {title}</h3>}
            {action}
          </div>
        )}
        {children}
      </div>
    );

    const DonutChart = memo(({ categoriesTotal }) => {
      if (Object.keys(categoriesTotal).length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Sem dados para exibir</div>;
      const sorted = Object.entries(categoriesTotal).sort((a,b) => b[1].val - a[1].val);
      const total = sorted.reduce((acc, curr) => acc + curr[1].val, 0);
      const colors = ['#14b8a6', '#8b5cf6', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981', '#64748b'];
      
      return (
        <div className="flex flex-col md:flex-row items-center gap-8">
          <div className="relative w-40 h-40 flex-shrink-0">
            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90 drop-shadow-xl">
              <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" className="stroke-slate-200 dark:stroke-slate-800" />
              {sorted.map(([cat, data], i) => {
                const pct = (data.val / total) * 100;
                const offset = sorted.slice(0, i).reduce((acc, curr) => acc + (curr[1].val / total) * 100, 0);
                return <circle key={cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" stroke={colors[i % colors.length]} strokeDasharray={`${(pct / 100) * 251.2} 251.2`} strokeDashoffset={-(offset / 100) * 251.2} className="donut-segment" strokeLinecap="round" />;
              })}
            </svg>
            <div className="absolute inset-0 flex items-center justify-center flex-col">
              <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total</span>
              <span className="text-sm font-black text-slate-800 dark:text-white">{formatMoney(total)}</span>
            </div>
          </div>
          <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
            {sorted.map(([cat, data], i) => (
              <div key={cat} className="flex justify-between items-center text-sm gap-3 group">
                <div className="flex items-center gap-3 flex-1 min-w-0">
                  <span className="w-3 h-3 rounded-full flex-shrink-0 shadow-sm" style={{backgroundColor: colors[i % colors.length]}}></span>
                  <span className="font-semibold text-slate-700 dark:text-slate-200 truncate group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">{cat}</span>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="font-bold text-slate-900 dark:text-white">{formatMoney(data.val)}</div>
                  <div className="text-[10px] text-slate-500 font-medium">{((data.val / total) * 100).toFixed(1)}% &bull; {data.count}x</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const monthlyData = {};
      transactions.forEach(t => {
        let month = t.date.slice(0, 7);
        if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
        t.type === 'income' ? monthlyData[month].inc += t.value : monthlyData[month].exp += t.value;
      });
      const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
      if(sortedMonths.length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Histórico insuficiente</div>;
      
      let maxVal = 1;
      const items = sortedMonths.map(m => {
        const i = (monthlyData[m].inc || 0) + (parseFloat(settings.salaryA)||0) + (parseFloat(settings.salaryB)||0);
        const e = monthlyData[m].exp || 0;
        if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
        return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
      });
      
      return (
        <div className="h-56 flex items-end justify-between gap-3 mt-4 px-2">
          {items.map(item => (
            <div key={item.month} className="flex flex-col items-center flex-1 group cursor-pointer">
              <div className="flex items-end justify-center w-full h-44 gap-1 relative">
                <div className="w-2/5 max-w-[24px] bg-gradient-to-t from-brand-600 to-brand-400 rounded-t-md opacity-80 transition-all duration-500 group-hover:opacity-100 group-hover:scale-105" style={{ height: `${(item.inc / maxVal) * 100}%` }} title={`Receita: ${formatMoney(item.inc)}`}></div>
                <div className="w-2/5 max-w-[24px] bg-gradient-to-t from-rose-600 to-rose-400 rounded-t-md opacity-80 transition-all duration-500 group-hover:opacity-100 group-hover:scale-105" style={{ height: `${(item.exp / maxVal) * 100}%` }} title={`Despesa: ${formatMoney(item.exp)}`}></div>
              </div>
              <span className="text-[11px] text-slate-500 mt-3 font-bold tracking-wide group-hover:text-brand-500 transition-colors">{item.month}</span>
            </div>
          ))}
        </div>
      );
    });

    // --- App Component ---
    function App() {
      const [isLoaded, setIsLoaded] = useState(false);
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [budgetsMeta, setBudgetsMeta] = useState({ updatedAt: Date.now() }); 
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [deletedRecords, setDeletedRecords] = useState([]);
      const [settings, setSettings] = useState({ salaryA: 0, salaryB: 0, nameA: 'Pessoa A', nameB: 'Pessoa B', updatedAt: Date.now() });
      
      const [monthFilter, setMonthFilter] = useState(() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; });
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [activeTab, setActiveTab] = useState('dashboard');
      const [toasts, setToasts] = useState([]);
      const [syncCodeInput, setSyncCodeInput] = useState('');
      const [syncPassword, setSyncPassword] = useState('');
      const [showAI, setShowAI] = useState(false);

      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A' });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0' });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '' });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' });

      const [formErrors, setFormErrors] = useState({ tx: {}, goal: {}, budget: {}, sub: {}, inst: {} });

      const showToast = useCallback((msg, isError = false) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      }, []);

      useEffect(() => {
        Promise.all([ get('dmx_transactions'), get('dmx_goals'), get('dmx_budgets'), get('dmx_budgets_meta'), get('dmx_subscriptions'), get('dmx_installments'), get('dmx_settings'), get('dmx_deleted') ])
        .then(([txs, gls, bdg, bdgMeta, subs, insts, sets, dels]) => {
          if (txs) setTransactions(txs); if (gls) setGoals(gls); if (bdg) setBudgets(bdg); 
          if (bdgMeta) setBudgetsMeta(bdgMeta); if (subs) setSubscriptions(subs);
          if (insts) setInstallments(insts); if (sets) setSettings(prev => ({ ...prev, ...sets })); if (dels) setDeletedRecords(dels);
          setIsLoaded(true);
        });
      }, []);

      useEffect(() => {
        if (!isLoaded) return;
        set('dmx_transactions', transactions); set('dmx_goals', goals); set('dmx_budgets', budgets);
        set('dmx_budgets_meta', budgetsMeta); set('dmx_subscriptions', subscriptions); 
        set('dmx_installments', installments); set('dmx_settings', settings); set('dmx_deleted', deletedRecords);
      }, [transactions, goals, budgets, budgetsMeta, subscriptions, installments, settings, deletedRecords, isLoaded]);

      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);

      const filteredTransactions = useMemo(() => transactions.filter(t => t.date.startsWith(monthFilter)), [transactions, monthFilter]);

      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => t.type === 'income' ? inc += t.value : exp += t.value);
        const salaryTotal = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + salaryTotal, exp, balance: (inc + salaryTotal) - exp };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value; expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);

      const totalSubscriptions = useMemo(() => subscriptions.filter(s => s.active).reduce((acc, curr) => acc + parseFloat(curr.value), 0), [subscriptions]);

      const splitLogic = useMemo(() => {
        const salA = parseFloat(settings.salaryA) || 0; const salB = parseFloat(settings.salaryB) || 0; const totalSal = salA + salB;
        const ratioA = totalSal > 0 ? salA / totalSal : 0.5; const ratioB = totalSal > 0 ? salB / totalSal : 0.5;
        const jointExpenses = filteredTransactions.filter(t => t.scope === 'joint' && t.type === 'expense');
        const totalJointExp = jointExpenses.reduce((acc, t) => acc + t.value, 0);
        const paidByA = jointExpenses.filter(t => t.paidBy === 'A').reduce((acc, t) => acc + t.value, 0);
        const paidByB = jointExpenses.filter(t => t.paidBy === 'B').reduce((acc, t) => acc + t.value, 0);
        return { totalJointExp, ratioA, ratioB, balanceA: paidByA - (totalJointExp * ratioA), balanceB: paidByB - (totalJointExp * ratioB) };
      }, [filteredTransactions, settings.salaryA, settings.salaryB]);

      useEffect(() => {
        if (!isLoaded) return;
        const d = new Date(); const curYear = d.getFullYear(); const curMonth = d.getMonth(); const curDay = d.getDate();
        const curMonthStr = `${curYear}-${String(curMonth + 1).padStart(2, '0')}`;
        const maxDays = new Date(curYear, curMonth + 1, 0).getDate();
        let newTxs = []; let instsUpdated = false;

        subscriptions.forEach(sub => {
          if (!sub.active) return;
          const targetDay = Math.min(sub.dayOfMonth, maxDays);
          const autoTxId = `sub_${sub.id}_${curMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && curDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: sub.desc, value: parseFloat(sub.value), type: 'expense', category: sub.category || 'Assinaturas', date: `${curMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'subscription', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
          }
        });

        const nextInsts = installments.map(inst => {
          const paid = parseInt(inst.paidInstallments) || 0; const total = parseInt(inst.totalInstallments);
          if (inst.active === false || paid >= total) return inst;
          const targetDay = Math.min(inst.dayOfMonth, maxDays);
          const autoTxId = `inst_${inst.id}_${curMonthStr}`;
          if (!transactions.some(t => t.id === autoTxId) && curDay >= targetDay) {
            newTxs.push({ id: autoTxId, desc: `${inst.desc} (${paid + 1}/${total})`, value: parseFloat(inst.installmentValue), type: 'expense', category: inst.category || 'Dívidas', date: `${curMonthStr}-${String(targetDay).padStart(2, '0')}`, autoType: 'installment', scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
            instsUpdated = true;
            return { ...inst, paidInstallments: paid + 1, active: (paid + 1) < total, updatedAt: Date.now() };
          }
          return inst;
        });

        if (newTxs.length > 0) { setTransactions(prev => [...newTxs, ...prev]); showToast(`${newTxs.length} lançamento(s) automático(s).`); }
        if (instsUpdated) setInstallments(nextInsts);
      }, [subscriptions, installments, transactions, isLoaded]);

      // Handlers
      const handleSaveTx = (e) => {
        e.preventDefault();
        const errors = {};
        if (!txForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(txForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, tx: errors})); return; }
        const payload = { ...txForm, category: txForm.customCategory.trim() || txForm.category, value: val, updatedAt: Date.now() };
        if (txForm.id) setTransactions(prev => prev.map(t => t.id === txForm.id ? payload : t));
        else setTransactions(prev => [{ ...payload, id: generateId() }, ...prev]);
        setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'joint', paidBy: 'A' });
        setFormErrors(prev => ({...prev, tx: {}}));
        showToast("Transação salva.");
      };

      const handleSaveSub = (e) => {
        e.preventDefault();
        const errors = {};
        if (!subForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(subForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        const day = parseInt(subForm.dayOfMonth);
        if (isNaN(day) || day < 1 || day > 31) errors.dayOfMonth = 'Dia inválido (1-31)';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, sub: errors})); return; }
        const payload = { ...subForm, value: val, dayOfMonth: day, active: subForm.id ? subForm.active : true, updatedAt: Date.now() };
        if (subForm.id) setSubscriptions(prev => prev.map(s => s.id === subForm.id ? payload : s));
        else setSubscriptions(prev => [...prev, { ...payload, id: generateId() }]);
        setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1 });
        setFormErrors(prev => ({...prev, sub: {}}));
        showToast("Assinatura salva.");
      };

      const handleSaveInst = (e) => {
        e.preventDefault();
        const errors = {};
        if (!instForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(instForm.installmentValue);
        if (isNaN(val) || val <= 0) errors.installmentValue = 'Valor inválido';
        const tot = parseInt(instForm.totalInstallments);
        if (isNaN(tot) || tot < 2) errors.totalInstallments = 'Mínimo 2 parcelas';
        const day = parseInt(instForm.dayOfMonth);
        if (isNaN(day) || day < 1 || day > 31) errors.dayOfMonth = 'Dia inválido (1-31)';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, inst: errors})); return; }
        const paid = parseInt(instForm.paidInstallments) || 0;
        const payload = { ...instForm, installmentValue: val, totalInstallments: tot, paidInstallments: paid, dayOfMonth: day, active: paid < tot, updatedAt: Date.now() };
        if (instForm.id) setInstallments(prev => prev.map(i => i.id === instForm.id ? payload : i));
        else setInstallments(prev => [...prev, { ...payload, id: generateId() }]);
        setInstForm({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas' });
        setFormErrors(prev => ({...prev, inst: {}}));
        showToast("Parcelamento salvo.");
      };

      const handleSaveGoal = (e) => {
        e.preventDefault();
        const errors = {};
        if (!goalForm.name.trim()) errors.name = 'Nome obrigatório';
        const target = parseFloat(goalForm.target);
        if (isNaN(target) || target <= 0) errors.target = 'Valor alvo inválido';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, goal: errors})); return; }
        const current = parseFloat(goalForm.current) || 0;
        const payload = { ...goalForm, target, current, updatedAt: Date.now() };
        if (goalForm.id) setGoals(prev => prev.map(g => g.id === goalForm.id ? payload : g));
        else setGoals(prev => [...prev, { ...payload, id: generateId() }]);
        setGoalForm({ id: null, name: '', target: '', current: '0' });
        setFormErrors(prev => ({...prev, goal: {}}));
        showToast("Meta salva.");
      };

      const handleDelete = (type, id) => {
        if (!window.confirm("Apagar permanentemente?")) return;
        setDeletedRecords(prev => [...prev, id]);
        if (type === 'tx') setTransactions(prev => prev.filter(t => t.id !== id));
        if (type === 'sub') setSubscriptions(prev => prev.filter(s => s.id !== id));
        if (type === 'inst') setInstallments(prev => prev.filter(i => i.id !== id));
        if (type === 'goal') setGoals(prev => prev.filter(g => g.id !== id));
        showToast("Eliminado.");
      };

      const handleGenerateSyncCode = async () => {
        if (!syncPassword) return showToast("Digite uma senha segura.", true);
        try {
          const payload = { transactions, goals, budgets, budgetsMeta, subscriptions, installments, settings, deletedRecords };
          const encrypted = await encryptData(JSON.stringify(payload), syncPassword);
          navigator.clipboard?.writeText(encrypted);
          setSyncCodeInput(encrypted); showToast("Código copiado!");
        } catch (e) { showToast("Erro de criptografia.", true); }
      };

      const handleImportSyncCode = async () => {
        if (!syncCodeInput || !syncPassword) return showToast("Cole o código e a senha.", true);
        try {
          const decrypted = await decryptData(syncCodeInput, syncPassword);
          const data = JSON.parse(decrypted);
          const newDeleted = Array.from(new Set([...deletedRecords, ...(data.deletedRecords || [])]));
          const mergeCRDT = (local = [], remote = []) => {
            const map = new Map(); local.forEach(i => map.set(i.id, i));
            remote.forEach(i => {
              if (newDeleted.includes(i.id)) return;
              const existing = map.get(i.id);
              if (!existing || (i.updatedAt || 0) > (existing.updatedAt || 0)) map.set(i.id, i);
            });
            return Array.from(map.values()).filter(i => !newDeleted.includes(i.id));
          };
          setTransactions(mergeCRDT(transactions, data.transactions)); setGoals(mergeCRDT(goals, data.goals));
          setSubscriptions(mergeCRDT(subscriptions, data.subscriptions)); setInstallments(mergeCRDT(installments, data.installments));
          setDeletedRecords(newDeleted);
          if (data.budgets) setBudgets(data.budgets);
          if (data.budgetsMeta && (data.budgetsMeta.updatedAt || 0) > (budgetsMeta.updatedAt || 0)) setBudgetsMeta(data.budgetsMeta);
          if (data.settings && (data.settings.updatedAt || 0) > (settings.updatedAt || 0)) setSettings(data.settings);
          setSyncCodeInput(''); setSyncPassword(''); showToast("Sync concluído! 🚀");
        } catch (e) { showToast("Senha ou código inválido.", true); }
      };

      const handleExportCSV = () => {
        let csv = "Data,Tipo,Categoria,Descricao,Valor,Scope,PagoPor\n";
        transactions.forEach(t => csv += `${t.date},${t.type},${t.category},"${t.desc.replace(/"/g, '""')}",${t.value},${t.scope || 'joint'},${t.paidBy || 'A'}\n`);
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = "financas_dmx.csv"; link.click(); showToast("CSV exportado.");
      };

      const generateAIReport = () => {
        const r = []; const bal = totals.inc - totals.exp; const sr = totals.inc > 0 ? (bal / totals.inc) * 100 : 0;
        if (totals.inc === 0) r.push({ type: 'warning', icon: '⚠️', title: 'Sem Renda', text: 'Cadastre salários na aba Sync.' });
        else if (totals.exp > totals.inc) r.push({ type: 'danger', icon: '🚨', title: 'Gastos Excedentes', text: `Gastou ${formatMoney(Math.abs(bal))} a mais.` });
        else if (sr >= 20) r.push({ type: 'success', icon: '🏆', title: 'Saúde Impecável', text: `Poupou ${sr.toFixed(1)}% da renda.` });
        else r.push({ type: 'warning', icon: '📉', title: 'Atenção', text: `Reteve apenas ${sr.toFixed(1)}%.` });
        const cats = Object.entries(categoriesTotal).sort((a,b)=>b[1].val - a[1].val);
        if (cats.length > 0) r.push({ type: 'info', icon: '💡', title: `Maior Foco: ${cats[0][0]}`, text: `${((cats[0][1].val / totals.exp)*100).toFixed(1)}% das despesas.` });
        return r;

                <div><h1 className="font-extrabold text-lg tracking-tight text-slate-900 dark:text-white">Finanças DMX</h1><p className="text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em]">Enterprise</p></div>
              </div>

                {[{ id: 'dashboard', icon: '📊', label: 'Dashboard' }, { id: 'transactions', icon: '💸', label: 'Transações' }, { id: 'subscriptions', icon: '🔁', label: 'Assinaturas' }, { id: 'installments', icon: '💳', label: 'Parcelas' }, { id: 'goals', icon: '🎯', label: 'Metas' }, { id: 'budgets', icon: '💰', label: 'Orçamentos' }, { id: 'sync', icon: '☁️', label: 'Sync & Config' }].map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col md:flex-row items-center md:justify-start gap-3 px-4 py-3 rounded-2xl transition-all duration-300 font-semibold text-xs md:text-sm ${activeTab === tab.id ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900 shadow-lg transform md:translate-x-1' : 'text-slate-500 hover:bg-slate-200/50 dark:hover:bg-slate-800/50'}`} aria-current={activeTab === tab.id ? 'page' : undefined}>
                    <span className="text-lg md:text-xl" aria-hidden="true">{tab.icon}</span><span className="hidden md:inline">{tab.label}</span>
                  </button>

                        </div>
                      </div>
                    </BentoCard>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">

                      <DonutChart categoriesTotal={categoriesTotal} />
                    </BentoCard>
                    <BentoCard title="Evolução (6 meses)" icon="📊">
                      <EvolutionChart transactions={transactions} settings={settings} />

                  </div>

                  <div className="flex justify-end">
                    <button onClick={() => setShowAI(!showAI)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all shadow-lg ${showAI ? 'bg-slate-800 text-white dark:bg-slate-200 dark:text-slate-900' : 'bg-gradient-to-r from-blue-600 to-partner-600 text-white hover:scale-105 shadow-partner-500/25'}`}>
                      <span>✨</span> {showAI ? 'Ocultar Análise IA' : 'Analisar Finanças com IA'}

                  </div>

                  {showAI && (

                      <h3 className="font-extrabold text-xl mb-6 flex items-center gap-2"><span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-partner-500">Relatório de Inteligência</span></h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {generateAIReport().map((r, idx) => {
                          const styles = { 
                            success: 'bg-emerald-50 dark:bg-emerald-900/20 border-emerald-200 dark:border-emerald-800 text-emerald-800 dark:text-emerald-400', 
                            warning: 'bg-amber-50 dark:bg-amber-900/20 border-amber-200 dark:border-amber-800 text-amber-800 dark:text-amber-400', 
                            danger: 'bg-rose-50 dark:bg-rose-900/20 border-rose-200 dark:border-rose-800 text-rose-800 dark:text-rose-400', 
                            info: 'bg-blue-50 dark:bg-blue-900/20 border-blue-200 dark:border-blue-800 text-blue-800 dark:text-blue-400' 
                          };
                          return (
                            <div key={idx} className={`p-5 rounded-2xl border ${styles[r.type]}`}>

                              <p className="text-sm font-medium opacity-90">{r.text}</p>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* === TRANSACTIONS === */}
              {activeTab === 'transactions' && (
                <div className="space-y-6 animate-slide-up">
                  <form onSubmit={handleSaveTx} className="glass-card p-6 md:p-8 rounded-3xl">

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                      <div className="md:col-span-2">
                        <label htmlFor="tx-desc" className={labelClass}>Descrição</label>
                        <input id="tx-desc" type="text" value={txForm.desc} onChange={e=>setTxForm({...txForm, desc: e.target.value})} className={`${inputClass} ${formErrors.tx.desc ? 'field-error' : ''}`} placeholder="Ex: Supermercado" required />
                        {formErrors.tx.desc && <div className="error-message">⚠️ {formErrors.tx.desc}</div>}
                      </div>
                      <div>
                        <label htmlFor="tx-value" className={labelClass}>Valor (R$)</label>
                        <input id="tx-value" type="number" step="0.01" value={txForm.value} onChange={e=>setTxForm({...txForm, value: e.target.value})} className={`${inputClass} ${formErrors.tx.value ? 'field-error' : ''}`} placeholder="0,00" required />
                        {formErrors.tx.value && <div className="error-message">⚠️ {formErrors.tx.value}</div>}
                      </div>
                      <div>
                        <label htmlFor="tx-category" className={labelClass}>Categoria</label>
                        <select id="tx-category" value={txForm.category} onChange={e=>setTxForm({...txForm, category: e.target.value})} className={inputClass}>
                          {predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label htmlFor="tx-type" className={labelClass}>Tipo</label>
                        <select id="tx-type" value={txForm.type} onChange={e=>setTxForm({...txForm, type: e.target.value})} className={inputClass}>

                      </div>
                      <div>
                        <label htmlFor="tx-date" className={labelClass}>Data</label>
                        <input id="tx-date" type="date" value={txForm.date} onChange={e=>setTxForm({...txForm, date: e.target.value})} className={inputClass} required />
                      </div>
                      <div>
                        <label htmlFor="tx-scope" className={labelClass}>Escopo</label>
                        <select id="tx-scope" value={txForm.scope} onChange={e=>setTxForm({...txForm, scope: e.target.value})} className={inputClass}>
                          <option value="joint">Despesa Conjunta</option><option value="A">Individual: {settings.nameA}</option><option value="B">Individual: {settings.nameB}</option>

                      </div>
                      {txForm.scope === 'joint' && (
                        <div>
                          <label htmlFor="tx-paidBy" className={labelClass}>Pago por</label>
                          <select id="tx-paidBy" value={txForm.paidBy} onChange={e=>setTxForm({...txForm, paidBy: e.target.value})} className={inputClass}>

                        <button type="submit" className="flex-1 bg-brand-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 hover:shadow-brand-500/40 hover:-translate-y-0.5 transition-all">Salvar Transação</button>
                      </div>

                  </form>
                  
                  <BentoCard title={`Registos de ${monthFilter}`}>
                    <div className="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                      {filteredTransactions.length === 0 ? <p className="text-center py-10 text-slate-400">Nenhum registo neste mês.</p> : filteredTransactions.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t => (

                  </form>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {subscriptions.length === 0 ? <div className="col-span-full glass-card p-10 rounded-3xl text-center text-slate-400">Nenhuma assinatura cadastrada.</div> : subscriptions.map(s => (
                      <div key={s.id} className={`glass-card p-6 rounded-3xl transition-all duration-300 ${s.active ? 'hover:-translate-y-1 hover:shadow-xl' : 'opacity-60 grayscale-[0.5]'}`}>
                        <div className="flex justify-between items-start mb-6">
                          <div><h4 className="font-extrabold text-lg text-slate-800 dark:text-white">{s.desc}</h4><p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider mt-1">{s.category}</p></div>
                          <div className="flex gap-1">
                            <button onClick={()=>setSubForm(s)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">✏️</button>
                            <button onClick={()=>handleDelete('sub', s.id)} className="p-2 hover:bg-rose-100 hover:text-rose-600 dark:hover:bg-rose-900/30 rounded-lg transition-colors">🗑️</button>
                          </div>
                        </div>
                        <div className="flex justify-between items-end mb-6">
                          <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Valor</p><p className="font-black text-2xl text-slate-800 dark:text-white">{formatMoney(s.value)}</p></div>
                          <div className="text-right"><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Dia</p><p className="font-black text-xl text-brand-500">{s.dayOfMonth}</p></div>
                        </div>
                        <button onClick={()=>setSubscriptions(prev=>prev.map(x=>x.id===s.id?{...x,active:!x.active,updatedAt:Date.now()}:x))} className={`w-full py-3 rounded-xl font-bold text-sm transition-all ${s.active ? 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700' : 'bg-brand-500 text-white shadow-lg shadow-brand-500/25'}`}>{s.active ? 'Pausar' : 'Reativar'}</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* === INSTALLMENTS === */}
              {activeTab === 'installments' && (
                <div className="space-y-6 animate-slide-up">
                  <form onSubmit={handleSaveInst} className="glass-card p-6 md:p-8 rounded-3xl">
                    <h3 className="font-extrabold text-xl mb-6">{instForm.id ? 'Editar Parcelamento' : 'Novo Parcelamento'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 items-end">
                      <div className="lg:col-span-2">
                        <label htmlFor="inst-desc" className={labelClass}>Descrição da Compra</label>
                        <input id="inst-desc" type="text" value={instForm.desc} onChange={e=>setInstForm({...instForm, desc: e.target.value})} className={`${inputClass} ${formErrors.inst.desc ? 'field-error' : ''}`} placeholder="Ex: iPhone 15" required />
                        {formErrors.inst.desc && <div className="error-message">⚠️ {formErrors.inst.desc}</div>}
                      </div>
                      <div>
                        <label htmlFor="inst-val" className={labelClass}>Valor Parcela (R$)</label>
                        <input id="inst-val" type="number" step="0.01" value={instForm.installmentValue} onChange={e=>setInstForm({...instForm, installmentValue: e.target.value})} className={`${inputClass} ${formErrors.inst.installmentValue ? 'field-error' : ''}`} placeholder="0,00" required />
                        {formErrors.inst.installmentValue && <div className="error-message">⚠️ {formErrors.inst.installmentValue}</div>}
                      </div>
                      <div>
                        <label htmlFor="inst-tot" className={labelClass}>Total Parcelas</label>
                        <input id="inst-tot" type="number" min="2" value={instForm.totalInstallments} onChange={e=>setInstForm({...instForm, totalInstallments: e.target.value})} className={`${inputClass} ${formErrors.inst.totalInstallments ? 'field-error' : ''} text-center`} required />
                        {formErrors.inst.totalInstallments && <div className="error-message">⚠️ {formErrors.inst.totalInstallments}</div>}
                      </div>
                      <div>
                        <label htmlFor="inst-paid" className={labelClass}>Já Pagas</label>
                        <input id="inst-paid" type="number" min="0" value={instForm.paidInstallments} onChange={e=>setInstForm({...instForm, paidInstallments: e.target.value})} className={`${inputClass} text-center`} />
                      </div>
                      <div>
                        <label htmlFor="inst-day" className={labelClass}>Dia Venc.</label>
                        <input id="inst-day" type="number" min="1" max="31" value={instForm.dayOfMonth} onChange={e=>setInstForm({...instForm, dayOfMonth: e.target.value})} className={`${inputClass} ${formErrors.inst.dayOfMonth ? 'field-error' : ''} text-center`} required />
                        {formErrors.inst.dayOfMonth && <div className="error-message">⚠️ {formErrors.inst.dayOfMonth}</div>}
                      </div>
                      <div className="col-span-full flex justify-end gap-3 mt-2">
                        {instForm.id && <button type="button" onClick={()=>{setInstForm({id:null,desc:'',installmentValue:'',paidInstallments:0,totalInstallments:2,dayOfMonth:1,category:'Dívidas'}); setFormErrors(prev => ({...prev, inst: {}}));}} className="px-6 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button type="submit" className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 transition-all">Salvar</button>
                      </div>
                    </div>
                  </form>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {installments.length === 0 ? <div className="col-span-full glass-card p-10 rounded-3xl text-center text-slate-400">Nenhum parcelamento ativo.</div> : installments.map(i => {
                      const cur = Math.min(i.paidInstallments || 0, i.totalInstallments);
                      const pct = i.totalInstallments > 0 ? (cur / i.totalInstallments) * 100 : 0;
                      return (
                        <div key={i.id} className={`glass-card p-6 rounded-3xl transition-all duration-300 ${i.active ? 'hover:-translate-y-1 hover:shadow-xl' : 'opacity-70'}`}>
                          <div className="flex justify-between items-start mb-4">
                            <h4 className="font-extrabold text-lg text-slate-800 dark:text-white">{i.desc}</h4>
                            <div className="flex gap-1">
                              <button onClick={()=>setInstForm(i)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">✏️</button>
                              <button onClick={()=>handleDelete('inst', i.id)} className="p-2 hover:bg-rose-100 hover:text-rose-600 dark:hover:bg-rose-900/30 rounded-lg transition-colors">🗑️</button>
                            </div>
                          </div>
                          <div className="mb-5">
                            <div className="flex justify-between text-xs font-bold text-slate-500 mb-2"><span>Progresso: {cur}/{i.totalInstallments}</span><span>{pct.toFixed(0)}%</span></div>
                            <div className="w-full h-2.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                              <div className={`h-full transition-all duration-1000 ease-out rounded-full ${i.active ? 'bg-gradient-to-r from-brand-400 to-brand-600' : 'bg-emerald-500'}`} style={{width: `${pct}%`}}></div>
                            </div>
                          </div>
                          <div className="flex justify-between items-end">
                            <div><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Parcela</p><p className="font-black text-xl text-slate-800 dark:text-white">{formatMoney(i.installmentValue)}</p><p className="text-[10px] text-slate-500 font-medium mt-1">Total: {formatMoney(i.installmentValue * i.totalInstallments)}</p></div>
                            <div className="text-right"><p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-1">Venc.</p><p className="font-black text-lg text-brand-500">Dia {i.dayOfMonth}</p></div>
                          </div>
                        </div>
                      )
                    })}
                  </div>
                </div>
              )}

              {/* === GOALS === */}
              {activeTab === 'goals' && (
                <div className="space-y-6 animate-slide-up">
                  <form onSubmit={handleSaveGoal} className="glass-card p-6 md:p-8 rounded-3xl">
                    <h3 className="font-extrabold text-xl mb-6">{goalForm.id ? 'Atualizar Meta' : 'Nova Meta Financeira'}</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
                      <div className="md:col-span-1">
                        <label htmlFor="goal-name" className={labelClass}>Objetivo</label>
                        <input id="goal-name" type="text" value={goalForm.name} onChange={e=>setGoalForm({...goalForm, name: e.target.value})} className={`${inputClass} ${formErrors.goal.name ? 'field-error' : ''}`} placeholder="Ex: Viagem" required />
                        {formErrors.goal.name && <div className="error-message">⚠️ {formErrors.goal.name}</div>}
                      </div>
                      <div>
                        <label htmlFor="goal-target" className={labelClass}>Alvo (R$)</label>
                        <input id="goal-target" type="number" step="0.01" value={goalForm.target} onChange={e=>setGoalForm({...goalForm, target: e.target.value})} className={`${inputClass} ${formErrors.goal.target ? 'field-error' : ''}`} placeholder="0,00" required />
                        {formErrors.goal.target && <div className="error-message">⚠️ {formErrors.goal.target}</div>}
                      </div>
                      <div>
                        <label htmlFor="goal-current" className={labelClass}>Já Guardado (R$)</label>
                        <input id="goal-current" type="number" step="0.01" value={goalForm.current} onChange={e=>setGoalForm({...goalForm, current: e.target.value})} className={inputClass} placeholder="0,00" />
                      </div>
                      <div className="col-span-full flex gap-3 justify-end mt-2">
                        {goalForm.id && <button type="button" onClick={()=>{setGoalForm({id:null,name:'',target:'',current:'0'}); setFormErrors(prev => ({...prev, goal: {}}));}} className="px-6 py-3 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold">Cancelar</button>}
                        <button type="submit" className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 transition-all">Salvar Meta</button>
                      </div>
                    </div>
                  </form>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {goals.length === 0 ? <div className="col-span-full glass-card p-10 rounded-3xl text-center text-slate-400">Nenhuma meta registada.</div> : goals.map(g => {
                      const pct = Math.min(100, (g.current / g.target) * 100);
                      return (
                        <div key={g.id} className="glass-card p-6 rounded-3xl flex flex-col justify-between hover:-translate-y-1 hover:shadow-xl transition-all duration-300">
                          <div>
                            <div className="flex justify-between items-start mb-3">
                              <h3 className="font-extrabold text-lg text-slate-800 dark:text-white">{g.name}</h3>
                              <div className="flex gap-1">
                                <button onClick={()=>setGoalForm(g)} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors">✏️</button>
                                <button onClick={()=>handleDelete('goal', g.id)} className="p-2 hover:bg-rose-100 hover:text-rose-600 dark:hover:bg-rose-900/30 rounded-lg transition-colors">🗑️</button>
                              </div>
                            </div>
                            <p className="text-xs text-slate-500 font-medium mb-4"><span className="font-bold text-slate-700 dark:text-slate-300 text-base">{formatMoney(g.current)}</span> de {formatMoney(g.target)}</p>
                          </div>
                          <div>
                            <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2">
                              <div className="h-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-1000 ease-out rounded-full" style={{ width: `${pct}%` }}></div>
                            </div>
                            <div className="text-right text-[10px] font-black text-brand-500 tracking-wider">{pct.toFixed(1)}% CONCLUÍDO</div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* === BUDGETS === */}
              {activeTab === 'budgets' && (
                <div className="space-y-6 animate-slide-up">
                  <form onSubmit={(e) => {
                    e.preventDefault();
                    const lim = parseFloat(budgetForm.limit); 
                    if(isNaN(lim)||lim<=0) { setFormErrors(prev => ({...prev, budget: {limit: 'Valor inválido'}})); return; }
                    setBudgets(prev => ({ ...prev, [budgetForm.category]: lim })); 
                    setBudgetsMeta({ updatedAt: Date.now() });
                    setBudgetForm({ category: 'Alimentação', limit: '' }); 
                    setFormErrors(prev => ({...prev, budget: {}}));
                    showToast("Orçamento definido.");
                  }} className="glass-card p-6 md:p-8 rounded-3xl">
                    <h3 className="font-extrabold text-xl mb-6">Orçamentos Mensais</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5 items-end">
                      <div>
                        <label htmlFor="budget-cat" className={labelClass}>Categoria</label>
                        <select id="budget-cat" value={budgetForm.category} onChange={e=>setBudgetForm({...budgetForm, category: e.target.value})} className={inputClass}>
                          {predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                      <div>
                        <label htmlFor="budget-limit" className={labelClass}>Limite Máximo (R$)</label>
                        <input id="budget-limit" type="number" step="0.01" value={budgetForm.limit} onChange={e=>setBudgetForm({...budgetForm, limit: e.target.value})} className={`${inputClass} ${formErrors.budget.limit ? 'field-error' : ''}`} placeholder="0,00" required />
                        {formErrors.budget.limit && <div className="error-message">⚠️ {formErrors.budget.limit}</div>}
                      </div>
                      <button type="submit" className="bg-brand-500 text-white font-bold py-3 rounded-xl shadow-lg shadow-brand-500/25 hover:bg-brand-600 transition-all">Definir Orçamento</button>
                    </div>
                  </form>

                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    {Object.keys(budgets).length === 0 ? <div className="col-span-full glass-card p-10 rounded-3xl text-center text-slate-400">Nenhum orçamento definido.</div> : Object.entries(budgets).map(([cat, limit]) => {
                      const spent = categoriesTotal[cat]?.val || 0; const pct = Math.min(100, (spent / limit) * 100); const isOver = spent > limit;
                      return (
                        <div key={cat} className="glass-card p-6 rounded-3xl flex flex-col justify-between hover:-translate-y-1 hover:shadow-xl transition-all duration-300">
                          <div>
                            <div className="flex justify-between items-start mb-3">
                              <h3 className="font-extrabold text-lg text-slate-800 dark:text-white">{cat}</h3>
                              <button type="button" onClick={()=>{const b={...budgets}; delete b[cat]; setBudgets(b); setBudgetsMeta({ updatedAt: Date.now() });}} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/20 rounded-lg transition-colors" aria-label="Remover">🗑️</button>
                            </div>
                            <p className="text-sm font-medium mb-4 text-slate-600 dark:text-slate-300">Gasto: <span className="font-bold">{formatMoney(spent)}</span> / {formatMoney(limit)}</p>
                          </div>
                          <div>
                            <div className="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden mb-2">
                              <div className={`h-full transition-all duration-1000 ease-out rounded-full ${isOver ? 'bg-rose-500' : 'bg-brand-500'}`} style={{ width: `${pct}%` }}></div>
                            </div>
                            <div className={`text-right text-[10px] font-black tracking-wider ${isOver ? 'text-rose-500' : 'text-brand-500'}`}>{pct.toFixed(1)}% UTILIZADO</div>
                            {isOver && <div className="mt-2 text-rose-500 text-xs font-bold flex items-center gap-1">⚠️ Limite ultrapassado!</div>}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* === SYNC & CONFIG === */}
              {activeTab === 'sync' && (
                <div className="space-y-6 animate-slide-up">
                  <BentoCard title="Configurações do Casal" icon="👥" className="border-t-4 border-t-emerald-500">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                        <h3 className="font-bold mb-4 text-brand-600 flex items-center gap-2">👤 {settings.nameA || 'Pessoa A'}</h3>
                        <label className={labelClass}>Nome</label>
                        <input type="text" value={settings.nameA} onChange={e=>setSettings({...settings, nameA: e.target.value, updatedAt: Date.now()})} className={`${inputClass} mb-4 font-bold`} placeholder="Nome" />
                        <label className={labelClass}>Salário Mensal (R$)</label>
                        <input type="number" step="0.01" value={settings.salaryA} onChange={e=>setSettings({...settings, salaryA: e.target.value, updatedAt: Date.now()})} className={inputClass} placeholder="0,00" />
                      </div>
                      <div className="p-6 bg-slate-100 dark:bg-slate-800/50 rounded-2xl border border-slate-200 dark:border-slate-700">
                        <h3 className="font-bold mb-4 text-partner-600 flex items-center gap-2">👤 {settings.nameB || 'Pessoa B'}</h3>
                        <label className={labelClass}>Nome</label>
                        <input type="text" value={settings.nameB} onChange={e=>setSettings({...settings, nameB: e.target.value, updatedAt: Date.now()})} className={`${inputClass} mb-4 font-bold`} placeholder="Nome" />
                        <label className={labelClass}>Salário Mensal (R$)</label>
                        <input type="number" step="0.01" value={settings.salaryB} onChange={e=>setSettings({...settings, salaryB: e.target.value, updatedAt: Date.now()})} className={inputClass} placeholder="0,00" />
                      </div>
                    </div>
                  </BentoCard>

                  <BentoCard title="Sync Seguro (AES-GCM & CRDT)" icon="🔒" className="border-t-4 border-t-brand-500">
                    <p className="text-sm text-slate-500 mb-6 leading-relaxed">Os dados são encriptados ponta-a-ponta. Definam a <strong>MESMA senha</strong> nos dois dispositivos para fundir os dados com segurança militar.</p>
                    <div className="max-w-md mb-6">
                      <label className={labelClass}>Senha Secreta do Casal</label>
                      <input type="password" value={syncPassword} onChange={e=>setSyncPassword(e.target.value)} className={`${inputClass} font-mono tracking-widest`} placeholder="••••••••" />
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      <button onClick={handleGenerateSyncCode} className="bg-brand-500 text-white font-bold py-4 rounded-xl hover:bg-brand-600 transition-all shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 hover:-translate-y-0.5">1. Gerar Código e Copiar</button>
                      <div className="flex flex-col gap-3">
                        <label className={labelClass}>Código do Parceiro</label>
                        <textarea value={syncCodeInput} onChange={e=>setSyncCodeInput(e.target.value)} className={`${inputClass} h-16 text-xs font-mono resize-none`} placeholder="Cole o código criptografado aqui..."></textarea>
                        <button onClick={handleImportSyncCode} className="bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 hover:-translate-y-0.5">2. Descriptografar & Fundir</button>
                      </div>
                    </div>
                  </BentoCard>

                  <BentoCard className="flex flex-col md:flex-row gap-6 items-center justify-between">
                    <div>
                      <h3 className="font-bold text-lg mb-1 flex items-center gap-2">📁 Dados Tradicionais (CSV)</h3>
                      <p className="text-xs text-slate-500">Exporte para Excel ou importe o seu histórico manualmente.</p>
                    </div>
                    <div className="flex gap-4">
                      <button onClick={handleExportCSV} className="bg-emerald-500 text-white font-bold py-3 px-6 rounded-xl hover:bg-emerald-600 shadow-md shadow-emerald-500/20 transition-all hover:-translate-y-0.5">Exportar</button>
                      <label className="bg-slate-200 text-slate-800 hover:bg-slate-300 dark:bg-slate-700 dark:text-white dark:hover:bg-slate-600 font-bold py-3 px-6 rounded-xl cursor-pointer shadow-md transition-all hover:-translate-y-0.5 flex items-center gap-2">
                        📥 Importar <input type="file" accept=".csv" onChange={(e) => {
                          const file = e.target.files[0]; if (!file) return;
                          const reader = new FileReader();
                          reader.onload = (evt) => {
                            const lines = evt.target.result.split(/\r?\n/); let added = 0; const newTxs = [];
                            for (let i = 1; i < lines.length; i++) {
                              if (!lines[i].trim()) continue;
                              const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                              if (columns.length >= 5) {
                                const [date, type, category, desc, value] = columns.map(c => c.trim().replace(/^"|"$/g, ''));
                                if (date && value && !isNaN(parseFloat(value))) {
                                  newTxs.push({ id: generateId(), date, type: type === 'income' ? 'income' : 'expense', category, desc, value: parseFloat(value), scope: 'joint', paidBy: 'A', updatedAt: Date.now() });
                                  added++;
                                }
                              }
                            }
                            if (added > 0) { setTransactions(prev => [...newTxs, ...prev]); showToast(`${added} importados!`); }
                          }; reader.readAsText(file); e.target.value = '';
                        }} className="hidden" />
                      </label>
                    </div>
                  </BentoCard>
                </div>
              )}

            </div>
          </main>
          
          {/* Toasts */}
          <div className="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none" aria-live="polite">
            {toasts.map(t => (
              <div key={t.id} className={`px-5 py-4 rounded-2xl shadow-2xl font-bold text-sm bg-white dark:bg-slate-800 border-l-4 animate-slide-up flex items-center gap-3 ${t.isError ? 'border-rose-500 text-rose-600 dark:text-rose-400' : 'border-brand-500 text-brand-600 dark:text-brand-400'}`}>
                <span className="text-lg">{t.isError ? '⚠️' : '✅'}</span>
                {t.msg}
              </div>
            ))}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App />);
  </script>
</body>
</html>
