<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Finanças DMX</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 50: '#f5f3ff', 100: '#ede9fe', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' }
          },
          animation: {
            'blob': 'blob 20s infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            blob: {
              '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(40px, -60px) scale(1.15)' },
              '66%': { transform: 'translate(-30px, 30px) scale(0.9)' },
            },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        },
      },
    }

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAlH98iLdFcizTtV6OpA0k64kyA5Ap-tbE",
      authDomain: "financas-dmx.firebaseapp.com",
      projectId: "financas-dmx",
      storageBucket: "financas-dmx.firebasestorage.app",
      messagingSenderId: "521024102499",
      appId: "1:521024102499:web:22261ba97d5dddc1eb9856"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.5); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); }
    .dark .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
    .field-error { border-color: #f43f5e !important; background-color: rgba(244, 63, 94, 0.05) !important; }
    .error-message { color: #f43f5e; font-size: 0.75rem; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .donut-segment { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke-width 0.3s; }
    .donut-segment:hover { stroke-width: 14; filter: drop-shadow(0 0 6px currentColor); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#050914] dark:text-slate-100 min-h-screen transition-colors duration-500">
  
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-400/20 dark:bg-brand-500/10 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-partner-400/20 dark:bg-partner-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 5s"></div>
    <div class="absolute top-[40%] left-[40%] w-[30%] h-[30%] bg-blue-400/10 dark:bg-blue-500/5 rounded-full blur-[100px] animate-blob" style="animation-delay: 10s"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useContext, createContext, memo } = React;

    // ==================== UTILITÁRIOS ====================
    const getLocalDateString = () => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; };
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const generateId = () => window.crypto?.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });
    const generateInviteCode = () => { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let code = ''; for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)]; return code; };
    const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

    // ALGORITMO CORRIGIDO: Aceita intervalo de meses e lastPaidMonth para pular meses corretamente
    const calcNextDue = (dayOfMonth, intervalMonths = 1, lastPaidMonthStr = null) => {
      const today = new Date();
      today.setHours(0,0,0,0);
      let nextY = today.getFullYear();
      let nextM = today.getMonth();

      if (lastPaidMonthStr) {
        const [y, m] = lastPaidMonthStr.split('-');
        const lpDate = new Date(parseInt(y), parseInt(m) - 1, 1);
        lpDate.setMonth(lpDate.getMonth() + parseInt(intervalMonths));
        nextY = lpDate.getFullYear();
        nextM = lpDate.getMonth();
      } else {
        if (today.getDate() > dayOfMonth) nextM += 1;
      }

      const dueDate = new Date(nextY, nextM, dayOfMonth);
      dueDate.setHours(0,0,0,0);
      const diffTime = dueDate.getTime() - today.getTime();
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      const isLate = diffDays < 0;
      
      return { dueDate, diffDays, isLate, daysLate: isLate ? Math.abs(diffDays) : 0 };
    };

    // ==================== DATA SERVICE ====================
    const DataService = {
      signUp: async (email, password, name) => { const userCredential = await auth.createUserWithEmailAndPassword(email, password); await db.collection('users').doc(userCredential.user.uid).set({ email, name, createdAt: firebase.firestore.FieldValue.serverTimestamp(), mode: null, coupleId: null, partnerId: null, settings: { salary: 0, currency: 'BRL', nameInCouple: 'Pessoa A' } }); return userCredential.user; },
      signIn: async (email, password) => (await auth.signInWithEmailAndPassword(email, password)).user,
      signOut: async () => await auth.signOut(),
      sendPasswordReset: async (email) => await auth.sendPasswordResetEmail(email),
      getUserData: async (userId) => { const doc = await db.collection('users').doc(userId).get(); return doc.exists ? { ...doc.data(), id: doc.id } : null; },
      updateUser: async (userId, updates) => await db.collection('users').doc(userId).update({ ...updates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      getCoupleData: async (coupleId) => { if (!coupleId) return null; const doc = await db.collection('couples').doc(coupleId).get(); return doc.exists ? { ...doc.data(), id: doc.id } : null; },
      updateCouple: async (coupleId, updates) => await db.collection('couples').doc(coupleId).update({ ...updates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      regenerateInviteCode: async (coupleId) => { const newCode = generateInviteCode(); await db.collection('couples').doc(coupleId).update({ inviteCode: newCode, inviteCodeGeneratedAt: firebase.firestore.FieldValue.serverTimestamp() }); return newCode; },
      createCouple: async (currentUser, partnerEmail, nameInCouple) => {
        const partnerQuery = await db.collection('users').where('email', '==', partnerEmail).limit(1).get();
        if (partnerQuery.empty) throw new Error('Este email não está cadastrado. Peça para seu parceiro criar uma conta primeiro.');
        const pDoc = partnerQuery.docs[0]; const pData = pDoc.data(); const partnerId = pDoc.id;
        if (pData.mode === 'couple') throw new Error('Este usuário já está em um casal.');
        const inviteCode = generateInviteCode();
        const coupleRef = await db.collection('couples').add({ userA: currentUser.uid, userB: partnerId, inviteCode, inviteEmail: partnerEmail, createdAt: firebase.firestore.FieldValue.serverTimestamp(), acceptedAt: null, settings: { nameA: nameInCouple, nameB: pData.name || 'Pessoa B', salaryA: 0, salaryB: 0 } });
        await db.collection('users').doc(currentUser.uid).update({ mode: 'couple', coupleId: coupleRef.id, partnerId: partnerId, 'settings.nameInCouple': nameInCouple, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return { coupleId: coupleRef.id, partnerId, inviteCode };
      },
      acceptInviteByCode: async (currentUser, inviteCode) => {
        const allCouples = await db.collection('couples').get();
        const coupleDoc = allCouples.docs.find(doc => doc.data().inviteCode === inviteCode.toUpperCase() && !doc.data().acceptedAt);
        if (!coupleDoc) throw new Error('Código inválido ou já utilizado.');
        const coupleData = coupleDoc.data();
        if (coupleData.inviteEmail.toLowerCase() !== currentUser.email.toLowerCase()) throw new Error('Este código foi enviado para outro email. Verifique a conta.');
        await db.collection('couples').doc(coupleDoc.id).update({ acceptedAt: firebase.firestore.FieldValue.serverTimestamp(), userB: currentUser.uid });
        await db.collection('users').doc(currentUser.uid).update({ mode: 'couple', coupleId: coupleDoc.id, partnerId: coupleData.userA, 'settings.nameInCouple': 'Pessoa B', updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return { coupleId: coupleDoc.id, partnerId: coupleData.userA };
      },
      dissolveCouple: async (userId, coupleId) => {
        const coupleData = await DataService.getCoupleData(coupleId); if (!coupleData) return;
        await db.collection('users').doc(coupleData.userA).update({ mode: 'solo', coupleId: null, partnerId: null, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        await db.collection('users').doc(coupleData.userB).update({ mode: 'solo', coupleId: null, partnerId: null, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        const sharedTxs = await db.collection('transactions').where('coupleId', '==', coupleId).get();
        for (const doc of sharedTxs.docs) await doc.ref.update({ scope: 'private', coupleId: null });
        await db.collection('couples').doc(coupleId).delete();
      },
      getAllTransactions: async (userId, coupleId) => {
        const txs = [];
        const personalSnap = await db.collection('transactions').where('ownerId', '==', userId).get();
        personalSnap.docs.forEach(doc => txs.push({ ...doc.data(), id: doc.id }));
        if (coupleId) {
          const sharedSnap = await db.collection('transactions').where('coupleId', '==', coupleId).get();
          sharedSnap.docs.forEach(doc => { const data = doc.data(); if (data.ownerId !== userId) txs.push({ id: doc.id, ...data }); });
        }
        return txs.sort((a, b) => new Date(b.date) - new Date(a.date));
      },
      addTransaction: async (txData) => { const docRef = await db.collection('transactions').add({ ...txData, createdAt: firebase.firestore.FieldValue.serverTimestamp() }); return docRef.id; },
      updateTransaction: async (txId, updates) => await db.collection('transactions').doc(txId).update({ ...updates, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      deleteTransaction: async (txId) => await db.collection('transactions').doc(txId).delete(),
      getCollection: async (collectionName, userId, coupleId) => {
        const items = []; const pSnap = await db.collection(collectionName).where('ownerId', '==', userId).get();
        pSnap.docs.forEach(doc => items.push({ ...doc.data(), id: doc.id }));
        if (coupleId) {
          const sSnap = await db.collection(collectionName).where('coupleId', '==', coupleId).get();
          sSnap.docs.forEach(doc => { const data = doc.data(); if (data.ownerId !== userId) items.push({ id: doc.id, ...data }); });
        }
        return items;
      },
      addGoal: async (data) => (await db.collection('goals').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() })).id,
      updateGoal: async (id, data) => await db.collection('goals').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      deleteGoal: async (id) => await db.collection('goals').doc(id).delete(),
      addSubscription: async (data) => (await db.collection('subscriptions').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() })).id,
      updateSubscription: async (id, data) => await db.collection('subscriptions').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      deleteSubscription: async (id) => await db.collection('subscriptions').doc(id).delete(),
      addInstallment: async (data) => (await db.collection('installments').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() })).id,
      updateInstallment: async (id, data) => await db.collection('installments').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }),
      deleteInstallment: async (id) => await db.collection('installments').doc(id).delete(),
      getBudgets: async (oId) => { const s = await db.collection('budgets').where('ownerId', '==', oId).get(); const b = {}; s.docs.forEach(d => b[d.data().category] = d.data().limit); return b; },
      setBudget: async (oId, c, l) => await db.collection('budgets').doc(`${oId}_${c}`).set({ ownerId: oId, category: c, limit: l }),
      deleteBudget: async (oId, c) => await db.collection('budgets').doc(`${oId}_${c}`).delete(),
      addContribution: async (gId, data) => await db.collection('goals').doc(gId).collection('contributions').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp() }),
      getContributions: async (gId) => (await db.collection('goals').doc(gId).collection('contributions').orderBy('date', 'desc').get()).docs.map(d => ({ id: d.id, ...d.data() })),
      deleteContribution: async (gId, cId) => await db.collection('goals').doc(gId).collection('contributions').doc(cId).delete()
    };

    // ==================== AUTH CONTEXT (ANTI-BLOQUEIO) ====================
    const AuthContext = createContext();
    function AuthProvider({ children }) {
      const [user, setUser] = useState(null); const [userData, setUserData] = useState(null); const [coupleData, setCoupleData] = useState(null); const [loading, setLoading] = useState(true);
      const loadUserData = async (fUser) => {
        try {
          const data = await DataService.getUserData(fUser.uid); setUserData(data);
          if (data?.coupleId) setCoupleData(await DataService.getCoupleData(data.coupleId)); else setCoupleData(null);
        } catch (e) { console.error("Erro ao ler dados (Bloqueio Storage):", e); }
      };
      useEffect(() => {
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(() => auth.setPersistence(firebase.auth.Auth.Persistence.NONE));
        return auth.onAuthStateChanged(async (fUser) => {
          try { if (fUser) { setUser(fUser); await loadUserData(fUser); } else { setUser(null); setUserData(null); setCoupleData(null); } } 
          catch (e) { console.error(e); } finally { setLoading(false); }
        });
      }, []);
      return <AuthContext.Provider value={{ user, userData, coupleData, loading, signIn: DataService.signIn, signUp: DataService.signUp, signOut: DataService.signOut, sendPasswordReset: DataService.sendPasswordReset, refreshUserData: async () => { if (user) await loadUserData(user); } }}>{children}</AuthContext.Provider>;
    }
    function useAuth() { return useContext(AuthContext); }

    // ==================== COMPONENTES VISUAIS ====================
    const BentoCard = ({ children, className = "", title, icon, action }) => (
      <div className={`glass-card p-6 rounded-3xl transition-all duration-300 hover:shadow-xl ${className}`}>
        {(title || action) && (<div className="flex justify-between items-start mb-5">{title && <h3 className="font-bold text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">{icon} {title}</h3>}{action}</div>)}
        {children}
      </div>
    );

    const DonutChart = memo(({ categoriesTotal }) => {
      if (Object.keys(categoriesTotal).length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Sem dados</div>;
      const sorted = Object.entries(categoriesTotal).sort((a,b) => b[1].val - a[1].val); const total = sorted.reduce((a, c) => a + c[1].val, 0); const colors = ['#14b8a6', '#8b5cf6', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981', '#64748b'];
      return (
        <div className="flex flex-col md:flex-row items-center gap-8">
          <div className="relative w-40 h-40 flex-shrink-0">
            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90 drop-shadow-xl">
              <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" className="stroke-slate-200 dark:stroke-slate-800" />
              {sorted.map(([cat, data], i) => { const pct = (data.val / total) * 100; const offset = sorted.slice(0, i).reduce((a, c) => a + (c[1].val / total) * 100, 0); return <circle key={cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" stroke={colors[i % colors.length]} strokeDasharray={`${(pct / 100) * 251.2} 251.2`} strokeDashoffset={-(offset / 100) * 251.2} className="donut-segment" strokeLinecap="round" />; })}
            </svg>
            <div className="absolute inset-0 flex items-center justify-center flex-col"><span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total</span><span className="text-sm font-black text-slate-800 dark:text-white">{formatMoney(total)}</span></div>
          </div>
          <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
            {sorted.map(([cat, data], i) => (
              <div key={cat} className="flex justify-between items-center text-sm gap-3 group"><div className="flex items-center gap-3 flex-1 min-w-0"><span className="w-3 h-3 rounded-full flex-shrink-0 shadow-sm" style={{backgroundColor: colors[i % colors.length]}}></span><span className="font-semibold text-slate-700 dark:text-slate-200 truncate">{cat}</span></div><div className="text-right flex-shrink-0"><div className="font-bold">{formatMoney(data.val)}</div><div className="text-[10px] text-slate-500 font-medium">{((data.val / total) * 100).toFixed(1)}%</div></div></div>
            ))}
          </div>
        </div>
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const mData = {}; transactions.forEach(t => { let m = t.date?.slice(0, 7); if (!m) return; if (!mData[m]) mData[m] = { inc: 0, exp: 0 }; t.type === 'income' ? mData[m].inc += t.value : mData[m].exp += t.value; });
      const sm = Object.keys(mData).sort().slice(-6); if(sm.length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Histórico insuficiente</div>;
      let maxVal = 1; const items = sm.map(m => { const sT = (parseFloat(settings.salaryA)||0) + (parseFloat(settings.salaryB)||0); const i = (mData[m].inc||0) + sT; const e = mData[m].exp||0; if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e; return { month: m.split('-').reverse().join('/'), inc: i, exp: e }; });
      return (
        <div className="h-56 flex items-end justify-between gap-3 mt-4 px-2">
          {items.map(item => (
            <div key={item.month} className="flex flex-col items-center flex-1 group"><div className="flex items-end justify-center w-full h-44 gap-1 relative"><div className="w-2/5 max-w-[24px] bg-gradient-to-t from-brand-600 to-brand-400 rounded-t-md opacity-80" style={{ height: `${(item.inc / maxVal) * 100}%` }}></div><div className="w-2/5 max-w-[24px] bg-gradient-to-t from-rose-600 to-rose-400 rounded-t-md opacity-80" style={{ height: `${(item.exp / maxVal) * 100}%` }}></div></div><span className="text-[11px] text-slate-500 mt-3 font-bold">{item.month}</span></div>
          ))}
        </div>
      );
    });

    function AuthScreen() {
      const { signIn, signUp, sendPasswordReset } = useAuth(); const [mode, setMode] = useState('login'); const [form, setForm] = useState({ email: '', password: '', name: '' }); const [error, setError] = useState(''); const [success, setSuccess] = useState(''); const [loading, setLoading] = useState(false);
      const handleSubmit = async (e) => { e.preventDefault(); setError(''); setSuccess(''); setLoading(true); try { if (mode === 'signup') { if (!form.name.trim()) throw new Error('Nome obrigatório'); if (form.password.length < 6) throw new Error('Senha mín 6 caracteres'); await signUp(form.email, form.password, form.name); setSuccess('Conta criada!'); } else if (mode === 'login') { await signIn(form.email, form.password); } else { if (!form.email) throw new Error('Digite email'); await sendPasswordReset(form.email); setSuccess('Email enviado!'); setTimeout(() => setMode('login'), 3000); } } catch (err) { setError(err.message); } finally { setLoading(false); } };
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-brand-900 p-4 relative overflow-hidden">
          <div className="glass-card p-8 rounded-3xl w-full max-w-md shadow-2xl relative z-10 animate-fade-in"><div className="text-center mb-8"><h1 className="font-extrabold text-3xl bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-partner-400">Finanças DMX</h1></div>{error && <div className="mb-4 p-3 bg-rose-100 text-rose-700 rounded-xl text-sm font-medium">⚠️ {error}</div>}{success && <div className="mb-4 p-3 bg-emerald-100 text-emerald-700 rounded-xl text-sm font-medium">✅ {success}</div>}
            <form onSubmit={handleSubmit} className="space-y-4">
              {mode === 'signup' && <input type="text" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} className="w-full px-4 py-3 bg-slate-100/50 rounded-xl" placeholder="Nome" required />}
              <input type="email" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} className="w-full px-4 py-3 bg-slate-100/50 rounded-xl" placeholder="Email" required />
              {mode !== 'reset' && <input type="password" value={form.password} onChange={e=>setForm({...form, password:e.target.value})} className="w-full px-4 py-3 bg-slate-100/50 rounded-xl" placeholder="Senha" required minLength="6" />}

    const NFCeScanner = ({ onScanSuccess, onCancel }) => {
      const [errorMsg, setErrorMsg] = useState("");
      useEffect(() => {
        const html5QrCode = new Html5Qrcode("qr-reader");
        const qrboxFn = (vw, vh) => { const minEdge = Math.min(vw, vh); const size = Math.floor(minEdge * 0.7); return { width: size, height: size }; };
        const start = async () => {
          try { await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: qrboxFn }, (txt) => { html5QrCode.stop().then(() => onScanSuccess(txt)); }, ()=>{}); setTimeout(() => { const v = document.querySelector("#qr-reader video"); if(v){ v.style.objectFit="cover";v.style.width="100%";v.style.height="100%"; } }, 500); } 
          catch (err) { setErrorMsg("Erro na câmera."); }
        };
        start(); return () => { if(html5QrCode.isScanning) html5QrCode.stop(); };
      }, []);
      return (
        <div className="fixed inset-0 z-[200] flex justify-center items-center bg-black/95 p-4"><div className="bg-slate-900 p-6 rounded-3xl w-full max-w-sm border border-slate-700 flex flex-col"><div className="text-center mb-4"><h3 className="font-bold text-white text-xl">📸 Escanear NFC-e / PIX</h3></div>{errorMsg ? <div className="text-rose-500 font-bold mb-4">{errorMsg}</div> : <div className="relative w-full aspect-square rounded-3xl overflow-hidden mb-6 border-2 border-brand-500/50"><div id="qr-reader" className="w-full h-full"></div></div>}<button onClick={onCancel} className="w-full py-4 bg-slate-800 text-white font-bold rounded-xl">Cancelar</button></div></div>
      );
    };

          } else if (decodedText.includes('|') || decodedText.includes('sefaz')) {
            desc = "Compras (NFC-e)"; category = "Casa/Mercado";
            const params = decodedText.split('|');
            if (params.length >= 5) { const possibleValue = parseFloat(params[4]); if (!isNaN(possibleValue) && possibleValue > 0) value = String(possibleValue); }

                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 relative z-10"><h3 className="font-extrabold text-xl">{subForm.id ? 'Editar Assinatura' : 'Nova Assinatura'}</h3><div className="mt-4 md:mt-0 px-5 py-3 bg-rose-50 dark:bg-rose-900/20 rounded-2xl border border-rose-100 dark:border-rose-800/50"><p className="text-[10px] text-rose-500 font-bold uppercase tracking-widest mb-1">Custo Fixo Mensal</p><p className="font-black text-rose-600 dark:text-rose-400 text-xl">{formatMoney(totalSubscriptions)}</p></div></div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 items-end relative z-10">
                        <div className="lg:col-span-2"><label className={labelClass}>Serviço</label><input type="text" value={subForm.desc} onChange={e=>setSubForm({...subForm, desc: e.target.value})} className={`${inputClass} ${formErrors.sub.desc ? 'field-error' : ''}`} placeholder="Ex: Netflix" /></div>
                        <div><label className={labelClass}>Valor (R$)</label><input type="number" step="0.01" value={subForm.value} onChange={e=>setSubForm({...subForm, value: e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>Dia Venc.</label><input type="number" min="1" max="31" value={subForm.dayOfMonth} onChange={e=>setSubForm({...subForm, dayOfMonth: e.target.value})} className={`${inputClass} text-center`} /></div>
                        <div><label className={labelClass}>Repete a cada (meses)</label><input type="number" min="1" value={subForm.interval} onChange={e=>setSubForm({...subForm, interval: e.target.value})} className={`${inputClass} text-center`} title="1=Mensal, 2=Bimestral, 12=Anual" /></div>
                        <div><label className={labelClass}>Categoria</label><select value={subForm.category} onChange={e=>setSubForm({...subForm, category: e.target.value})} className={inputClass}>{predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                        {isCouple && (<div><label className={labelClass}>Visibilidade</label><select value={subForm.scope} onChange={e=>setSubForm({...subForm, scope: e.target.value})} className={inputClass}><option value="private">🔒 Pessoal</option><option value="shared">👥 Compartilhada</option></select></div>)}
                        {isCouple && subForm.scope === 'shared' && (<div><label className={labelClass}>Divisão (Rateio)</label><select value={subForm.splitRule} onChange={e=>setSubForm({...subForm, splitRule: e.target.value})} className={inputClass}><option value="proportional">⚖️ Proporcional</option><option value="50_50">➗ 50/50</option><option value="100_me">🙋‍♂️ Eu 100%</option><option value="100_partner">🙋‍♀️ Parc. 100%</option></select></div>)}
                        <div className="col-span-full flex justify-end gap-3 mt-4">{subForm.id && <button type="button" onClick={()=>{setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, interval: 1, scope: 'private', splitRule: 'proportional' }); setFormErrors(p => ({...p, sub: {}}));}} className="px-8 py-3 bg-slate-200 dark:bg-slate-700/50 rounded-xl font-bold">Cancelar</button>}<button type="submit" className="bg-brand-500 text-white font-bold py-3 px-10 rounded-xl">{subForm.id ? 'Atualizar' : 'Salvar'}</button></div>
                      </div>
                    </form>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {subscriptions.sort((a,b)=>{const td=new Date();const cm=`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}`;const aP=a.lastPaidMonth===cm;const bP=b.lastPaidMonth===cm;const aD=calcNextDue(Number(a.dayOfMonth),Number(a.interval||1),a.lastPaidMonth);const bD=calcNextDue(Number(b.dayOfMonth),Number(b.interval||1),b.lastPaidMonth);if(a.active!==b.active)return a.active?-1:1;if(aP!==bP)return aP?1:-1;if(aD.isLate!==bD.isLate)return aD.isLate?-1:1;if(aD.isLate)return bD.daysLate-aD.daysLate;return aD.diffDays-bD.diffDays;}).map((s) => {
                        const due = calcNextDue(Number(s.dayOfMonth), Number(s.interval||1), s.lastPaidMonth);
                        const td = new Date(); const cm = `${td.getFullYear()}-${String(td.getMonth() + 1).padStart(2, '0')}`;
                        const isPaid = s.lastPaidMonth === cm;
                        return (
                          <div key={s.id} className={`glass-card p-6 rounded-3xl transition-all ${s.active ? 'hover:-translate-y-1 hover:shadow-2xl' : 'opacity-50 grayscale border-slate-700'}`}>
                            <div className="flex justify-between items-start mb-4"><div><h4 className="font-extrabold text-lg">{s.desc}</h4><p className="text-[10px] text-slate-500 font-bold uppercase">{s.category}</p></div><div className="flex gap-1"><button onClick={()=>handleEditSub(s)} className="p-2 bg-slate-800 rounded-xl">✏️</button><button onClick={()=>handleDeleteSub(s.id)} className="p-2 bg-slate-800 rounded-xl">🗑️</button></div></div>
                            {s.active && isPaid && <div className="mb-4 px-3 py-2 rounded-xl text-xs font-bold bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300">✓ Paga recentemente</div>}
                            {s.active && !isPaid && <div className={`mb-4 px-3 py-2 rounded-xl text-xs font-bold ${due.isLate?'bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-300':'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300'}`}>{due.isLate ? `⚠️ Atrasado há ${due.daysLate} dias` : `📅 Vence em ${due.diffDays} dias`}</div>}
                            <div className="flex justify-between items-end mb-4"><div><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Valor</p><p className="font-black text-3xl">{formatMoney(s.value)}</p></div><div className="text-right"><p className="text-[10px] text-slate-400 font-bold uppercase mb-1">Próx. Venc.</p><p className="font-black text-xl text-brand-500">Dia {due.dueDate.getDate()}</p><p className="text-[9px] text-slate-500 uppercase">a cada {s.interval||1}m</p></div></div>
                            <div className="space-y-2">{s.active && !isPaid && <button onClick={()=>handleMarkSubAsPaid(s)} className={`w-full py-2.5 rounded-xl font-bold text-sm text-white ${due.isLate?'bg-rose-500':'bg-emerald-500'}`}>✓ Registrar Pagamento</button>}<button onClick={()=>handleToggleSub(s)} className={`w-full py-2.5 rounded-xl font-bold text-sm ${s.active?'bg-slate-800/80 text-slate-300':'bg-brand-500 text-white'}`}>{s.active?'Pausar':'Reativar'}</button></div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                
                {activeTab === 'installments' && (
                  <div className="space-y-6 animate-slide-up">
                    <form onSubmit={handleSaveInst} className="glass-card p-6 md:p-8 rounded-3xl relative overflow-hidden">
                      <h3 className="font-extrabold text-xl mb-6">{instForm.id ? 'Editar Dívida' : 'Nova Dívida/Parcelamento'}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 items-end">
                        <div className="lg:col-span-2"><label className={labelClass}>Compra</label><input type="text" value={instForm.desc} onChange={e=>setInstForm({...instForm, desc:e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>Categoria</label><select value={instForm.category} onChange={e=>setInstForm({...instForm, category:e.target.value})} className={inputClass}>{predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}</select></div>
                        <div><label className={labelClass}>Valor da Parcela</label><input type="number" step="0.01" value={instForm.installmentValue} onChange={e=>setInstForm({...instForm, installmentValue:e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>Total de Parcelas</label><input type="number" min="2" value={instForm.totalInstallments} onChange={e=>setInstForm({...instForm, totalInstallments:e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>Já Pagas</label><input type="number" min="0" value={instForm.paidInstallments} onChange={e=>setInstForm({...instForm, paidInstallments:e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>Dia Venc.</label><input type="number" min="1" max="31" value={instForm.dayOfMonth} onChange={e=>setInstForm({...instForm, dayOfMonth:e.target.value})} className={inputClass} /></div>
                        <div><label className={labelClass}>A cada (meses)</label><input type="number" min="1" value={instForm.interval} onChange={e=>setInstForm({...instForm, interval:e.target.value})} className={inputClass} title="1=Mensal, 2=Bimestral"/></div>
                        {isCouple && (<div><label className={labelClass}>Visibilidade</label><select value={instForm.scope} onChange={e=>setInstForm({...instForm, scope:e.target.value})} className={inputClass}><option value="private">🔒 Pessoal</option><option value="shared">👥 Compartilhada</option></select></div>)}
                        {isCouple && instForm.scope === 'shared' && (<div className="lg:col-span-2"><label className={labelClass}>Divisão (Rateio)</label><select value={instForm.splitRule} onChange={e=>setInstForm({...instForm, splitRule:e.target.value})} className={inputClass}><option value="proportional">⚖️ Proporcional</option><option value="50_50">➗ 50/50</option><option value="100_me">🙋‍♂️ Eu 100%</option><option value="100_partner">🙋‍♀️ Parc. 100%</option></select></div>)}
                        <div className="col-span-full flex justify-end gap-3 mt-4">{instForm.id && <button type="button" onClick={()=>{setInstForm({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, interval: 1, category: 'Dívidas', scope: 'private', splitRule: 'proportional' });}} className="px-8 py-3 bg-slate-700/50 rounded-xl font-bold">Cancelar</button>}<button type="submit" className="bg-brand-500 text-white font-bold py-3 px-10 rounded-xl shadow-lg">{instForm.id ? 'Atualizar' : 'Salvar'}</button></div>
                      </div>
                    </form>
                    
                    <div className="space-y-8">
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {installments.filter(i=>(parseInt(i.paidInstallments)||0)<parseInt(i.totalInstallments)).sort((a,b)=>{const td=new Date();const cm=`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}`;const aP=a.lastPaidMonth===cm;const bP=b.lastPaidMonth===cm;const aD=calcNextDue(Number(a.dayOfMonth),Number(a.interval||1),a.lastPaidMonth);const bD=calcNextDue(Number(b.dayOfMonth),Number(b.interval||1),b.lastPaidMonth);if(a.active!==b.active)return a.active?-1:1;if(aP!==bP)return aP?1:-1;if(aD.isLate!==bD.isLate)return aD.isLate?-1:1;if(aD.isLate)return bD.daysLate-aD.daysLate;return aD.diffDays-bD.diffDays;}).map((i) => {
                          const cur = parseInt(i.paidInstallments) || 0; const tot = parseInt(i.totalInstallments); const pct = tot > 0 ? (cur / tot) * 100 : 0; const due = calcNextDue(Number(i.dayOfMonth), Number(i.interval||1), i.lastPaidMonth); const td = new Date(); const cm = `${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}`; const isPaid = i.lastPaidMonth === cm;
                          return (
                            <div key={i.id} className={`glass-card p-6 rounded-3xl transition-all ${i.active ? 'hover:-translate-y-1 hover:shadow-2xl' : 'opacity-70'}`}>
                              <div className="flex justify-between items-start mb-4"><h4 className="font-extrabold text-lg flex items-center gap-2">{i.desc}</h4><div className="flex gap-1"><button onClick={()=>handleEditInst(i)} className="p-2 bg-slate-800 rounded-xl">✏️</button><button onClick={()=>handleDeleteInst(i.id)} className="p-2 bg-slate-800 rounded-xl">🗑️</button></div></div>
                              {i.active && isPaid && <div className="mb-4 px-3 py-2 rounded-xl text-xs font-bold bg-emerald-900/20 text-emerald-300">✓ Paga recentemente</div>}
                              {i.active && !isPaid && <div className={`mb-4 px-3 py-2 rounded-xl text-xs font-bold ${due.isLate?'bg-rose-900/20 text-rose-300':'bg-amber-900/20 text-amber-300'}`}>{due.isLate ? `⚠️ Atrasada há ${due.daysLate} dias` : `📅 Vence em ${due.diffDays} dias (Dia ${due.dueDate.getDate()})`}</div>}
                              <div className="mb-4"><div className="flex justify-between text-[10px] font-bold text-slate-500 mb-2"><span>{cur}/{tot}</span><span>{pct.toFixed(0)}%</span></div><div className="w-full h-2.5 bg-slate-800/80 rounded-full"><div className={`h-full rounded-full ${i.active?'bg-brand-500':'bg-slate-400'}`} style={{width: `${pct}%`}}></div></div></div>
                              <div className="grid grid-cols-3 gap-2 mb-4 text-center"><div className="p-2 rounded-lg bg-slate-800/50"><p className="text-[9px] text-slate-500 font-bold">Faltam</p><p className="font-black text-lg">{tot-cur}</p></div><div className="p-2 rounded-lg bg-slate-800/50"><p className="text-[9px] text-slate-500 font-bold">Parcela</p><p className="font-black text-sm">{formatMoney(i.installmentValue)}</p></div><div className="p-2 rounded-lg bg-slate-800/50"><p className="text-[9px] text-slate-500 font-bold">Ciclo</p><p className="font-black text-sm">{i.interval||1}m</p></div></div>
                              {i.active && !isPaid && <button onClick={()=>handleMarkInstAsPaid(i)} className={`w-full py-2.5 rounded-xl font-bold text-sm text-white ${due.isLate?'bg-rose-500':'bg-emerald-500'}`}>✓ Pagar Parcela</button>}
                            </div>
                          );
                        })}
                      </div>
                      
                      {installments.filter(i=>(parseInt(i.paidInstallments)||0)>=parseInt(i.totalInstallments)).length > 0 && (
                        <details className="group glass-card rounded-3xl overflow-hidden [&_summary::-webkit-details-marker]:hidden"><summary className="p-6 font-extrabold text-lg flex justify-between items-center cursor-pointer"><div className="flex items-center gap-3"><span className="p-2 bg-emerald-900/30 text-emerald-400 rounded-xl">🎉</span>Histórico de Quitadas</div></summary>
                          <div className="p-6 pt-0 border-t border-slate-700/50"><div className="grid grid-cols-1 md:grid-cols-3 gap-6 mt-6">
                            {installments.filter(i=>(parseInt(i.paidInstallments)||0)>=parseInt(i.totalInstallments)).map(i=><div key={i.id} className="glass-card p-6 rounded-3xl opacity-75 border-2 border-emerald-700"><div className="flex justify-between items-start mb-4"><h4 className="font-extrabold text-lg">{i.desc}</h4><button onClick={()=>handleDeleteInst(i.id)} className="p-2 bg-slate-800 rounded-xl">🗑️</button></div><div className="mb-4"><div className="flex justify-between text-[10px] font-bold text-emerald-400 mb-2"><span>{i.totalInstallments}/{i.totalInstallments}</span><span>100%</span></div><div className="w-full h-2.5 bg-slate-800/80 rounded-full"><div className="h-full bg-emerald-500" style={{width:'100%'}}></div></div></div></div>)}
                          </div></div>
                        </details>
                      )}
                    </div>
                  </div>
                )}
                
                {activeTab === 'goals' && (
                  <div className="space-y-6 animate-slide-up">
                    <form onSubmit={handleSaveGoal} className="glass-card p-6 md:p-8 rounded-3xl relative overflow-hidden">
                      <h3 className="font-extrabold text-xl mb-6 relative z-10">{goalForm.id ? 'Editar Meta' : 'Nova Meta Financeira'}</h3>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5 items-end relative z-10">
                        <div><label className={labelClass}>Objetivo</label><input type="text" value={goalForm.name} onChange={e=>setGoalForm({...goalForm, name: e.target.value})} className={inputClass} required/></div>
                        <div><label className={labelClass}>Valor Alvo (R$)</label><input type="number" step="0.01" value={goalForm.target} onChange={e=>setGoalForm({...goalForm, target: e.target.value})} className={inputClass} required/></div>
                        <div className="col-span-full flex justify-end gap-3 mt-4"><button type="submit" className="bg-brand-500 text-white font-bold py-3 px-10 rounded-xl shadow-lg">{goalForm.id ? 'Atualizar Meta' : 'Criar Meta'}</button></div>
                      </div>
                    </form>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {goals.map((g) => {
                        const cur = contributionsMap[g.id] || 0; const tgt = parseFloat(g.target) || 0; const pct = tgt > 0 ? Math.min(100, (cur / tgt) * 100) : 0; const isComplete = cur >= tgt;
                        return (
                          <div key={g.id} className={`glass-card p-6 rounded-3xl transition-all ${isComplete?'border-2 border-emerald-700':''}`}>
                            <div className="flex justify-between items-start mb-3"><h3 className="font-extrabold text-lg">{g.name}</h3><div className="flex gap-1"><button onClick={()=>handleEditGoal(g)} className="p-2 bg-slate-800 rounded-lg">✏️</button><button onClick={()=>handleDeleteGoal(g.id)} className="p-2 bg-slate-800 rounded-lg">🗑️</button></div></div>
                            <p className="text-xs text-slate-500 font-medium mb-4"><span className="font-black text-slate-200 text-2xl mr-1">{formatMoney(cur)}</span>de {formatMoney(tgt)}</p>
                            <div className="w-full h-3 bg-slate-800/80 rounded-full mb-2"><div className="h-full bg-brand-500 rounded-full" style={{ width: `${pct}%` }}></div></div>
                            <div className="flex gap-2 mt-4"><button onClick={()=>setSelectedGoalForContributions(g)} className="flex-1 py-2.5 rounded-xl font-bold text-xs bg-slate-800 text-slate-300">📊 Histórico</button><button onClick={()=>setSelectedGoalForContributions(g)} className="flex-1 py-2.5 rounded-xl font-bold text-xs bg-brand-500 text-white">+ Aporte</button></div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                
                {activeTab === 'budgets' && (
                  <div className="space-y-6 animate-slide-up">
                    <form onSubmit={handleSetBudget} className="glass-card p-6 md:p-8 rounded-3xl"><h3 className="font-extrabold text-xl mb-6">Orçamentos Mensais</h3><div className="grid grid-cols-1 md:grid-cols-3 gap-5 items-end"><div><label className={labelClass}>Categoria Alvo</label><select value={budgetForm.category} onChange={e=>setBudgetForm({...budgetForm, category: e.target.value})} className={inputClass}>{predefinedCategories.map(c=><option key={c} value={c}>{c}</option>)}</select></div><div><label className={labelClass}>Teto de Gasto</label><input type="number" step="0.01" value={budgetForm.limit} onChange={e=>setBudgetForm({...budgetForm, limit: e.target.value})} className={inputClass} required/></div><button type="submit" className="bg-brand-500 text-white font-bold py-3 rounded-xl">Travar Orçamento</button></div></form>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {Object.entries(budgets).map(([cat, lim]) => {
                        const spent = categoriesTotal[cat]?.val || 0; const isOver = spent > lim;
                        return (<div key={cat} className="glass-card p-6 rounded-3xl">
                          <div className="flex justify-between items-start mb-3"><h3 className="font-extrabold text-lg">{cat}</h3><button onClick={()=>handleDeleteBudget(cat)} className="p-2.5 bg-slate-800 rounded-xl">🗑️</button></div>
                          <p className="text-sm font-medium mb-4 text-slate-300">Consumido: <span className={`font-black text-xl ${isOver?'text-rose-500':''}`}>{formatMoney(spent)}</span> de {formatMoney(lim)}</p>
                          <div className="w-full h-3 bg-slate-800/80 rounded-full"><div className={`h-full rounded-full ${isOver?'bg-rose-500':'bg-brand-500'}`} style={{width:`${Math.min(100,(spent/lim)*100)}%`}}></div></div>
                        </div>);
                      })}
                    </div>
                  </div>
                )}

                {activeTab === 'sync' && (
                  <div className="space-y-6 animate-slide-up max-w-4xl mx-auto">
                    <BentoCard title="Aparência" icon="🎨"><div className="p-5 rounded-2xl bg-slate-800/30 border flex justify-between items-center"><div><h4 className="font-bold text-white text-sm">Tema Visual</h4></div><div className="flex bg-slate-900 p-1 rounded-xl"><button onClick={()=>setTheme('light')} className={`px-4 py-2 rounded-lg font-bold text-xs ${theme==='light'?'bg-white text-slate-900':'text-slate-500'}`}>☀️ Claro</button><button onClick={()=>setTheme('dark')} className={`px-4 py-2 rounded-lg font-bold text-xs ${theme==='dark'?'bg-slate-800 text-white':'text-slate-500'}`}>🌙 Escuro</button></div></div></BentoCard>
                    {isCouple && (<BentoCard title="Configurações Casal" icon="⚙️"><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="p-6 bg-brand-900/20 rounded-3xl border"><label className={labelClass}>Nome</label><input type="text" value={settings.nameA} onChange={e=>setSettings({...settings,nameA:e.target.value})} className={`${inputClass} mb-4`}/><label className={labelClass}>Salário (R$)</label><input type="number" value={settings.salaryA} onChange={e=>setSettings({...settings,salaryA:e.target.value})} className={inputClass}/></div><div className="p-6 bg-partner-900/20 rounded-3xl border"><label className={labelClass}>Nome</label><input type="text" value={settings.nameB} onChange={e=>setSettings({...settings,nameB:e.target.value})} className={`${inputClass} mb-4`}/><label className={labelClass}>Salário (R$)</label><input type="number" value={settings.salaryB} onChange={e=>setSettings({...settings,salaryB:e.target.value})} className={inputClass}/></div></div><div className="mt-6 flex justify-end"><button onClick={handleUpdateCoupleSettings} className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl">Salvar</button></div></BentoCard>)}
                  </div>
                )}
              </div>
            </div>
          </main>
          
          <div className="fixed bottom-24 md:bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none">
            {toasts.map(t => (<div key={t.id} className={`px-6 py-4 rounded-2xl shadow-2xl font-bold text-sm bg-slate-800/90 border-l-4 ${t.isError?'border-rose-500 text-rose-400':'border-brand-500 text-brand-400'}`}><div>{t.msg}</div>{t.details && <div className="text-xs opacity-75">{t.details}</div>}</div>))}
          </div>
          {selectedGoalForContributions && <GoalContributionsModal goal={selectedGoalForContributions} onClose={()=>setSelectedGoalForContributions(null)} onContributionsChange={async()=>{const n=await DataService.getCollection('goals',user.uid,userData?.coupleId);setGoals(n);await loadAllContributions(n);}}/>}
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    ReactDOM.createRoot(rootElement).render(<AuthProvider><App /></AuthProvider>);
  </script>
</body>
</html>
