<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Finanças DMX – Enterprise</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
          colors: {
            brand: { 50: '#f0fdfa', 100: '#ccfbf1', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 900: '#134e4a', 950: '#042f2e' },
            partner: { 50: '#f5f3ff', 100: '#ede9fe', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 900: '#4c1d95' }
          },
          animation: {
            'blob': 'blob 20s infinite',
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            blob: {
              '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(40px, -60px) scale(1.15)' },
              '66%': { transform: 'translate(-30px, 30px) scale(0.9)' },
            },
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
          }
        },
      },
    }
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAlH98iLdFcizTtV6OpA0k64kyA5Ap-tbE",
      authDomain: "financas-dmx.firebaseapp.com",
      projectId: "financas-dmx",
      storageBucket: "financas-dmx.firebasestorage.app",
      messagingSenderId: "521024102499",
      appId: "1:521024102499:web:22261ba97d5dddc1eb9856"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: rgba(148, 163, 184, 0.5); }
    .glass-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.6); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); }
    .dark .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
    .field-error { border-color: #f43f5e !important; background-color: rgba(244, 63, 94, 0.05) !important; }
    .error-message { color: #f43f5e; font-size: 0.75rem; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .donut-segment { transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1), stroke-width 0.3s; }
    .donut-segment:hover { stroke-width: 14; filter: drop-shadow(0 0 6px currentColor); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-[#050914] dark:text-slate-100 min-h-screen transition-colors duration-500">
  
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-400/20 dark:bg-brand-500/10 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-partner-400/20 dark:bg-partner-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 5s"></div>
    <div class="absolute top-[40%] left-[40%] w-[30%] h-[30%] bg-blue-400/10 dark:bg-blue-500/5 rounded-full blur-[100px] animate-blob" style="animation-delay: 10s"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useContext, createContext, memo } = React;

    // ==================== UTILITÁRIOS ====================
    const getLocalDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    const generateId = () => {
      if (window.crypto?.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };

    const generateInviteCode = () => {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    };

    const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

    // ==================== DATA SERVICE ====================
    const DataService = {
      signUp: async (email, password, name) => {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        await db.collection('users').doc(user.uid).set({
          email, name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          mode: null, coupleId: null, partnerId: null,
          settings: { salary: 0, currency: 'BRL', nameInCouple: 'Pessoa A' }
        });
        return user;
      },
      
      signIn: async (email, password) => {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        return userCredential.user;
      },
      
      signOut: async () => await auth.signOut(),
      sendPasswordReset: async (email) => await auth.sendPasswordResetEmail(email),
      
      getUserData: async (userId) => {
        const doc = await db.collection('users').doc(userId).get();
        return doc.exists ? { id: doc.id, ...doc.data() } : null;
      },
      
      updateUser: async (userId, updates) => {
        await db.collection('users').doc(userId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      getCoupleData: async (coupleId) => {
        if (!coupleId) return null;
        const doc = await db.collection('couples').doc(coupleId).get();
        return doc.exists ? { id: doc.id, ...doc.data() } : null;
      },
      
      updateCouple: async (coupleId, updates) => {
        await db.collection('couples').doc(coupleId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      // CORRIGIDO: Regenera código de convite para casal existente
      regenerateInviteCode: async (coupleId) => {
        const newCode = generateInviteCode();
        await db.collection('couples').doc(coupleId).update({
          inviteCode: newCode,
          inviteCodeGeneratedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return newCode;
      },
      
      createCouple: async (currentUser, partnerEmail, nameInCouple) => {
        const partnerQuery = await db.collection('users').where('email', '==', partnerEmail).limit(1).get();
        
        if (partnerQuery.empty) {
          throw new Error('Este email não está cadastrado. Peça para seu parceiro criar uma conta primeiro.');
        }
        
        const partnerDoc = partnerQuery.docs[0];
        const partnerData = partnerDoc.data();
        const partnerId = partnerDoc.id;
        
        if (partnerData.mode === 'couple') {
          throw new Error('Este usuário já está em um casal.');
        }
        
        const inviteCode = generateInviteCode();
        const coupleRef = await db.collection('couples').add({
          userA: currentUser.uid,
          userB: partnerId,
          inviteCode,
          inviteEmail: partnerEmail,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          acceptedAt: null,
          settings: {
            nameA: nameInCouple,
            nameB: partnerData.name || 'Pessoa B',
            salaryA: 0, salaryB: 0,
          }
        });
        
        await db.collection('users').doc(currentUser.uid).update({
          mode: 'couple',
          coupleId: coupleRef.id,
          partnerId: partnerId,
          'settings.nameInCouple': nameInCouple,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        return { coupleId: coupleRef.id, partnerId, inviteCode };
      },
      
      acceptInviteByCode: async (currentUser, inviteCode) => {
        const allCouples = await db.collection('couples').get();
        
        const coupleDoc = allCouples.docs.find(doc => {
          const data = doc.data();
          return data.inviteCode === inviteCode.toUpperCase() && !data.acceptedAt;
        });
        
        if (!coupleDoc) {
          throw new Error('Código inválido, expirado ou já utilizado.');
        }
        
        const coupleData = coupleDoc.data();
        
        if (coupleData.userB !== currentUser.uid) {
          throw new Error('Este código não foi enviado para sua conta.');
        }
        
        await db.collection('couples').doc(coupleDoc.id).update({
          acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await db.collection('users').doc(currentUser.uid).update({
          mode: 'couple',
          coupleId: coupleDoc.id,
          partnerId: coupleData.userA,
          'settings.nameInCouple': 'Pessoa B',
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        return { coupleId: coupleDoc.id, partnerId: coupleData.userA };
      },
      
      dissolveCouple: async (userId, coupleId) => {
        const coupleData = await DataService.getCoupleData(coupleId);
        if (!coupleData) return;
        
        await db.collection('users').doc(coupleData.userA).update({
          mode: 'solo', coupleId: null, partnerId: null,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('users').doc(coupleData.userB).update({
          mode: 'solo', coupleId: null, partnerId: null,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        const sharedTxs = await db.collection('transactions').where('coupleId', '==', coupleId).get();
        for (const doc of sharedTxs.docs) {
          await doc.ref.update({ scope: 'private', coupleId: null });
        }
        
        await db.collection('couples').doc(coupleId).delete();
      },
      
      // ==================== BUSCA DE DADOS ====================
      getAllTransactions: async (userId, coupleId) => {
        const txs = [];
        const personalSnap = await db.collection('transactions').where('ownerId', '==', userId).get();
        personalSnap.docs.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
        
        if (coupleId) {
          const sharedSnap = await db.collection('transactions').where('coupleId', '==', coupleId).get();
          sharedSnap.docs.forEach(doc => {
            const data = doc.data();
            if (data.ownerId !== userId) txs.push({ id: doc.id, ...data });
          });
        }
        
        return txs.sort((a, b) => new Date(b.date) - new Date(a.date));
      },
      
      // CORRIGIDO: addTransaction agora retorna o ID gerado
      addTransaction: async (txData) => {
        const docRef = await db.collection('transactions').add({
          ...txData,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return docRef.id;
      },
      
      updateTransaction: async (txId, updates) => {
        if (!txId) throw new Error('ID da transação inválido');
        await db.collection('transactions').doc(txId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      // CORRIGIDO: Validação de ID antes de deletar
      deleteTransaction: async (txId) => {
        if (!txId) throw new Error('ID da transação inválido');
        await db.collection('transactions').doc(txId).delete();
      },
      
      getCollection: async (collectionName, userId, coupleId) => {
        const items = [];
        const personalSnap = await db.collection(collectionName).where('ownerId', '==', userId).get();
        personalSnap.docs.forEach(doc => items.push({ id: doc.id, ...doc.data() }));
        
        if (coupleId) {
          const sharedSnap = await db.collection(collectionName).where('coupleId', '==', coupleId).get();
          sharedSnap.docs.forEach(doc => {
            const data = doc.data();
            if (data.ownerId !== userId) items.push({ id: doc.id, ...data });
          });
        }
        
        return items;
      },
      
      // CORRIGIDO: add methods retornam o ID gerado
      addGoal: async (data) => {
        const docRef = await db.collection('goals').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateGoal: async (id, data) => {
        if (!id) throw new Error('ID da meta inválido');
        await db.collection('goals').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteGoal: async (id) => {
        if (!id) throw new Error('ID da meta inválido');
        await db.collection('goals').doc(id).delete();
      },
      
      addSubscription: async (data) => {
        const docRef = await db.collection('subscriptions').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateSubscription: async (id, data) => {
        if (!id) throw new Error('ID da assinatura inválido');
        await db.collection('subscriptions').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteSubscription: async (id) => {
        if (!id) throw new Error('ID da assinatura inválido');
        await db.collection('subscriptions').doc(id).delete();
      },
      
      addInstallment: async (data) => {
        const docRef = await db.collection('installments').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateInstallment: async (id, data) => {
        if (!id) throw new Error('ID do parcelamento inválido');
        await db.collection('installments').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteInstallment: async (id) => {
        if (!id) throw new Error('ID do parcelamento inválido');
        await db.collection('installments').doc(id).delete();
      },
      
      getBudgets: async (ownerId) => {
        const snap = await db.collection('budgets').where('ownerId', '==', ownerId).get();
        const budgets = {};
        snap.docs.forEach(doc => {
          const data = doc.data();
          budgets[data.category] = data.limit;
        });
        return budgets;
      },
      
      setBudget: async (ownerId, category, limit) => {
        const budgetRef = db.collection('budgets').doc(`${ownerId}_${category}`);
        await budgetRef.set({
          ownerId, category, limit,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      deleteBudget: async (ownerId, category) => {
        await db.collection('budgets').doc(`${ownerId}_${category}`).delete();
      },
    };

    // ==================== AUTH CONTEXT ====================
    const AuthContext = createContext();

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [coupleData, setCoupleData] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const loadUserData = async (firebaseUser) => {
        const data = await DataService.getUserData(firebaseUser.uid);
        setUserData(data);
        if (data?.coupleId) {
          const couple = await DataService.getCoupleData(data.coupleId);
          setCoupleData(couple);
        } else {
          setCoupleData(null);
        }
      };
      
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
          if (firebaseUser) {
            setUser(firebaseUser);
            await loadUserData(firebaseUser);
          } else {
            setUser(null);
            setUserData(null);
            setCoupleData(null);
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);
      
      const refreshUserData = async () => {
        if (user) await loadUserData(user);
      };
      
      return <AuthContext.Provider value={{ user, userData, coupleData, loading, signIn: DataService.signIn, signUp: DataService.signUp, signOut: DataService.signOut, sendPasswordReset: DataService.sendPasswordReset, refreshUserData }}>{children}</AuthContext.Provider>;
    }

    function useAuth() { return useContext(AuthContext); }

    // ==================== COMPONENTES ====================
    const BentoCard = ({ children, className = "", title, icon, action }) => (
      <div className={`glass-card p-6 rounded-3xl transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 ${className}`}>
        {(title || action) && (
          <div className="flex justify-between items-start mb-5">
            {title && <h3 className="font-bold text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">{icon} {title}</h3>}
            {action}
          </div>
        )}
        {children}
      </div>
    );

    const DonutChart = memo(({ categoriesTotal }) => {
      if (Object.keys(categoriesTotal).length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Sem dados para exibir</div>;
      const sorted = Object.entries(categoriesTotal).sort((a,b) => b[1].val - a[1].val);
      const total = sorted.reduce((acc, curr) => acc + curr[1].val, 0);
      const colors = ['#14b8a6', '#8b5cf6', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981', '#64748b'];
      
      return (
        <div className="flex flex-col md:flex-row items-center gap-8">
          <div className="relative w-40 h-40 flex-shrink-0">
            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90 drop-shadow-xl">
              <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" className="stroke-slate-200 dark:stroke-slate-800" />
              {sorted.map(([cat, data], i) => {
                const pct = (data.val / total) * 100;
                const offset = sorted.slice(0, i).reduce((acc, curr) => acc + (curr[1].val / total) * 100, 0);
                return <circle key={cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" stroke={colors[i % colors.length]} strokeDasharray={`${(pct / 100) * 251.2} 251.2`} strokeDashoffset={-(offset / 100) * 251.2} className="donut-segment" strokeLinecap="round" />;
              })}
            </svg>
            <div className="absolute inset-0 flex items-center justify-center flex-col">
              <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total</span>
              <span className="text-sm font-black text-slate-800 dark:text-white">{formatMoney(total)}</span>
            </div>
          </div>
          <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
            {sorted.map(([cat, data], i) => (
              <div key={cat} className="flex justify-between items-center text-sm gap-3 group">
                <div className="flex items-center gap-3 flex-1 min-w-0">
                  <span className="w-3 h-3 rounded-full flex-shrink-0 shadow-sm" style={{backgroundColor: colors[i % colors.length]}}></span>
                  <span className="font-semibold text-slate-700 dark:text-slate-200 truncate">{cat}</span>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="font-bold text-slate-900 dark:text-white">{formatMoney(data.val)}</div>
                  <div className="text-[10px] text-slate-500">{((data.val / total) * 100).toFixed(1)}% &bull; {data.count}x</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const monthlyData = {};
      transactions.forEach(t => {
        let month = t.date?.slice(0, 7);
        if (!month) return;
        if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
        t.type === 'income' ? monthlyData[month].inc += t.value : monthlyData[month].exp += t.value;
      });
      const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
      if(sortedMonths.length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Histórico insuficiente</div>;
      
      let maxVal = 1;
      const items = sortedMonths.map(m => {
        const salaryTotal = (parseFloat(settings.salaryA || 0)) + (parseFloat(settings.salaryB || 0));
        const i = (monthlyData[m].inc || 0) + salaryTotal;
        const e = monthlyData[m].exp || 0;
        if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
        return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
      });
      
      return (
        <div className="h-56 flex items-end justify-between gap-3 mt-4 px-2">
          {items.map(item => (
            <div key={item.month} className="flex flex-col items-center flex-1 group cursor-pointer">
              <div className="flex items-end justify-center w-full h-44 gap-1 relative">
                <div className="w-2/5 max-w-[24px] bg-gradient-to-t from-brand-600 to-brand-400 rounded-t-md opacity-80 transition-all duration-500 group-hover:opacity-100 group-hover:scale-105" style={{ height: `${(item.inc / maxVal) * 100}%` }}></div>
                <div className="w-2/5 max-w-[24px] bg-gradient-to-t from-rose-600 to-rose-400 rounded-t-md opacity-80 transition-all duration-500 group-hover:opacity-100 group-hover:scale-105" style={{ height: `${(item.exp / maxVal) * 100}%` }}></div>
              </div>
              <span className="text-[11px] text-slate-500 mt-3 font-bold tracking-wide">{item.month}</span>
            </div>
          ))}
        </div>
      );
    });

    // ==================== TELA DE AUTENTICAÇÃO ====================
    function AuthScreen() {
      const { signIn, signUp, sendPasswordReset } = useAuth();
      const [mode, setMode] = useState('login');
      const [form, setForm] = useState({ email: '', password: '', name: '' });
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(false);
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setError(''); setSuccess(''); setLoading(true);
        try {
          if (mode === 'signup') {
            if (!form.name.trim()) throw new Error('Nome é obrigatório');
            if (form.password.length < 6) throw new Error('Senha deve ter no mínimo 6 caracteres');
            await signUp(form.email, form.password, form.name);
            setSuccess('Conta criada! Bem-vindo.');
          } else if (mode === 'login') {
            await signIn(form.email, form.password);
          } else if (mode === 'reset') {
            if (!form.email) throw new Error('Digite seu email');
            await sendPasswordReset(form.email);
            setSuccess('Email de recuperação enviado!');
            setTimeout(() => setMode('login'), 3000);
          }
        } catch (err) {
          let msg = err.message;
          if (msg.includes('email-already-in-use')) msg = 'Este email já está cadastrado.';
          else if (msg.includes('invalid-email')) msg = 'Email inválido.';
          else if (msg.includes('user-not-found') || msg.includes('wrong-password') || msg.includes('invalid-credential')) msg = 'Email ou senha incorretos.';
          else if (msg.includes('weak-password')) msg = 'Senha muito fraca.';
          else if (msg.includes('too-many-requests')) msg = 'Muitas tentativas. Aguarde.';
          setError(msg);
        } finally { setLoading(false); }
      };
      
      return (

                  <h2 className="font-extrabold text-2xl mb-2">Casal criado!</h2>
                  <p className="text-slate-500">Envie este código ao seu parceiro(a):</p>
                </div>
                
                <div className="bg-gradient-to-br from-partner-50 to-brand-50 dark:from-partner-900/20 dark:to-brand-900/20 p-6 rounded-2xl border border-partner-200 dark:border-partner-800/50 mb-6 text-center">
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Código de Convite</p>
                  <div className="font-mono font-black text-4xl tracking-[0.3em] text-partner-600 dark:text-partner-400 mb-4">{generatedCode}</div>
                  <button onClick={() => navigator.clipboard?.writeText(generatedCode)} className="text-sm bg-white dark:bg-slate-800 font-bold py-2 px-6 rounded-xl shadow-md">📋 Copiar</button>
                </div>
                
                <button onClick={() => { onClose(); onSuccess(); }} className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl shadow-lg">
                  Concluir
                </button>
              </>
            )}
          </div>
        </div>
      );
    }

    // ==================== DASHBOARD APP ====================
    function DashboardApp() {
      const { user, userData, coupleData, signOut, refreshUserData } = useAuth();
      const [activeTab, setActiveTab] = useState('dashboard');
      const [monthFilter, setMonthFilter] = useState(() => { 
        const d = new Date(); 
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; 
      });
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [toasts, setToasts] = useState([]);
      const [showAI, setShowAI] = useState(false);
      
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [partnerData, setPartnerData] = useState(null);
      const [loadingData, setLoadingData] = useState(true);
      
      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'private', paidBy: user?.uid });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '', current: '0' });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '' });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, scope: 'private' });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', scope: 'private' });
      const [formErrors, setFormErrors] = useState({ tx: {}, goal: {}, budget: {}, sub: {}, inst: {} });
      
      const [settings, setSettings] = useState({ 
        salaryA: 0, salaryB: 0, 
        nameA: userData?.settings?.nameInCouple || 'Pessoa A', 
        nameB: 'Pessoa B',
      });
      
      const [showMigrateModal, setShowMigrateModal] = useState(false);
      
      // NOVO: Estado para modal de geração de novo código
      const [showInviteCodeModal, setShowInviteCodeModal] = useState(false);
      const [regeneratedCode, setRegeneratedCode] = useState('');
      
      const isCouple = userData?.mode === 'couple';
      
      const showToast = useCallback((msg, isError = false, details = null) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError, details }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 6000);
      }, []);
      
      useEffect(() => {
        localStorage.setItem('theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [theme]);
      
      useEffect(() => {
        const loadData = async () => {
          setLoadingData(true);
          try {
            const ownerId = isCouple && userData.coupleId ? userData.coupleId : user.uid;
            
            const [txs, gls, subs, insts, bdg] = await Promise.all([
              DataService.getAllTransactions(user.uid, userData?.coupleId),
              DataService.getCollection('goals', user.uid, userData?.coupleId),
              DataService.getCollection('subscriptions', user.uid, userData?.coupleId),
              DataService.getCollection('installments', user.uid, userData?.coupleId),
              DataService.getBudgets(ownerId)
            ]);
            
            setTransactions(txs);
            setGoals(gls);
            setSubscriptions(subs);
            setInstallments(insts);
            setBudgets(bdg);
            
            // Buscar dados do parceiro se em casal
            if (isCouple && userData?.partnerId) {
              const partner = await DataService.getUserData(userData.partnerId);
              setPartnerData(partner);
            }
            
            if (isCouple && coupleData?.settings) {
              setSettings({
                salaryA: coupleData.settings.salaryA || 0,
                salaryB: coupleData.settings.salaryB || 0,
                nameA: coupleData.settings.nameA || 'Pessoa A',
                nameB: coupleData.settings.nameB || 'Pessoa B',
              });
            }
          } catch (err) {
            console.error('Erro ao carregar dados:', err);
            showToast('Erro ao carregar dados', true, err.message);
          } finally {
            setLoadingData(false);
          }
        };
        
        if (user && userData?.mode) loadData();
      }, [user, userData, coupleData, isCouple]);
      
      const filteredTransactions = useMemo(() => 
        transactions.filter(t => t.date?.startsWith(monthFilter)), 
        [transactions, monthFilter]
      );
      
      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => {
          if (t.type === 'income') inc += t.value;
          else exp += t.value;
        });
        const salaryTotal = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + salaryTotal, exp, balance: (inc + salaryTotal) - exp };
      }, [filteredTransactions, settings]);
      
      const categoriesTotal = useMemo(() => {
        const expenses = {};
        filteredTransactions.forEach(t => {
          if (t.type === 'expense') {
            if (!expenses[t.category]) expenses[t.category] = { val: 0, count: 0 };
            expenses[t.category].val += t.value;
            expenses[t.category].count += 1;
          }
        });
        return expenses;
      }, [filteredTransactions]);
      
      const totalSubscriptions = useMemo(() => 
        subscriptions.filter(s => s.active).reduce((acc, curr) => acc + parseFloat(curr.value), 0), 
        [subscriptions]
      );
      
      // NOVO: Assinaturas por escopo (pessoal vs compartilhada)
      const subscriptionsByScope = useMemo(() => {
        const mine = subscriptions.filter(s => s.ownerId === user.uid && s.active);
        const partner = subscriptions.filter(s => s.ownerId !== user.uid && s.active);
        const personal = subscriptions.filter(s => s.scope !== 'shared' && s.active);
        const shared = subscriptions.filter(s => s.scope === 'shared' && s.active);
        
        return {
          mine, partner, personal, shared,
          mineTotal: mine.reduce((acc, curr) => acc + parseFloat(curr.value), 0),
          partnerTotal: partner.reduce((acc, curr) => acc + parseFloat(curr.value), 0),
          personalTotal: personal.reduce((acc, curr) => acc + parseFloat(curr.value), 0),
          sharedTotal: shared.reduce((acc, curr) => acc + parseFloat(curr.value), 0),
        };
      }, [subscriptions, user.uid]);
      
      const splitLogic = useMemo(() => {
        if (!isCouple) return null;
        const salA = parseFloat(settings.salaryA) || 0;
        const salB = parseFloat(settings.salaryB) || 0;
        const totalSal = salA + salB;
        const ratioA = totalSal > 0 ? salA / totalSal : 0.5;
        const ratioB = totalSal > 0 ? salB / totalSal : 0.5;
        
        const sharedExpenses = filteredTransactions.filter(t => t.scope === 'shared' && t.type === 'expense');
        const totalSharedExp = sharedExpenses.reduce((acc, t) => acc + t.value, 0);
        
        const paidByA = sharedExpenses.filter(t => t.paidBy === user.uid).reduce((acc, t) => acc + t.value, 0);
        const paidByB = sharedExpenses.filter(t => t.paidBy === userData.partnerId).reduce((acc, t) => acc + t.value, 0);
        
        return {
          totalSharedExp, ratioA, ratioB,
          paidByA, paidByB,
          balanceA: paidByA - (totalSharedExp * ratioA),
          balanceB: paidByB - (totalSharedExp * ratioB)
        };
      }, [filteredTransactions, settings, isCouple, user.uid, userData?.partnerId]);
      
      // CORRIGIDO: Handlers garantem ID consistente
      const handleSaveTx = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!txForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(txForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, tx: errors})); return; }
        
        const payload = {
          ...txForm,
          ownerId: user.uid,
          coupleId: txForm.scope === 'shared' ? userData.coupleId : null,
          category: txForm.customCategory.trim() || txForm.category,
          value: val,
          paidBy: user.uid,
        };
        
        try {
          if (txForm.id) {
            await DataService.updateTransaction(txForm.id, payload);
          } else {
            await DataService.addTransaction(payload);
          }
          
          const newTxs = await DataService.getAllTransactions(user.uid, userData.coupleId);
          setTransactions(newTxs);
          
          setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'private', paidBy: user.uid });
          setFormErrors(prev => ({...prev, tx: {}}));
          showToast("Transação salva.");
        } catch (err) {
          console.error('Erro ao salvar:', err);
          showToast('Erro ao salvar transação', true, err.message);
        }
      };
      
      const handleDeleteTx = async (id) => {
        if (!id) {
          showToast('Erro: ID inválido', true);
          return;
        }
        if (!window.confirm("Apagar esta transação?")) return;
        try {
          await DataService.deleteTransaction(id);
          setTransactions(prev => prev.filter(t => t.id !== id));
          showToast("Transação excluída.");
        } catch (err) { showToast('Erro ao excluir', true, err.message); }
      };
      
      // CORRIGIDO: Meta - ao clicar em editar, preenche corretamente
      const handleEditGoal = (g) => {
        setGoalForm({
          id: g.id,
          name: g.name || '',
          target: String(g.target || ''),
          current: String(g.current || '0'),
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      const handleSaveGoal = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!goalForm.name.trim()) errors.name = 'Nome obrigatório';
        const target = parseFloat(goalForm.target);
        if (isNaN(target) || target <= 0) errors.target = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, goal: errors})); return; }
        
        const payload = { 
          ...goalForm, 
          ownerId: user.uid, 
          coupleId: userData.coupleId, 
          scope: isCouple ? 'shared' : 'private', 
          target, 
          current: parseFloat(goalForm.current) || 0 
        };
        
        try {
          if (goalForm.id) {
            await DataService.updateGoal(goalForm.id, payload);
          } else {
            await DataService.addGoal(payload);
          }
          const newGoals = await DataService.getCollection('goals', user.uid, userData.coupleId);
          setGoals(newGoals);
          setGoalForm({ id: null, name: '', target: '', current: '0' });
          setFormErrors(prev => ({...prev, goal: {}}));
          showToast("Meta salva.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleDeleteGoal = async (id) => {
        if (!id) { showToast('Erro: ID inválido', true); return; }
        if (!window.confirm("Apagar?")) return;
        try {
          await DataService.deleteGoal(id);
          setGoals(prev => prev.filter(g => g.id !== id));
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      // CORRIGIDO: Sub - editar preenche corretamente, inclui categoria e scope
      const handleEditSub = (s) => {
        setSubForm({
          id: s.id,
          desc: s.desc || '',
          value: String(s.value || ''),
          category: s.category || 'Assinaturas',
          dayOfMonth: s.dayOfMonth || 1,
          scope: s.scope || 'private',
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      const handleSaveSub = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!subForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(subForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, sub: errors})); return; }
        
        const payload = { 
          ...subForm, 
          ownerId: user.uid, 
          coupleId: subForm.scope === 'shared' ? userData.coupleId : null, 
          value: val, 
          dayOfMonth: parseInt(subForm.dayOfMonth), 
          active: subForm.id ? true : true,
          category: subForm.category,
        };
        
        try {
          if (subForm.id) {
            await DataService.updateSubscription(subForm.id, payload);
          } else {
            await DataService.addSubscription(payload);
          }
          const newSubs = await DataService.getCollection('subscriptions', user.uid, userData.coupleId);
          setSubscriptions(newSubs);
          setSubForm({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, scope: 'private' });
          setFormErrors(prev => ({...prev, sub: {}}));
          showToast("Assinatura salva.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleToggleSub = async (sub) => {
        try {
          await DataService.updateSubscription(sub.id, { active: !sub.active });
          setSubscriptions(prev => prev.map(s => s.id === sub.id ? {...s, active: !s.active} : s));
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleDeleteSub = async (id) => {
        if (!id) { showToast('Erro: ID inválido', true); return; }
        if (!window.confirm("Apagar?")) return;
        try {
          await DataService.deleteSubscription(id);
          setSubscriptions(prev => prev.filter(s => s.id !== id));
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      // CORRIGIDO: Installment - editar preenche, inclui paidInstallments
      const handleEditInst = (i) => {
        setInstForm({
          id: i.id,
          desc: i.desc || '',
          installmentValue: String(i.installmentValue || ''),
          paidInstallments: i.paidInstallments || 0,
          totalInstallments: i.totalInstallments || 2,
          dayOfMonth: i.dayOfMonth || 1,
          category: i.category || 'Dívidas',
          scope: i.scope || 'private',
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      const handleSaveInst = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!instForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(instForm.installmentValue);
        if (isNaN(val) || val <= 0) errors.installmentValue = 'Valor inválido';
        const tot = parseInt(instForm.totalInstallments);
        if (isNaN(tot) || tot < 2) errors.totalInstallments = 'Mínimo 2 parcelas';
        if (Object.keys(errors).length) { setFormErrors(prev => ({...prev, inst: errors})); return; }
        
        const paid = parseInt(instForm.paidInstallments) || 0;
        const payload = { 
          ...instForm, 
          ownerId: user.uid, 
          coupleId: instForm.scope === 'shared' ? userData.coupleId : null, 
          installmentValue: val, 
          totalInstallments: tot, 
          paidInstallments: paid, 
          dayOfMonth: parseInt(instForm.dayOfMonth), 
          active: paid < tot,
          category: instForm.category,
        };
        
        try {
          if (instForm.id) {
            await DataService.updateInstallment(instForm.id, payload);
          } else {
            await DataService.addInstallment(payload);
          }
          const newInsts = await DataService.getCollection('installments', user.uid, userData.coupleId);
          setInstallments(newInsts);
          setInstForm({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', scope: 'private' });
          setFormErrors(prev => ({...prev, inst: {}}));
          showToast("Parcelamento salvo.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleDeleteInst = async (id) => {
        if (!id) { showToast('Erro: ID inválido', true); return; }
        if (!window.confirm("Apagar?")) return;
        try {
          await DataService.deleteInstallment(id);
          setInstallments(prev => prev.filter(i => i.id !== id));
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleSetBudget = async (e) => {
        e.preventDefault();
        const ownerId = isCouple ? userData.coupleId : user.uid;
        const lim = parseFloat(budgetForm.limit);
        if (isNaN(lim) || lim <= 0) { setFormErrors(prev => ({...prev, budget: {limit: 'Valor inválido'}})); return; }
        try {
          await DataService.setBudget(ownerId, budgetForm.category, lim);
          setBudgets(prev => ({ ...prev, [budgetForm.category]: lim }));
          setBudgetForm({ category: 'Alimentação', limit: '' });
          setFormErrors(prev => ({...prev, budget: {}}));
          showToast("Orçamento definido.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleDeleteBudget = async (cat) => {
        const ownerId = isCouple ? userData.coupleId : user.uid;
        try {
          await DataService.deleteBudget(ownerId, cat);
          const newB = { ...budgets }; delete newB[cat]; setBudgets(newB);
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleUpdateCoupleSettings = async () => {
        try {
          await DataService.updateCouple(userData.coupleId, {
            settings: { nameA: settings.nameA, nameB: settings.nameB, salaryA: parseFloat(settings.salaryA) || 0, salaryB: parseFloat(settings.salaryB) || 0 }
          });
          showToast("Configurações salvas.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const handleMigrateToSolo = async () => {
        if (!window.confirm("Tem certeza? Seu parceiro também voltará para o modo solo.")) return;
        try {
          await DataService.dissolveCouple(user.uid, userData.coupleId);
          await refreshUserData();
          showToast("Você voltou para o Modo Solo.");
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      // NOVO: Regenerar código de convite
      const handleRegenerateCode = async () => {
        try {
          const newCode = await DataService.regenerateInviteCode(userData.coupleId);
          setRegeneratedCode(newCode);
          setShowInviteCodeModal(true);
        } catch (err) { showToast('Erro', true, err.message); }
      };
      
      const generateAIReport = () => {
        const r = [];
        const bal = totals.inc - totals.exp;
        const sr = totals.inc > 0 ? (bal / totals.inc) * 100 : 0;
        if (totals.inc === 0) r.push({ type: 'warning', icon: '⚠️', title: 'Sem Renda', text: 'Cadastre salários nas Config.' });
        else if (totals.exp > totals.inc) r.push({ type: 'danger', icon: '🚨', title: 'Gastos Excedentes', text: `Gastou ${formatMoney(Math.abs(bal))} a mais.` });
        else if (sr >= 20) r.push({ type: 'success', icon: '🏆', title: 'Saúde Impecável', text: `Poupou ${sr.toFixed(1)}% da renda.` });
        else r.push({ type: 'warning', icon: '📉', title: 'Atenção', text: `Reteve ${sr.toFixed(1)}%.` });
        
        if (totalSubscriptions > 0) {
          const subPct = totals.exp > 0 ? (totalSubscriptions / totals.exp) * 100 : 0;
          r.push({ type: 'info', icon: '🔁', title: 'Assinaturas', text: `${formatMoney(totalSubscriptions)} em custos fixos (${subPct.toFixed(1)}% das despesas).` });
        }
        
        const cats = Object.entries(categoriesTotal).sort((a,b)=>b[1].val - a[1].val);
        if (cats.length > 0) r.push({ type: 'info', icon: '💡', title: `Foco: ${cats[0][0]}`, text: `${((cats[0][1].val / totals.exp)*100).toFixed(1)}% das despesas.` });
        return r;
      };
      
      if (loadingData) return <div className="min-h-screen flex items-center justify-center text-brand-500 font-bold text-xl animate-pulse">Carregando...</div>;
      
      const inputClass = "w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-transparent rounded-xl outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-brand-500/30 transition-all text-sm";
      const labelClass = "block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5";
      
      return (
        <div className="flex flex-col md:flex-row min-h-screen relative">
          <nav className="glass-card md:w-72 flex-shrink-0 md:h-screen md:sticky top-0 z-50 p-6 flex md:flex-col justify-between order-last md:order-first fixed bottom-0 left-0 right-0 border-t md:border-t-0 md:border-r border-white/40 dark:border-white/5">
            <div className="flex flex-col h-full w-full overflow-y-auto custom-scrollbar">
              <div className="hidden md:flex items-center gap-3 mb-10">
                <div className="w-12 h-12 flex items-center justify-center bg-white/20 dark:bg-slate-800/50 rounded-xl p-1 shadow-inner border border-white/40 dark:border-white/10">
                  <div className="w-full h-full rounded-lg bg-gradient-to-br from-brand-500 to-partner-500 flex items-center justify-center text-white font-black text-xl">D</div>
                </div>
                <div>
                  <h1 className="font-extrabold text-lg tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-brand-600 to-brand-400 dark:from-brand-400 dark:to-brand-200">Finanças DMX</h1>
                  <p className="text-[10px] text-slate-500 uppercase font-bold tracking-[0.2em]">{isCouple ? 'Modo Casal' : 'Modo Solo'}</p>
                </div>
              </div>
              
              <div className="flex md:flex-col justify-around md:justify-start gap-1 md:gap-2 flex-1">
                {[
                  { id: 'dashboard', icon: '📊', label: 'Dashboard' },
                  { id: 'transactions', icon: '💸', label: 'Transações' },
                  { id: 'subscriptions', icon: '🔁', label: 'Assinaturas' },
                  { id: 'installments', icon: '💳', label: 'Parcelas' },
                  { id: 'goals', icon: '🎯', label: 'Metas' },
                  { id: 'budgets', icon: '💰', label: 'Orçamentos' },
                  { id: 'sync', icon: '⚙️', label: 'Configurações' }
                ].map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col md:flex-row items-center md:justify-start gap-3 px-4 py-3 rounded-2xl transition-all duration-300 font-semibold text-xs md:text-sm ${activeTab === tab.id ? 'bg-gradient-to-r from-slate-900 to-slate-800 text-white dark:from-white dark:to-slate-200 dark:text-slate-900 shadow-lg transform md:translate-x-1' : 'text-slate-500 hover:bg-slate-200/50 dark:hover:bg-slate-800/50'}`}>
                    <span className="text-lg md:text-xl">{tab.icon}</span>
                    <span className="hidden md:inline">{tab.label}</span>
                  </button>

                      </div>
                      <div className="mt-6 flex justify-end">
                        <button onClick={handleUpdateCoupleSettings} className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg hover:-translate-y-0.5 transition-all">Salvar</button>
                      </div>
                    </BentoCard>
                  )}
                  
                  <BentoCard title="Ações" icon="🔧">
                    <div className="flex flex-col md:flex-row gap-4">
                      <button onClick={async () => { await refreshUserData(); showToast('Atualizado!'); }} className="flex-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-xl hover:-translate-y-0.5 transition-all">🔄 Atualizar</button>
                      <button onClick={signOut} className="flex-1 md:hidden bg-rose-500 text-white font-bold py-3 px-8 rounded-xl shadow-md hover:-translate-y-0.5 transition-all">🚪 Sair</button>
                    </div>
                  </BentoCard>
                </div>
              )}
            </div>
          </main>
          
          <div className="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none" aria-live="polite">
            {toasts.map(t => (
              <div key={t.id} className={`px-6 py-4 rounded-2xl shadow-2xl font-bold text-sm bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-l-4 animate-slide-up max-w-sm ${t.isError ? 'border-rose-500 text-rose-600 dark:text-rose-400' : 'border-brand-500 text-brand-600 dark:text-brand-400'}`}>
                <div className="flex items-start gap-3">
                  <span className="text-xl">{t.isError ? '⚠️' : '✅'}</span>
                  <div>
                    <div>{t.msg}</div>
                    {t.details && <div className="text-xs mt-1 opacity-75 font-normal">{t.details}</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
          
          {showMigrateModal && (
            <MigrateToCoupleModal onClose={() => setShowMigrateModal(false)} onSuccess={refreshUserData} />
          )}
          
          {/* NOVO: Modal para mostrar código de convite regenerado */}
          {showInviteCodeModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
              <div className="glass-card p-8 rounded-3xl w-full max-w-md shadow-2xl animate-slide-up">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-partner-100 dark:bg-partner-900/30 flex items-center justify-center text-4xl">✉️</div>
                  <h2 className="font-extrabold text-2xl mb-2">Novo Código Gerado!</h2>
                  <p className="text-slate-500 text-sm">Compartilhe este código com quem você quer convidar:</p>
                </div>
                
                <div className="bg-gradient-to-br from-partner-50 to-brand-50 dark:from-partner-900/20 dark:to-brand-900/20 p-6 rounded-2xl border border-partner-200 dark:border-partner-800/50 mb-6 text-center">
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Código de Convite</p>
                  <div className="font-mono font-black text-4xl tracking-[0.3em] text-partner-600 dark:text-partner-400 mb-4">{regeneratedCode}</div>
                  <button onClick={() => { navigator.clipboard?.writeText(regeneratedCode); showToast('Código copiado!'); }} className="text-sm bg-white dark:bg-slate-800 font-bold py-2 px-6 rounded-xl shadow-md">📋 Copiar</button>
                </div>
                
                <button onClick={() => setShowInviteCodeModal(false)} className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl shadow-lg">
                  Fechar
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function App() {
      const { user, userData, loading } = useAuth();
      
      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-brand-900">
          <div className="w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-500 to-partner-500 flex items-center justify-center text-white font-black text-2xl animate-pulse">D</div>
        </div>
      );
      
      if (!user) return <AuthScreen />;
      if (!userData?.mode) return <OnboardingFlow />;
      return <DashboardApp />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider><App /></AuthProvider>
    );
  </script>
</body>
</html>
