  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }

<body class="bg-slate-50 text-slate-900 dark:bg-[#050914] dark:text-slate-100 min-h-screen transition-colors duration-500">
  
  <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-400/20 dark:bg-brand-500/10 rounded-full blur-[120px] animate-blob"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-partner-400/20 dark:bg-partner-500/10 rounded-full blur-[120px] animate-blob" style="animation-delay: 5s"></div>
    <div class="absolute top-[40%] left-[40%] w-[30%] h-[30%] bg-blue-400/10 dark:bg-blue-500/5 rounded-full blur-[100px] animate-blob" style="animation-delay: 10s"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback, useContext, createContext, memo } = React;

    // ==================== UTILITÁRIOS ====================
    const getLocalDateString = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };
    const formatMoney = (val) => Number(val).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    const generateId = () => {
      if (window.crypto?.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    };

    const generateInviteCode = () => {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
      return code;
    };

    const predefinedCategories = ['Alimentação', 'Transporte', 'Lazer', 'Saúde', 'Habitação', 'Educação', 'Vestuário', 'Pets', 'Assinaturas', 'Dívidas', 'Investimentos', 'Cuidados Pessoais', 'Casa/Mercado', 'Viagem', 'Outros'];

    // NOVO: Calcula próximo vencimento e status (em dia/atrasado)
    const calcNextDue = (dayOfMonth) => {
      const today = new Date();
      const currentDay = today.getDate();
      const currentMonth = today.getMonth();
      const currentYear = today.getFullYear();
      
      let dueDate = new Date(currentYear, currentMonth, dayOfMonth);
      
      if (currentDay > dayOfMonth) {
        dueDate = new Date(currentYear, currentMonth + 1, dayOfMonth);
      }
      
      const diffTime = dueDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      const isLate = currentDay > dayOfMonth;
      const daysLate = isLate ? currentDay - dayOfMonth : 0;
      
      return { dueDate, diffDays, isLate, daysLate };
    };

    // ==================== DATA SERVICE ====================
    const DataService = {
      // Auth
      signUp: async (email, password, name) => {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;
        await db.collection('users').doc(user.uid).set({
          email, name,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          mode: null, coupleId: null, partnerId: null,
          settings: { salary: 0, currency: 'BRL', nameInCouple: 'Pessoa A' }
        });
        return user;
      },
      
      signIn: async (email, password) => {
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        return userCredential.user;
      },
      
      signOut: async () => await auth.signOut(),
      sendPasswordReset: async (email) => await auth.sendPasswordResetEmail(email),
      
      getUserData: async (userId) => {
        const doc = await db.collection('users').doc(userId).get();
        return doc.exists ? { ...doc.data(), id: doc.id } : null;
      },
      
      updateUser: async (userId, updates) => {
        await db.collection('users').doc(userId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      getCoupleData: async (coupleId) => {
        if (!coupleId) return null;
        const doc = await db.collection('couples').doc(coupleId).get();
        return doc.exists ? { ...doc.data(), id: doc.id } : null;
      },
      
      updateCouple: async (coupleId, updates) => {
        await db.collection('couples').doc(coupleId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      regenerateInviteCode: async (coupleId) => {
        const newCode = generateInviteCode();
        await db.collection('couples').doc(coupleId).update({
          inviteCode: newCode,
          inviteCodeGeneratedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return newCode;
      },
      
      createCouple: async (currentUser, partnerEmail, nameInCouple) => {
        const partnerQuery = await db.collection('users').where('email', '==', partnerEmail).limit(1).get();
        
        if (partnerQuery.empty) {
          throw new Error('Este email não está cadastrado. Peça para seu parceiro criar uma conta primeiro.');
        }
        
        const partnerDoc = partnerQuery.docs[0];
        const partnerData = partnerDoc.data();
        const partnerId = partnerDoc.id;
        
        if (partnerData.mode === 'couple') {
          throw new Error('Este usuário já está em um casal.');
        }
        
        const inviteCode = generateInviteCode();
        const coupleRef = await db.collection('couples').add({
          userA: currentUser.uid,
          userB: partnerId,
          inviteCode,
          inviteEmail: partnerEmail,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          acceptedAt: null,
          settings: {
            nameA: nameInCouple,
            nameB: partnerData.name || 'Pessoa B',
            salaryA: 0, salaryB: 0,
          }
        });
        
        await db.collection('users').doc(currentUser.uid).update({
          mode: 'couple',
          coupleId: coupleRef.id,
          partnerId: partnerId,
          'settings.nameInCouple': nameInCouple,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        return { coupleId: coupleRef.id, partnerId, inviteCode };
      },
      
      acceptInviteByCode: async (currentUser, inviteCode) => {
        const allCouples = await db.collection('couples').get();
        
        const coupleDoc = allCouples.docs.find(doc => {
          const data = doc.data();
          return data.inviteCode === inviteCode.toUpperCase() && !data.acceptedAt;
        });
        
        if (!coupleDoc) {
          throw new Error('Código inválido, expirado ou já utilizado.');
        }
        
        const coupleData = coupleDoc.data();
        
        if (coupleData.userB !== currentUser.uid) {
          throw new Error('Este código não foi enviado para sua conta. Verifique se está logado com o email correto.');
        }
        
        await db.collection('couples').doc(coupleDoc.id).update({
          acceptedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await db.collection('users').doc(currentUser.uid).update({
          mode: 'couple',
          coupleId: coupleDoc.id,
          partnerId: coupleData.userA,
          'settings.nameInCouple': 'Pessoa B',
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        return { coupleId: coupleDoc.id, partnerId: coupleData.userA };
      },
      
      dissolveCouple: async (userId, coupleId) => {
        const coupleData = await DataService.getCoupleData(coupleId);
        if (!coupleData) return;
        
        await db.collection('users').doc(coupleData.userA).update({
          mode: 'solo', coupleId: null, partnerId: null,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('users').doc(coupleData.userB).update({
          mode: 'solo', coupleId: null, partnerId: null,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        const sharedTxs = await db.collection('transactions').where('coupleId', '==', coupleId).get();
        for (const doc of sharedTxs.docs) {
          await doc.ref.update({ scope: 'private', coupleId: null });
        }
        
        await db.collection('couples').doc(coupleId).delete();
      },
      
      // ==================== BUSCA DE DADOS ====================
      getAllTransactions: async (userId, coupleId) => {
        const txs = [];
        const personalSnap = await db.collection('transactions').where('ownerId', '==', userId).get();
        personalSnap.docs.forEach(doc => txs.push({ ...doc.data(), id: doc.id }));
        
        if (coupleId) {
          const sharedSnap = await db.collection('transactions').where('coupleId', '==', coupleId).get();
          sharedSnap.docs.forEach(doc => {
            const data = doc.data();
            if (data.ownerId !== userId) txs.push({ id: doc.id, ...data });
          });
        }
        
        return txs.sort((a, b) => new Date(b.date) - new Date(a.date));
      },
      
      addTransaction: async (txData) => {
        if (!txData.ownerId) throw new Error('ownerId obrigatório');
        const docRef = await db.collection('transactions').add({
          ...txData,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return docRef.id;
      },
      
      updateTransaction: async (txId, updates) => {
        if (!txId) throw new Error('ID da transação ausente');
        await db.collection('transactions').doc(txId).update({
          ...updates,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      deleteTransaction: async (txId) => {
        if (!txId) throw new Error('ID da transação ausente');
        await db.collection('transactions').doc(txId).delete();
      },
      
      getCollection: async (collectionName, userId, coupleId) => {
        const items = [];
        const personalSnap = await db.collection(collectionName).where('ownerId', '==', userId).get();
        personalSnap.docs.forEach(doc => items.push({ ...doc.data(), id: doc.id }));
        
        if (coupleId) {
          const sharedSnap = await db.collection(collectionName).where('coupleId', '==', coupleId).get();
          sharedSnap.docs.forEach(doc => {
            const data = doc.data();
            if (data.ownerId !== userId) items.push({ id: doc.id, ...data });
          });
        }
        
        return items;
      },
      
      // CORRIGIDO: add methods retornam o ID gerado
      addGoal: async (data) => {
        if (!data.ownerId) throw new Error('ownerId obrigatório');
        const docRef = await db.collection('goals').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateGoal: async (id, data) => {
        if (!id) throw new Error('ID da meta inválido');
        await db.collection('goals').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteGoal: async (id) => {
        if (!id) throw new Error('ID da meta inválido');
        await db.collection('goals').doc(id).delete();
      },
      
      addSubscription: async (data) => {
        if (!data.ownerId) throw new Error('ownerId obrigatório');
        const docRef = await db.collection('subscriptions').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateSubscription: async (id, data) => {
        if (!id) throw new Error('ID da assinatura inválido');
        await db.collection('subscriptions').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteSubscription: async (id) => {
        if (!id) throw new Error('ID da assinatura inválido');
        await db.collection('subscriptions').doc(id).delete();
      },
      
      addInstallment: async (data) => {
        if (!data.ownerId) throw new Error('ownerId obrigatório');
        const docRef = await db.collection('installments').add({ ...data, createdAt: firebase.firestore.FieldValue.serverTimestamp(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        return docRef.id;
      },
      updateInstallment: async (id, data) => {
        if (!id) throw new Error('ID do parcelamento inválido');
        await db.collection('installments').doc(id).update({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      },
      deleteInstallment: async (id) => {
        if (!id) throw new Error('ID do parcelamento inválido');
        await db.collection('installments').doc(id).delete();
      },
      
      getBudgets: async (ownerId) => {
        const snap = await db.collection('budgets').where('ownerId', '==', ownerId).get();
        const budgets = {};
        snap.docs.forEach(doc => {
          const data = doc.data();
          budgets[data.category] = data.limit;
        });
        return budgets;
      },
      
      setBudget: async (ownerId, category, limit) => {
        const budgetRef = db.collection('budgets').doc(`${ownerId}_${category}`);
        await budgetRef.set({
          ownerId, category, limit,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      
      deleteBudget: async (ownerId, category) => {
        await db.collection('budgets').doc(`${ownerId}_${category}`).delete();
      },
      
      // ========== NOVO: SISTEMA DE APORTES DE METAS ==========
      addContribution: async (goalId, data) => {
        if (!goalId) throw new Error('goalId ausente');
        await db.collection('goals').doc(goalId).collection('contributions').add({
          ...data,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
      },
      getContributions: async (goalId) => {
        if (!goalId) return [];
        const snap = await db.collection('goals').doc(goalId).collection('contributions').orderBy('date', 'desc').get();
        return snap.docs.map(d => ({ id: d.id, ...d.data() }));
      },
      deleteContribution: async (goalId, contribId) => {
        if (!goalId || !contribId) throw new Error('IDs ausentes');
        await db.collection('goals').doc(goalId).collection('contributions').doc(contribId).delete();
      }
    };

    // ==================== AUTH CONTEXT ====================
    const AuthContext = createContext();

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [userData, setUserData] = useState(null);
      const [coupleData, setCoupleData] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const loadUserData = async (firebaseUser) => {
        const data = await DataService.getUserData(firebaseUser.uid);
        setUserData(data);
        if (data?.coupleId) {
          const couple = await DataService.getCoupleData(data.coupleId);
          setCoupleData(couple);
        } else {
          setCoupleData(null);
        }
      };
      
      useEffect(() => {
        const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
          if (firebaseUser) {
            setUser(firebaseUser);
            await loadUserData(firebaseUser);
          } else {
            setUser(null);
            setUserData(null);
            setCoupleData(null);
          }
          setLoading(false);
        });
        return unsubscribe;
      }, []);
      
      const refreshUserData = async () => {
        if (user) await loadUserData(user);
      };
      
      return <AuthContext.Provider value={{ user, userData, coupleData, loading, signIn: DataService.signIn, signUp: DataService.signUp, signOut: DataService.signOut, sendPasswordReset: DataService.sendPasswordReset, refreshUserData }}>{children}</AuthContext.Provider>;
    }

    function useAuth() {
      return useContext(AuthContext);
    }

    // ==================== COMPONENTES VISUAIS ====================
    const BentoCard = ({ children, className = "", title, icon, action }) => (
      <div className={`glass-card p-6 rounded-3xl transition-all duration-300 hover:shadow-2xl hover:-translate-y-1 ${className}`}>
        {(title || action) && (
          <div className="flex justify-between items-start mb-5">
            {title && <h3 className="font-bold text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">{icon} {title}</h3>}
            {action}
          </div>
        )}
        {children}
      </div>
    );

    const DonutChart = memo(({ categoriesTotal }) => {
      if (Object.keys(categoriesTotal).length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Sem dados para exibir</div>;
      const sorted = Object.entries(categoriesTotal).sort((a,b) => b[1].val - a[1].val);
      const total = sorted.reduce((acc, curr) => acc + curr[1].val, 0);
      const colors = ['#14b8a6', '#8b5cf6', '#3b82f6', '#f43f5e', '#f59e0b', '#10b981', '#64748b'];
      
      return (
        <div className="flex flex-col md:flex-row items-center gap-8">
          <div className="relative w-40 h-40 flex-shrink-0">
            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90 drop-shadow-xl">
              <circle cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" className="stroke-slate-200 dark:stroke-slate-800" />
              {sorted.map(([cat, data], i) => {
                const pct = (data.val / total) * 100;
                const offset = sorted.slice(0, i).reduce((acc, curr) => acc + (curr[1].val / total) * 100, 0);
                return <circle key={cat} cx="50" cy="50" r="40" fill="transparent" strokeWidth="10" stroke={colors[i % colors.length]} strokeDasharray={`${(pct / 100) * 251.2} 251.2`} strokeDashoffset={-(offset / 100) * 251.2} className="donut-segment" strokeLinecap="round" />;
              })}
            </svg>
            <div className="absolute inset-0 flex items-center justify-center flex-col">
              <span className="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Total</span>
              <span className="text-sm font-black text-slate-800 dark:text-white">{formatMoney(total)}</span>
            </div>
          </div>
          <div className="flex-1 space-y-3 w-full max-h-48 overflow-y-auto custom-scrollbar pr-2">
            {sorted.map(([cat, data], i) => (
              <div key={cat} className="flex justify-between items-center text-sm gap-3 group">
                <div className="flex items-center gap-3 flex-1 min-w-0">
                  <span className="w-3 h-3 rounded-full flex-shrink-0 shadow-sm" style={{backgroundColor: colors[i % colors.length]}}></span>
                  <span className="font-semibold text-slate-700 dark:text-slate-200 truncate group-hover:text-brand-600 dark:group-hover:text-brand-400 transition-colors">{cat}</span>
                </div>
                <div className="text-right flex-shrink-0">
                  <div className="font-bold text-slate-900 dark:text-white">{formatMoney(data.val)}</div>
                  <div className="text-[10px] text-slate-500 font-medium">{((data.val / total) * 100).toFixed(1)}% • {data.count}x</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    });

    const EvolutionChart = memo(({ transactions, settings }) => {
      const monthlyData = {};
      transactions.forEach(t => {
        let month = t.date?.slice(0, 7);
        if (!month) return;
        if (!monthlyData[month]) monthlyData[month] = { inc: 0, exp: 0 };
        t.type === 'income' ? monthlyData[month].inc += t.value : monthlyData[month].exp += t.value;
      });
      const sortedMonths = Object.keys(monthlyData).sort().slice(-6);
      if(sortedMonths.length === 0) return <div className="flex items-center justify-center h-48 text-slate-400 text-sm">Histórico insuficiente</div>;
      
      let maxVal = 1;
      const items = sortedMonths.map(m => {
        const salaryTotal = (parseFloat(settings.salaryA || 0)) + (parseFloat(settings.salaryB || 0));
        const i = (monthlyData[m].inc || 0) + salaryTotal;
        const e = monthlyData[m].exp || 0;
        if (i > maxVal) maxVal = i; if (e > maxVal) maxVal = e;
        return { month: m.split('-').reverse().join('/'), inc: i, exp: e };
      });
      
      return (

    // ==================== TELA DE AUTENTICAÇÃO ====================
    function AuthScreen() {
      const { signIn, signUp, sendPasswordReset } = useAuth();
      const [mode, setMode] = useState('login'); // 'login' | 'signup' | 'reset'
      const [form, setForm] = useState({ email: '', password: '', name: '' });
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');
      const [loading, setLoading] = useState(false);
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setSuccess('');
        setLoading(true);
        
        try {
          if (mode === 'signup') {
            if (!form.name.trim()) throw new Error('Nome é obrigatório');
            if (form.password.length < 6) throw new Error('Senha deve ter no mínimo 6 caracteres');
            await signUp(form.email, form.password, form.name);
            setSuccess('Conta criada! Bem-vindo ao Finanças DMX.');
          } else if (mode === 'login') {
            await signIn(form.email, form.password);
          } else if (mode === 'reset') {
            if (!form.email) throw new Error('Digite seu email');
            await sendPasswordReset(form.email);
            setSuccess('Email de recuperação enviado! Verifique sua caixa de entrada.');
            setTimeout(() => setMode('login'), 3000);
          }
        } catch (err) {
          let msg = err.message;
          if (msg.includes('auth/email-already-in-use')) msg = 'Este email já está cadastrado.';
          else if (msg.includes('auth/invalid-email')) msg = 'Email inválido.';
          else if (msg.includes('auth/user-not-found') || msg.includes('auth/wrong-password') || msg.includes('auth/invalid-credential')) msg = 'Email ou senha incorretos.';
          else if (msg.includes('auth/weak-password')) msg = 'Senha muito fraca (mínimo 6 caracteres).';
          else if (msg.includes('auth/too-many-requests')) msg = 'Muitas tentativas. Tente novamente em alguns minutos.';
          setError(msg);
        } finally {
          setLoading(false);
        }
      };
      
      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-brand-900 p-4 relative overflow-hidden">
          {/* Blobs de fundo */}
          <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-brand-500/20 rounded-full blur-[120px] animate-blob"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-partner-500/20 rounded-full blur-[120px] animate-blob" style={{animationDelay: '5s'}}></div>
          
          <div className="glass-card p-8 md:p-10 rounded-3xl w-full max-w-md shadow-2xl relative z-10 animate-fade-in">
            <div className="text-center mb-8">
              <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-brand-500 to-partner-500 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-brand-500/30">D</div>
              <h1 className="font-extrabold text-3xl bg-clip-text text-transparent bg-gradient-to-r from-brand-400 to-partner-400 tracking-tight">Finanças DMX</h1>
              <p className="text-slate-500 dark:text-slate-400 text-sm mt-2">
                {mode === 'login' && 'Entre para acessar suas finanças'}
                {mode === 'signup' && 'Crie sua conta gratuita'}
                {mode === 'reset' && 'Recupere sua senha'}
              </p>
            </div>
            
            {error && (
              <div className="mb-4 p-3 bg-rose-100/50 dark:bg-rose-900/30 border border-rose-200 dark:border-rose-800/50 text-rose-700 dark:text-rose-300 rounded-xl text-sm font-medium flex items-start gap-2">
                <span>⚠️</span> {error}
              </div>
            )}
            
            {success && (
              <div className="mb-4 p-3 bg-emerald-100/50 dark:bg-emerald-900/30 border border-emerald-200 dark:border-emerald-800/50 text-emerald-700 dark:text-emerald-300 rounded-xl text-sm font-medium flex items-start gap-2">
                <span>✅</span> {success}
              </div>
            )}
            
            <form onSubmit={handleSubmit} className="space-y-4">
              {mode === 'signup' && (
                <div>
                  <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Nome</label>
                  <input type="text" value={form.name} onChange={e => setForm({...form, name: e.target.value})} 
                    className="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-transparent rounded-xl outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500/50 transition-all duration-300" 
                    placeholder="Seu nome" required />
                </div>
              )}
              
              <div>
                <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Email</label>
                <input type="email" value={form.email} onChange={e => setForm({...form, email: e.target.value})} 
                  className="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-transparent rounded-xl outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500/50 transition-all duration-300" 
                  placeholder="seu@email.com" required />
              </div>
              
              {mode !== 'reset' && (
                <div>
                  <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Senha</label>
                  <input type="password" value={form.password} onChange={e => setForm({...form, password: e.target.value})} 
                    className="w-full px-4 py-3 bg-slate-100/50 dark:bg-slate-800/50 border border-transparent rounded-xl outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500/50 transition-all duration-300" 
                    placeholder="••••••••" required minLength="6" />
                </div>
              )}
              
              <button type="submit" disabled={loading} className="w-full bg-brand-500 hover:bg-brand-600 disabled:bg-slate-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all hover:-translate-y-0.5 disabled:translate-y-0">
                {loading ? 'Processando...' : 
                  mode === 'login' ? 'Entrar' : 
                  mode === 'signup' ? 'Criar Conta Gratuita' : 'Enviar Email de Recuperação'}
              </button>
            </form>
            
            <div className="mt-6 space-y-2 text-center">
              {mode === 'login' && (
                <button onClick={() => { setMode('reset'); setError(''); setSuccess(''); }} 
                  className="text-sm text-slate-500 hover:text-brand-500 font-medium transition-colors">
                  Esqueci minha senha
                </button>
              )}
              <div>
                <button onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); setSuccess(''); }} 
                  className="text-sm text-slate-500 hover:text-brand-500 font-medium transition-colors">
                  {mode === 'login' ? 'Não tem conta? Cadastre-se' : 'Já tem conta? Faça login'}
                </button>
              </div>
              {mode !== 'login' && (
                <button onClick={() => { setMode('login'); setError(''); setSuccess(''); }} 
                  className="text-sm text-slate-500 hover:text-brand-500 font-medium transition-colors block mx-auto">
                  ← Voltar ao login
                </button>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ==================== ONBOARDING (ESCOLHA DE MODO) ====================
    function OnboardingFlow() {
      const { user, userData, refreshUserData } = useAuth();
      const [step, setStep] = useState(1);

      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      
      const handleStartSolo = async () => {
        setLoading(true);
        try {
          await DataService.updateUser(user.uid, { mode: 'solo' });
          await refreshUserData();
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };
      
      const handleCreateCouple = async () => {
        if (!partnerEmail) { setError('Digite o email do parceiro'); return; }
        setError(''); setLoading(true);
        try {
          const result = await DataService.createCouple({ uid: user.uid, name: userData.name }, partnerEmail, nameInCouple);
          setGeneratedCode(result.inviteCode);
          setStep(4);
          await refreshUserData();
        } catch (err) { setError(err.message); }
        finally { setLoading(false); }
      };
      
      const handleJoinCouple = async () => {
        if (!inviteCode || inviteCode.length !== 6) { setError('Digite o código de 6 caracteres'); return; }

          await DataService.acceptInviteByCode({ uid: user.uid }, inviteCode);

                      </div>

                      </div>
                    </div>

            {/* Passo 2A: Solo */}

          </div>

    // ==================== NOVO: MODAL DE APORTES DE METAS ====================
    function GoalContributionsModal({ goal, onClose, onContributionsChange }) {
      const { user } = useAuth();
      const [contributions, setContributions] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showAdd, setShowAdd] = useState(false);
      const [newAmount, setNewAmount] = useState('');
      const [newDate, setNewDate] = useState(getLocalDateString());
      const [newNote, setNewNote] = useState('');
      const [saving, setSaving] = useState(false);
      
      const loadContributions = async () => {
        setLoading(true);
        const list = await DataService.getContributions(goal.id);
        setContributions(list);
        setLoading(false);
      };
      
      useEffect(() => { loadContributions(); }, [goal.id]);
      
      const handleAdd = async (e) => {
        e.preventDefault();
        const amount = parseFloat(newAmount);
        if (isNaN(amount) || amount <= 0) return;
        setSaving(true);
        try {
          await DataService.addContribution(goal.id, {
            amount, date: newDate, note: newNote || null,
            ownerId: user.uid, userName: user.displayName || user.email
          });
          await loadContributions();
          if (onContributionsChange) onContributionsChange();
          setNewAmount(''); setNewNote(''); setShowAdd(false);
        } catch (e) { console.error(e); }
        finally { setSaving(false); }
      };
      
      const handleDelete = async (id) => {
        if (!window.confirm('Remover este aporte? O valor será descontado da meta.')) return;
        try {
          await DataService.deleteContribution(goal.id, id);
          await loadContributions();
          if (onContributionsChange) onContributionsChange();
        } catch (e) { console.error(e); }
      };
      
      const total = contributions.reduce((sum, c) => sum + c.amount, 0);
      const pct = goal.target > 0 ? Math.min(100, (total / goal.target) * 100) : 0;
      
      return (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
          <div className="glass-card p-6 md:p-8 rounded-3xl w-full max-w-2xl shadow-2xl animate-slide-up max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div className="flex justify-between items-start mb-6">
              <div>
                <h2 className="font-extrabold text-2xl mb-1">🎯 {goal.name}</h2>
                <p className="text-sm text-slate-500">Histórico completo de aportes</p>
              </div>
              <button onClick={onClose} className="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-xl">✕</button>
            </div>
            
            {/* Resumo */}
            <div className="grid grid-cols-3 gap-3 mb-6">
              <div className="p-4 rounded-2xl bg-brand-50 dark:bg-brand-900/20 border border-brand-200 dark:border-brand-800/50">
                <p className="text-[10px] uppercase font-bold tracking-wider text-brand-600 dark:text-brand-400 mb-1">Total Acumulado</p>
                <p className="font-black text-xl text-brand-700 dark:text-brand-300">{formatMoney(total)}</p>
              </div>
              <div className="p-4 rounded-2xl bg-slate-100 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700">
                <p className="text-[10px] uppercase font-bold tracking-wider text-slate-600 dark:text-slate-400 mb-1">Meta</p>
                <p className="font-black text-xl">{formatMoney(goal.target)}</p>
              </div>
              <div className="p-4 rounded-2xl bg-partner-50 dark:bg-partner-900/20 border border-partner-200 dark:border-partner-800/50">
                <p className="text-[10px] uppercase font-bold tracking-wider text-partner-600 dark:text-partner-400 mb-1">Progresso</p>
                <p className="font-black text-xl text-partner-700 dark:text-partner-300">{pct.toFixed(1)}%</p>
              </div>
            </div>
            
            {/* Barra de progresso */}
            <div className="mb-6">
              <div className="w-full h-3 bg-slate-200/50 dark:bg-slate-800/80 rounded-full overflow-hidden shadow-inner">
                <div className="h-full bg-gradient-to-r from-brand-400 to-brand-600 transition-all duration-1000 rounded-full" style={{width: `${pct}%`}}></div>
              </div>
            </div>
            
            {/* Botão Adicionar Aporte */}
            {!showAdd ? (
              <button onClick={() => setShowAdd(true)} className="w-full mb-6 py-3 bg-gradient-to-r from-brand-500 to-brand-600 text-white font-bold rounded-xl shadow-lg hover:-translate-y-0.5 transition-all">
                + Adicionar Aporte
              </button>
            ) : (
              <form onSubmit={handleAdd} className="mb-6 p-4 rounded-2xl bg-brand-50 dark:bg-brand-900/20 border border-brand-200 dark:border-brand-800/50">
                <h3 className="font-bold mb-3">Novo Aporte</h3>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <div>
                    <label className="block text-[10px] font-bold uppercase tracking-wider mb-1 text-slate-500">Valor (R$)</label>
                    <input type="number" step="0.01" value={newAmount} onChange={e => setNewAmount(e.target.value)} className="w-full px-3 py-2 bg-white dark:bg-slate-900 rounded-lg" placeholder="500,00" required autoFocus />
                  </div>
                  <div>
                    <label className="block text-[10px] font-bold uppercase tracking-wider mb-1 text-slate-500">Data</label>
                    <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full px-3 py-2 bg-white dark:bg-slate-900 rounded-lg" required />
                  </div>
                </div>
                <div className="mb-3">
                  <label className="block text-[10px] font-bold uppercase tracking-wider mb-1 text-slate-500">Nota (opcional)</label>
                  <input type="text" value={newNote} onChange={e => setNewNote(e.target.value)} className="w-full px-3 py-2 bg-white dark:bg-slate-900 rounded-lg" placeholder="Ex: Bônus, economia do mês..." />
                </div>
                <div className="flex gap-2">
                  <button type="button" onClick={() => setShowAdd(false)} className="flex-1 bg-slate-200 dark:bg-slate-700 font-bold py-2 rounded-lg">Cancelar</button>
                  <button type="submit" disabled={saving} className="flex-1 bg-brand-500 text-white font-bold py-2 rounded-lg">{saving ? '...' : 'Confirmar Aporte'}</button>
                </div>
              </form>
            )}
            
            {/* Timeline de aportes */}
            <h3 className="font-bold mb-3 text-slate-700 dark:text-slate-300">Histórico ({contributions.length} aporte{contributions.length !== 1 ? 's' : ''})</h3>
            
            {loading ? (
              <p className="text-center text-slate-500 py-6">Carregando...</p>
            ) : contributions.length === 0 ? (
              <div className="text-center py-10 text-slate-400">
                <div className="text-4xl mb-2">💰</div>
                <p>Nenhum aporte registrado ainda.</p>
                <p className="text-sm mt-1">Clique em "Adicionar Aporte" para começar!</p>
              </div>
            ) : (
              <div className="space-y-3">
                {contributions.map((c, idx) => {
                  const isFirst = idx === 0;
                  return (
                    <div key={c.id} className={`relative pl-8 ${!isFirst ? 'border-l-2 border-slate-200 dark:border-slate-700 ml-3' : ''}`}>
                      <div className={`absolute left-0 top-2 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${isFirst ? 'bg-brand-500 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>
                        {isFirst ? '★' : idx + 1}
                      </div>
                      <div className="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-2xl p-4 hover:shadow-md transition-all">
                        <div className="flex justify-between items-start mb-2">
                          <div>
                            <p className="font-black text-xl text-brand-600 dark:text-brand-400">+{formatMoney(c.amount)}</p>
                            <p className="text-xs text-slate-500">{new Date(c.date).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' })}</p>
                          </div>
                          <button onClick={() => handleDelete(c.id)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 rounded-lg">🗑️</button>
                        </div>
                        {c.note && <p className="text-sm text-slate-600 dark:text-slate-400 italic mt-2">"{c.note}"</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            
            {contributions.length > 0 && (
              <div className="mt-6 p-4 rounded-2xl bg-gradient-to-br from-brand-50 to-partner-50 dark:from-brand-900/20 dark:to-partner-900/20 border border-brand-200 dark:border-brand-800/50">
                <p className="text-[10px] font-bold uppercase tracking-wider mb-2 text-brand-600 dark:text-brand-400">📊 Estatísticas</p>
                <div className="grid grid-cols-3 gap-3 text-sm">
                  <div>
                    <p className="text-slate-500 text-xs">Média por aporte</p>
                    <p className="font-bold">{formatMoney(total / contributions.length)}</p>
                  </div>
                  <div>
                    <p className="text-slate-500 text-xs">Maior aporte</p>
                    <p className="font-bold">{formatMoney(Math.max(...contributions.map(c => c.amount)))}</p>
                  </div>
                  <div>
                    <p className="text-slate-500 text-xs">Menor aporte</p>
                    <p className="font-bold">{formatMoney(Math.min(...contributions.map(c => c.amount)))}</p>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ==================== DASHBOARD APP ====================
    function DashboardApp() {
      const { user, userData, coupleData, signOut, refreshUserData } = useAuth();
      const [activeTab, setActiveTab] = useState('dashboard');
      const [monthFilter, setMonthFilter] = useState(() => { 
        const d = new Date(); 
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; 
      });
      const [theme, setTheme] = useState(() => localStorage.getItem('theme') || 'dark');
      const [toasts, setToasts] = useState([]);
      const [showAI, setShowAI] = useState(false);
      
      const [transactions, setTransactions] = useState([]);
      const [goals, setGoals] = useState([]);
      const [budgets, setBudgets] = useState({});
      const [subscriptions, setSubscriptions] = useState([]);
      const [installments, setInstallments] = useState([]);
      const [contributionsMap, setContributionsMap] = useState({}); // goalId -> total
      const [partnerData, setPartnerData] = useState(null);
      const [loadingData, setLoadingData] = useState(true);
      
      const [txForm, setTxForm] = useState({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'private', paidBy: user?.uid });
      const [goalForm, setGoalForm] = useState({ id: null, name: '', target: '' });
      const [budgetForm, setBudgetForm] = useState({ category: 'Alimentação', limit: '' });
      const [subForm, setSubForm] = useState({ id: null, desc: '', value: '', category: 'Assinaturas', dayOfMonth: 1, scope: 'private' });
      const [instForm, setInstForm] = useState({ id: null, desc: '', installmentValue: '', paidInstallments: 0, totalInstallments: 2, dayOfMonth: 1, category: 'Dívidas', scope: 'private' });
      const [formErrors, setFormErrors] = useState({ tx: {}, goal: {}, budget: {}, sub: {}, inst: {} });
      
      const [settings, setSettings] = useState({ 
        salaryA: 0, salaryB: 0, 
        nameA: userData?.settings?.nameInCouple || 'Pessoa A', 
        nameB: 'Pessoa B',
      });
      
      const [showMigrateModal, setShowMigrateModal] = useState(false);
      const [showInviteCodeModal, setShowInviteCodeModal] = useState(false);
      const [regeneratedCode, setRegeneratedCode] = useState('');
      
      // NOVO: Modal de contribuições
      const [selectedGoalForContributions, setSelectedGoalForContributions] = useState(null);
      
      const isCouple = userData?.mode === 'couple';
      
      const showToast = useCallback((msg, isError = false, details = null) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, msg, isError, details }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 6000);
      }, []);
      
      useEffect(() => {
        localStorage.setItem('theme', theme);
        theme === 'dark' ? document.documentElement.classList.add('dark') : document.documentElement.classList.remove('dark');
      }, [theme]);
      
      // NOVO: Carrega contribuições de todas as metas
      const loadAllContributions = async (goalsList) => {
        const map = {};
        await Promise.all(goalsList.map(async (g) => {
          const contribs = await DataService.getContributions(g.id);
          map[g.id] = contribs.reduce((sum, c) => sum + (parseFloat(c.amount) || 0), 0);
        }));
        setContributionsMap(map);
      };
      
      useEffect(() => {
        const loadData = async () => {
          setLoadingData(true);
          try {
            const ownerId = isCouple && userData.coupleId ? userData.coupleId : user.uid;
            const [txs, gls, subs, insts, bdg] = await Promise.all([
              DataService.getAllTransactions(user.uid, userData?.coupleId),
              DataService.getCollection('goals', user.uid, userData?.coupleId),
              DataService.getCollection('subscriptions', user.uid, userData?.coupleId),
              DataService.getCollection('installments', user.uid, userData?.coupleId),
              DataService.getBudgets(ownerId)
            ]);
            setTransactions(txs); 
            setGoals(gls); 
            setSubscriptions(subs); 
            setInstallments(insts); 
            setBudgets(bdg);
            if (isCouple && userData?.partnerId) setPartnerData(await DataService.getUserData(userData.partnerId));
            if (isCouple && coupleData?.settings) setSettings({ salaryA: coupleData.settings.salaryA || 0, salaryB: coupleData.settings.salaryB || 0, nameA: coupleData.settings.nameA || 'Pessoa A', nameB: coupleData.settings.nameB || 'Pessoa B' });
            await loadAllContributions(gls);
          } catch (err) { 
            console.error(err); 
            showToast('Erro ao carregar dados', true, err.message); 
          }
          finally { setLoadingData(false); }
        };
        if (user && userData?.mode) loadData();
      }, [user, userData, coupleData, isCouple]);
      
      const filteredTransactions = useMemo(() => transactions.filter(t => t.date?.startsWith(monthFilter)), [transactions, monthFilter]);
      
      const totals = useMemo(() => {
        let inc = 0, exp = 0;
        filteredTransactions.forEach(t => { if (t.type === 'income') inc += t.value; else exp += t.value; });
        const s = (parseFloat(settings.salaryA) || 0) + (parseFloat(settings.salaryB) || 0);
        return { inc: inc + s, exp, balance: (inc + s) - exp };
      }, [filteredTransactions, settings]);
      
      const categoriesTotal = useMemo(() => {
        const e = {};
        filteredTransactions.forEach(t => { 
          if (t.type === 'expense') { 
            if (!e[t.category]) e[t.category] = { val: 0, count: 0 }; 
            e[t.category].val += t.value; 
            e[t.category].count += 1; 
          } 
        });
        return e;
      }, [filteredTransactions]);
      
      const totalSubscriptions = useMemo(() => subscriptions.filter(s => s.active).reduce((a, c) => a + parseFloat(c.value), 0), [subscriptions]);
      
      const subscriptionsByScope = useMemo(() => {
        const mine = subscriptions.filter(s => s.ownerId === user.uid && s.active);
        const partner = subscriptions.filter(s => s.ownerId !== user.uid && s.active);
        return {
          mine, partner,
          mineTotal: mine.reduce((a, c) => a + parseFloat(c.value), 0),
          partnerTotal: partner.reduce((a, c) => a + parseFloat(c.value), 0),
        };
      }, [subscriptions, user.uid]);
      
      const splitLogic = useMemo(() => {
        if (!isCouple) return null;
        const sA = parseFloat(settings.salaryA) || 0, sB = parseFloat(settings.salaryB) || 0, sT = sA + sB;
        const rA = sT > 0 ? sA / sT : 0.5, rB = sT > 0 ? sB / sT : 0.5;
        const sh = filteredTransactions.filter(t => t.scope === 'shared' && t.type === 'expense');
        const tSh = sh.reduce((a, t) => a + t.value, 0);
        const pA = sh.filter(t => t.paidBy === user.uid).reduce((a, t) => a + t.value, 0);
        const pB = sh.filter(t => t.paidBy === userData.partnerId).reduce((a, t) => a + t.value, 0);
        return { totalSharedExp: tSh, ratioA: rA, ratioB: rB, balanceA: pA - (tSh * rA), balanceB: pB - (tSh * rB) };
      }, [filteredTransactions, settings, isCouple, user.uid, userData?.partnerId]);
      
      // ========== HANDLERS CORRIGIDOS (com ID preservado) ==========
      const handleEditTx = (t) => {
        setTxForm({
          id: t.id,
          desc: t.desc || '',
          value: String(t.value || ''),
          type: t.type || 'expense',
          category: t.category || 'Alimentação',
          customCategory: '',
          date: t.date || getLocalDateString(),
          scope: t.scope || 'private',
          paidBy: t.paidBy || user.uid,
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      const handleSaveTx = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!txForm.desc.trim()) errors.desc = 'Descrição obrigatória';
        const val = parseFloat(txForm.value);
        if (isNaN(val) || val <= 0) errors.value = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(p => ({...p, tx: errors})); return; }
        const { id, ...txFormData } = txForm;
        const payload = {
          ...txFormData,
          ownerId: user.uid, 
          coupleId: txForm.scope === 'shared' ? userData.coupleId : null, 
          category: txForm.customCategory.trim() || txForm.category, 
          value: val, 
          paidBy: user.uid 
        };
        
        try {
          if (txForm.id) {
            await DataService.updateTransaction(txForm.id, payload);
          } else {
            await DataService.addTransaction(payload);
          }
          setTransactions(await DataService.getAllTransactions(user.uid, userData.coupleId));
          setTxForm({ id: null, desc: '', value: '', type: 'expense', category: 'Alimentação', customCategory: '', date: getLocalDateString(), scope: 'private', paidBy: user.uid });
          setFormErrors(p => ({...p, tx: {}}));
          showToast("Transação salva.");
        } catch (err) { 
          console.error(err); 
          showToast('Erro ao salvar transação', true, err.message); 
        }
      };
      
      const handleDeleteTx = async (id) => {
        if (!id) { showToast('Erro: ID ausente', true); return; }
        if (!window.confirm("Apagar esta transação?")) return;
        try {
          await DataService.deleteTransaction(id);
          setTransactions(p => p.filter(t => t.id !== id));
          showToast("Transação excluída.");
        } catch (err) { showToast('Erro ao excluir', true, err.message); }
      };
      
      const handleEditGoal = (g) => {
        setGoalForm({ id: g.id, name: g.name || '', target: String(g.target || '') });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
      
      // CORRIGIDO: Só salva nome e target (aportes são feitos no modal separado)
      const handleSaveGoal = async (e) => {
        e.preventDefault();
        const errors = {};
        if (!goalForm.name.trim()) errors.name = 'Nome obrigatório';
        const target = parseFloat(goalForm.target);
        if (isNaN(target) || target <= 0) errors.target = 'Valor inválido';
        if (Object.keys(errors).length) { setFormErrors(p => ({...p, goal: errors})); return; }

                          <div>
                            <h4 className="font-bold text-lg text-slate-800 dark:text-white">Migrar para Modo Casal</h4>
                            <p className="text-sm text-slate-600 dark:text-slate-400">Convide seu parceiro(a) e gerenciem juntos.</p>
                          </div>
                        </div>
                        <button onClick={() => setShowMigrateModal(true)} className="w-full bg-partner-500 hover:bg-partner-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-partner-500/30 hover:-translate-y-0.5 transition-all">
                          Ativar Modo Casal
                        </button>
                      </div>
                    ) : (
                      <div className="p-6 bg-gradient-to-br from-rose-50 to-amber-50 dark:from-rose-900/20 dark:to-amber-900/20 rounded-2xl border border-rose-200 dark:border-rose-800/50">
                        <div className="flex items-center gap-4 mb-4">
                          <span className="text-4xl">🧍</span>
                          <div>
                            <h4 className="font-bold text-lg text-slate-800 dark:text-white">Voltar para Modo Solo</h4>
                            <p className="text-sm text-slate-600 dark:text-slate-400">Desfaz o casal. Seu parceiro também voltará ao modo solo.</p>
                          </div>
                        </div>
                        <button onClick={handleMigrateToSolo} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-rose-500/30 hover:-translate-y-0.5 transition-all">
                          Desfazer Casal
                        </button>
                      </div>
                    )}
                  </BentoCard>
                  
                  {/* NOVO: Integração Bancária (placeholder) */}
                  <BentoCard title="Integração Bancária" icon="🏦">
                    <div className="p-5 rounded-2xl bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50">
                      <h4 className="font-bold mb-2 flex items-center gap-2 text-slate-800 dark:text-white">🚧 Em desenvolvimento</h4>
                      <p className="text-sm text-slate-600 dark:text-slate-400 mb-3">Estamos trabalhando na integração automática com bancos via Open Finance (Inter, Nubank, Itaú, etc).</p>
                      <p className="text-xs text-slate-500 mb-3">Enquanto isso, você pode importar extratos manualmente:</p>
                      <div className="space-y-2 text-xs text-slate-600 dark:text-slate-400">
                        <div className="flex items-start gap-2"><span className="font-bold text-brand-600">1.</span><span>No app do seu banco, exporte o extrato em formato OFX ou CSV</span></div>
                        <div className="flex items-start gap-2"><span className="font-bold text-brand-600">2.</span><span>Em breve teremos um botão para importar esses arquivos automaticamente</span></div>
                      </div>
                    </div>
                  </BentoCard>
                  
                  {/* Configurações do Casal (nomes e salários) */}
                  {isCouple && (
                    <BentoCard title="Configurações do Casal" icon="⚙️">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="p-6 bg-brand-50 dark:bg-brand-900/20 rounded-3xl border border-brand-200 dark:border-brand-800/50">
                          <h3 className="font-bold mb-5 text-brand-600 flex items-center gap-2 text-sm uppercase tracking-wider">👤 {settings.nameA}</h3>
                          <label className={labelClass}>Nome</label>
                          <input type="text" value={settings.nameA} onChange={e=>setSettings({...settings, nameA: e.target.value})} className={`${inputClass} mb-4 font-bold`} />
                          <label className={labelClass}>Salário (R$)</label>
                          <input type="number" step="0.01" value={settings.salaryA} onChange={e=>setSettings({...settings, salaryA: e.target.value})} className={inputClass} />
                        </div>
                        <div className="p-6 bg-partner-50 dark:bg-partner-900/20 rounded-3xl border border-partner-200 dark:border-partner-800/50">
                          <h3 className="font-bold mb-5 text-partner-600 flex items-center gap-2 text-sm uppercase tracking-wider">👤 {settings.nameB}</h3>
                          <label className={labelClass}>Nome</label>
                          <input type="text" value={settings.nameB} onChange={e=>setSettings({...settings, nameB: e.target.value})} className={`${inputClass} mb-4 font-bold`} />
                          <label className={labelClass}>Salário (R$)</label>
                          <input type="number" step="0.01" value={settings.salaryB} onChange={e=>setSettings({...settings, salaryB: e.target.value})} className={inputClass} />
                        </div>
                      </div>
                      <div className="mt-6 flex justify-end">
                        <button onClick={handleUpdateCoupleSettings} className="bg-brand-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-brand-500/30 hover:-translate-y-0.5 transition-all">Salvar Configurações</button>
                      </div>
                    </BentoCard>
                  )}
                  
                  {/* Ações (atualizar, sair) */}
                  <BentoCard title="Ações" icon="🔧">
                    <div className="flex flex-col md:flex-row gap-4">
                      <button onClick={async () => { 
                        await refreshUserData(); 
                        const ownerId = isCouple && userData.coupleId ? userData.coupleId : user.uid;
                        const [txs, gls, subs, insts, bdg] = await Promise.all([
                          DataService.getAllTransactions(user.uid, userData?.coupleId),
                          DataService.getCollection('goals', user.uid, userData?.coupleId),
                          DataService.getCollection('subscriptions', user.uid, userData?.coupleId),
                          DataService.getCollection('installments', user.uid, userData?.coupleId),
                          DataService.getBudgets(ownerId)
                        ]);
                        setTransactions(txs); setGoals(gls); setSubscriptions(subs); setInstallments(insts); setBudgets(bdg);
                        await loadAllContributions(gls);
                        showToast('Dados atualizados!'); 
                      }} className="flex-1 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold py-3 px-8 rounded-xl shadow-xl hover:-translate-y-0.5 transition-all">
                        🔄 Atualizar Dados
                      </button>
                      <button onClick={signOut} className="flex-1 md:hidden bg-rose-500 text-white font-bold py-3 px-8 rounded-xl shadow-md shadow-rose-500/30 hover:-translate-y-0.5 transition-all">
                        🚪 Sair da Conta
                      </button>
                    </div>
                  </BentoCard>
                </div>
              )}
            </div>
          </main>
          
          {/* TOASTS */}
          <div className="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none" aria-live="polite">
            {toasts.map(t => (
              <div key={t.id} className={`px-6 py-4 rounded-2xl shadow-2xl font-bold text-sm bg-white/90 dark:bg-slate-800/90 backdrop-blur-md border-l-4 animate-slide-up max-w-sm ${t.isError ? 'border-rose-500 text-rose-600 dark:text-rose-400' : 'border-brand-500 text-brand-600 dark:text-brand-400'}`}>
                <div className="flex items-start gap-3">
                  <span className="text-xl drop-shadow-sm" aria-hidden="true">{t.isError ? '⚠️' : '✅'}</span>
                  <div>
                    <div>{t.msg}</div>
                    {t.details && <div className="text-xs mt-1 opacity-75 font-normal">{t.details}</div>}
                  </div>
                </div>
              </div>
            ))}
          </div>
          
          {/* MODAL: Migração Solo → Casal */}
          {showMigrateModal && (
            <MigrateModal onClose={() => setShowMigrateModal(false)} onSuccess={refreshUserData} />
          )}
          
          {/* MODAL: Código de convite regenerado */}
          {showInviteCodeModal && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
              <div className="glass-card p-8 rounded-3xl w-full max-w-md shadow-2xl animate-slide-up">
                <div className="text-center mb-6">
                  <div className="w-16 h-16 mx-auto mb-4 rounded-full bg-partner-100 dark:bg-partner-900/30 flex items-center justify-center text-4xl">✉️</div>
                  <h2 className="font-extrabold text-2xl mb-2 text-slate-800 dark:text-white">Novo Código Gerado!</h2>
                  <p className="text-slate-500 text-sm">Compartilhe este código com quem você quer convidar:</p>
                </div>
                
                <div className="bg-gradient-to-br from-partner-50 to-brand-50 dark:from-partner-900/20 dark:to-brand-900/20 p-6 rounded-2xl border border-partner-200 dark:border-partner-800/50 mb-6 text-center">
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Código de Convite</p>
                  <div className="font-mono font-black text-4xl tracking-[0.3em] text-partner-600 dark:text-partner-400 mb-4">{regeneratedCode}</div>
                  <button onClick={() => { navigator.clipboard?.writeText(regeneratedCode); showToast('Código copiado!'); }} className="text-sm bg-white dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 font-bold py-2 px-6 rounded-xl shadow-md transition-all">📋 Copiar</button>
                </div>
                
                <button onClick={() => setShowInviteCodeModal(false)} className="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-3 rounded-xl shadow-lg shadow-brand-500/30 transition-all">
                  Fechar
                </button>
              </div>
            </div>
          )}
          
          {/* MODAL: Histórico de Aportes de Meta */}
          {selectedGoalForContributions && (
            <GoalContributionsModal 
              goal={selectedGoalForContributions} 
              onClose={() => setSelectedGoalForContributions(null)} 
              onContributionsChange={async () => { 
                const newGoals = await DataService.getCollection('goals', user.uid, userData?.coupleId); 
                setGoals(newGoals); 
                await loadAllContributions(newGoals); 
              }} 
            />
          )}
        </div>
      );
    }

    // ==================== APP ROOT ====================
    function App() {
      const { user, userData, loading } = useAuth();
      
      if (loading) return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-brand-900">
          <div className="text-center">
            <div className="w-16 h-16 mx-auto mb-4 rounded-2xl bg-gradient-to-br from-brand-500 to-partner-500 flex items-center justify-center text-white font-black text-2xl shadow-lg shadow-brand-500/30 animate-pulse">D</div>
            <p className="text-white font-bold">Carregando Finanças DMX...</p>
          </div>
        </div>
      );
      
      if (!user) return <AuthScreen />;
      if (!userData?.mode) return <OnboardingFlow />;
      return <DashboardApp />;
    }

    // ==================== RENDER ====================
    ReactDOM.createRoot(document.getElementById('root')).render(
      <AuthProvider>
        <App />
      </AuthProvider>
    );
  </script>
</body>
</html>
